<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Convooz</title>
  <!-- This file used to be the PWA start_url before the rename to
       Convooz. Mobile devices that did "Add to Home Screen" before
       manifest.json was updated still open this URL on icon tap,
       leaving them stuck on the last v0.0.9x build that lived here.

       Redirecting to the root re-fetches index.html *and* the new
       manifest.json — the next time iOS reloads the PWA it sees the
       updated start_url and the home-screen icon points at "/" from
       then on. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta http-equiv="refresh" content="0; url=./"/>
  <link rel="manifest" href="manifest.json"/>
  <script>window.location.replace('./');</script>
</head>
<body>
<p>Redirecting to <a href="./">Convooz</a>…</p>
</body>
</html>
