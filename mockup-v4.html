function initialsOf(nameOrEmail) {
  if (!nameOrEmail) return "?";
  const s = String(nameOrEmail).trim();
  if (s.includes("@")) {
    const local = s.split("@")[0];
    return local.slice(0, 2).toUpperCase();
  }
  const parts = s.split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function colorFromSeed(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return AVATAR_PALETTE[h % AVATAR_PALETTE.length];
}

async function apiFetch(path, opts = {}) {
  const { data: { session } } = await sb.auth.getSession();
  const headers = { ...(opts.headers || {}) };
  if (opts.body != null) headers["Content-Type"] = "application/json";
  if (session?.access_token) headers.Authorization = `Bearer ${session.access_token}`;
  const res = await fetch(BACKEND_URL + path, { ...opts, headers });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}

  { id: 201, contactId: 2, dir: "in",  subject: "Factuur april 2026",                  from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-09T08:00:00", read: false, revert2me: false, body: "Goedemorgen,\n\nIn de bijlage de factuur voor april. Graag voor de 20e betalen.\n\nFactuur #2026-041\nBedrag: €1.850,00 excl. BTW\n\nHieronder een specificatie van de werkzaamheden in de afgelopen maand, zodat je precies kunt zien waar de kosten aan zijn besteed en je het gemakkelijk intern kunt doorbelasten.\n\n— Projectbeheer en coördinatie: 12 uur\n— Ontwerpwerk module A (iteraties v3 → v5): 18 uur\n— Ontwerpwerk module B (v1): 9 uur\n— Technische review met het ontwikkelteam: 4 uur\n— Klantoverleg en afstemming: 6 uur\n— Documentatie en hand-over: 5 uur\n— Reistijd (2 bezoeken ter plaatse): 3 uur\n\nTotaal: 57 uur × €32,46 = €1.850,00 excl. BTW.\n\nEnkele opmerkingen bij deze factuur:\n\n1. De uren voor module B zijn lager uitgevallen dan vooraf ingeschat omdat we een aantal onderdelen uit module A hebben kunnen hergebruiken. Dit scheelt ongeveer 4 uur. Dat verschil heb ik verwerkt in deze factuur.\n\n2. De klantsessie van 3 april heeft langer geduurd dan gepland. De extra tijd (ongeveer 1,5 uur) heb ik niet apart gefactureerd omdat deze binnen de bandbreedte van het voorstel valt.\n\n3. Voor mei heb ik alvast een globale planning gemaakt. Als alles volgens schema verloopt, verwacht ik ongeveer 45–50 uur nodig te hebben. Ik stuur de definitieve planning zodra we de kick-off van fase 2 hebben ingepland.\n\n4. Zoals afgesproken ontvang je samen met deze factuur ook een bijlage met de voortgangsrapportage van dit kwartaal. Neem deze gerust door en laat me weten of er vragen zijn.\n\n5. Mocht je een splitsing per kostenplaats willen zien (bijvoorbeeld onderscheid tussen intern en klantgericht werk), dan kan ik die alsnog aanmaken. Geef even een seintje.\n\nVoor de betaling: hanteer zoals altijd een betalingstermijn van 14 dagen. Bij vragen over bedragen of specificaties: bel of mail gerust — ik help snel verder.\n\nDank voor de prettige samenwerking deze maand. Ik kijk uit naar het vervolg.\n\nMet vriendelijke groet,\nThomas de Groot\nOpdrachtnemer freelance" },
  { id: 202, contactId: 2, dir: "out", subject: "Re: Factuur april 2026",              from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-08T13:45:00", read: true,  revert2me: true,  body: "Thomas,\n\nOntvangen — dank je. Ik heb de factuur en de urenspecificatie doorgenomen en het ziet er allemaal duidelijk uit. Hieronder mijn reactie per punt, dan kun jij kijken of we er zo uit komen.\n\n1. URENVERANTWOORDING\nDe verdeling van 57 uur klopt met wat ik intern had ingeschat. Met name de reductie op module B door hergebruik van module A waardeer ik — dat had je ook door kunnen laten lopen op 13 uur, dus dank voor de transparantie. Voor mei neem ik alvast 45–50 uur als richtlijn mee in de budgetprognose, dan stemmen we de definitieve planning af zodra fase 2 ingepland staat.\n\n2. EXTRA TIJD KLANTSESSIE\nPrima dat je de 1,5 uur extra van de sessie van 3 april binnen de bandbreedte van het voorstel houdt. Hou in de volgende maand wel in de gaten of we daar structureel overheen gaan; als het vaker voorkomt, dan brengen we dat gewoon apart in rekening.\n\n3. SPLITSING PER KOSTENPLAATS\nJa, graag. Voor mijn interne verantwoording is het handig om te zien:\n— intern/strategisch werk (coördinatie, documentatie)\n— klantgericht werk (overleg, reviews, externe sessies)\n— ontwerpwerk per module\n\nAls je deze driedeling in de factuurspecificatie kunt meenemen (of in een bijlage), scheelt dat mij handmatig rekenwerk. Een simpele Excel is ook prima — liever geen vormgeving-tijd aan besteden.\n\n4. VOORTGANGSRAPPORTAGE Q1\nIk heb de rapportage vanmorgen snel doorgenomen. Een paar opmerkingen:\n— Resultaten per milestone zijn helder.\n— De grafiek op pagina 4 (doorlooptijd per sprint) mist een legenda — kun je die toevoegen?\n— Het risico-overzicht is mooi compact; de mitigaties zou ik iets concreter formuleren (wie doet wat, wanneer).\n\n5. PLANNING MEI EN JUNI\nVoor mei staat fase 2 inderdaad gepland. Graag in de kick-off ook alvast fase 3 bespreken (zelfs als nog niet alles concreet is), zodat we de capaciteit bij de leveranciers op tijd kunnen reserveren.\n\n6. BETALING\nFactuur staat ingepland voor betaling binnen 10 werkdagen. Als er vragen zijn, mail of bel gerust.\n\nTot zover mijn reactie. Als jij de aangepaste specificatie + rapportage kunt sturen — liefst deze week — dan kunnen we maandag een korte call doen om alles af te stemmen. Laat me even weten wat jou schikt.\n\nDank weer voor de prettige samenwerking.\n\nGroet,\nQuinten" },
  { id: 203, contactId: 2, dir: "in",  subject: "Re: Re: Factuur april 2026",         from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-08T15:10:00", read: true,  revert2me: false, body: "Dank je. Laat me weten als er vragen zijn." },
  { id: 204, contactId: 2, dir: "out", subject: "Update project planning",             from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-07T09:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nHierbij de bijgewerkte planning. De deadline is verschoven naar 25 april.\n\nKun je bevestigen dat dit voor jou werkt?\n\nGr" },

  { id: 208, contactId: 2, dir: "out", subject: "Re: Vraag over specificaties",       from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-05T14:00:00", read: true,  revert2me: false, body: "Thomas,\n\nSpecificaties volgen morgen.\n\nGr" },

  { id: 210, contactId: 2, dir: "out", subject: "Specificaties module B",             from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-04T10:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nIn de bijlage de gevraagde specificaties voor module B.\n\n- Gewicht: max 2,4 kg\n- Afmeting: 240×180×40 mm\n- Aansluiting: USB-C + 2× HDMI\n- Vermogen: 45W\n\nLaat me weten als je nog iets mist.\n\nGr" },

  { id: 216, contactId: 2, dir: "out", subject: "Re: Aanvullend: testrapport",       from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-03-31T17:15:00", read: true,  revert2me: false, body: "Gelezen. Punt 2 klinkt urgent — ik kijk er vanavond naar.\n\nGr" },
  { id: 217, contactId: 2, dir: "in",  subject: "Re: Re: Aanvullend: testrapport",  from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-01T09:00:00", read: true,  revert2me: false, body: "Goed om te horen. We wachten je bevindingen af." },
  { id: 218, contactId: 2, dir: "out", subject: "Bevindingen memory leak",           from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-01T22:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nHet lek zit in de TokenRefreshHandler — sessies worden niet gesloten na timeout. Fix is klaar en staat in PR #214.\n\nKun je reviewen?\n\nGr" },
  { id: 219, contactId: 2, dir: "in",  subject: "Re: Bevindingen memory leak",      from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-02T08:45:00", read: true,  revert2me: false, body: "PR gereviewed en goedgekeurd. Goed werk!" },
  { id: 220, contactId: 2, dir: "out", draft: true, subject: "Re: Factuur — specificatie", from: "me@megamail.nl",  to: "thomas.degroot@gmail.com",  date: "2026-04-09T07:00:00", modifiedAt: "2026-04-09T11:30:00", read: true, revert2me: false, body: "Thomas,\n\nIk heb de factuur ontvangen. Kun je ook een specificatie sturen?\n\nGr" },

// ─── Helpers ─────────────────────────────────────────────────────────────────

const NOW = new Date("2026-04-09T18:00:00");
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const pad = n => String(n).padStart(2,"0");

function formatTime(s) {
  if (!s) return "";
  const d = new Date(s), diff = Math.floor((NOW-d)/86400000);
  if (diff===0) return d.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
  if (diff===1) return "gisteren";
  if (diff<7)   return d.toLocaleDateString("nl-NL",{weekday:"short"});
  return d.toLocaleDateString("nl-NL",{day:"numeric",month:"short"});
}
function formatFull(s) {
  return new Date(s).toLocaleString("nl-NL",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function quoteHeader(msg) {
  const d=new Date(msg.date);
  const date=`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
  const time=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const myName = msg.sender?.name || (msg.from || '').split('@')[0];
  const sender = msg.dir==="out" ? `${msg.from} (${myName})` : msg.from;
  return `—————————————————————————————————\n${DAYS[d.getDay()]} ${date} ${time}  ${sender}\n\n${msg.body}`;
}
function softBg(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.10)`;
}

// ─── Tag Picker (dropdown) ────────────────────────────────────────────────────

function TagPicker({current=[], suggestions=[], onAdd, onRemove}) {
  const [input, setInput] = useState("");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(()=>{
    if(!open) return;
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[open]);

  const filtered = suggestions.filter(t => !current.includes(t) && t.toLowerCase().includes(input.toLowerCase()));

  function submit(tag) {
    const t = tag.trim(); if(!t) return;
    onAdd(t); setInput(""); setOpen(false);
  }

  return (
    <div className="relative" ref={ref}>
      <div className="flex flex-wrap gap-1 items-center border border-gray-200 rounded px-2 py-1 min-h-[28px] cursor-text bg-white"
        onClick={()=>setOpen(true)}>
        {current.map(t=><TagChip key={t} tag={t} onRemove={()=>onRemove(t)}/>)}
        <input value={input} onChange={e=>setInput(e.target.value)} onFocus={()=>setOpen(true)}
          onKeyDown={e=>{if(e.key==="Enter")submit(input);if(e.key==="Escape")setOpen(false);}}
          placeholder={current.length?"":"Add tag…"} className="outline-none text-xs flex-1 min-w-[60px]"/>
      </div>
      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg min-w-[180px] overflow-hidden">
          {filtered.length>0 && filtered.map(t=>(
            <button key={t} onClick={()=>submit(t)} className="w-full text-left px-3 py-1.5 hover:bg-indigo-50 flex items-center gap-1.5">
              <TagChip tag={t}/>
            </button>
          ))}
          {input.trim() && !suggestions.includes(input.trim()) && (
            <button onClick={()=>submit(input.trim())} className="w-full text-left px-3 py-1.5 hover:bg-indigo-50 text-xs text-indigo-600 border-t border-gray-100">
              + Create "<strong>{input.trim()}</strong>"
            </button>
          )}
          {filtered.length===0 && !input.trim() && (
            <div className="px-3 py-2 text-xs text-gray-400">Type to search or create…</div>
          )}
        </div>
      )}
    </div>
  );
}

    if (!macSelectedId || macSelectedId === 'new') return;
    setMacBusy('sync'); setMacSyncResult(null);
    try {
      const r = await apiFetch(`/mail-accounts/${macSelectedId}/sync`, { method:'POST' });
      setMacSyncResult(r);
      await macRefresh(); onMailAccountsChanged?.();

    setMacBusy(null);

  }, [activeTab, macAccounts]);

            <button key={a.id} onClick={()=>macSelectAccount(a)}

              <div className="truncate">{label}</div>
              {label !== a.email && <div className="text-[10px] text-gray-400 truncate">{a.email}</div>}
            </button>
          );
        })}
        <button onClick={macStartNew}
          className={`mt-1 w-full text-left px-2 py-1.5 rounded-lg text-xs transition-colors flex items-center gap-1.5 ${macSelectedId==='new'?'bg-indigo-50 text-indigo-700 font-semibold border border-indigo-200':'text-indigo-500 hover:bg-indigo-50 border border-dashed border-indigo-200'}`}>
          <PlusIcon size={10}/> Add account
        </button>
      </div>
    );
  }

  function renderMacDetail() {

                <a href="https://account.apple.com/account/manage" target="_blank" rel="noreferrer" className="underline">account.apple.com</a>{' '}

          <div className="col-span-2">
            <div className="text-xs text-gray-400 mb-1">Email</div>

          <div className="col-span-2">

        </div>

        <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100 pt-2">Outgoing mail (SMTP)</div>
        <div className="grid grid-cols-2 gap-3">
          <div className="col-span-2">
            <div className="text-xs text-gray-400 mb-1">Hostname</div>
            <input value={macForm.smtp_host} onChange={e=>macSetField('smtp_host', e.target.value)} placeholder="smtp.example.com" className={macInputCls}/>

          <div>
            <div className="text-xs text-gray-400 mb-1">Port</div>
            <input type="number" value={macForm.smtp_port} onChange={e=>macSetField('smtp_port', Number(e.target.value))} className={macInputCls}/>
          </div>
          <div>
            <div className="text-xs text-gray-400 mb-1">Username</div>
            <input value={macForm.smtp_user} onChange={e=>macSetField('smtp_user', e.target.value)} placeholder="often same as IMAP" className={macInputCls}/>

          <div className="col-span-2">
            <div className="text-xs text-gray-400 mb-1">Password</div>
            <input type="password" value={macForm.smtp_password} onChange={e=>macSetField('smtp_password', e.target.value)}
              placeholder={isNew ? 'often same as IMAP' : 'Leave empty to keep existing'} className={macInputCls}/>
          </div>
        </div>

        {!isNew && (
          <>
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100 pt-2">Mailbox maintenance</div>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2">

                <select
                  value={macForm.retention_deleted_days ?? ''}
                  onChange={e=>macSetField('retention_deleted_days', e.target.value === '' ? null : Number(e.target.value))}

              <div className="col-span-2">
                <div className="text-xs text-gray-400 mb-1">Permanently erase spam messages</div>
                <select
                  value={macForm.retention_spam_days ?? ''}
                  onChange={e=>macSetField('retention_spam_days', e.target.value === '' ? null : Number(e.target.value))}
                  className={macInputCls + " bg-white text-gray-700"}>
                  {RETENTION_OPTIONS.map(o => <option key={String(o.value)} value={o.value ?? ''}>{o.label}</option>)}

              {label}
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
          ))}
        </div>
      </div>
    );

    // Panel back-bar
    function BackBar({label, onBack}) {
      return <div className="flex items-center justify-between px-3 py-2 border-b border-gray-200 bg-white flex-shrink-0">
        <button onClick={onBack} className="flex items-center gap-1 text-sm text-indigo-600 font-medium">
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          {label}
        </button>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
      </div>;

    // Middle panel content per tab
    const MiddlePanel = (
      <div style={{width:'100vw',height:'100%',flexShrink:0}} className="flex flex-col bg-white">
        <BackBar label="Settings" onBack={()=>setMobileSetCol(0)}/>
        <div className="px-4 py-3 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-800">{tabTitle}</span>
        </div>
        <div className="flex-1 overflow-y-auto scroll px-4 py-4">
          {activeTab==='profile'&&(
            <div className="space-y-5">
              <div className="flex items-center gap-4 mb-2">
                <div className="w-14 h-14 rounded-full flex items-center justify-center text-lg font-bold text-indigo-600"
                  style={{background:softBg('#6366f1'),border:'2px solid #6366f133'}}>

                <div>
                  <div className="font-semibold text-gray-900">{CURRENT_USER.name}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{CURRENT_USER.emails[0]}</div>

              {[['name','Display name','text'],['mobile','Mobile number','tel']].map(([f,label,type])=>(

          {activeTab==='signatures'&&(

    const DetailPanel = (

                    {CURRENT_USER.avatar}

                  <div>
                    <div className="font-semibold text-gray-900">{CURRENT_USER.name}</div>
                    <div className="text-xs text-gray-400 mt-0.5">{CURRENT_USER.emails[0]}</div>

                  <div key={f}>
                    <div className="text-xs text-gray-400 mb-1">{label}</div>
                    <input type={type} value={profile[f]} onChange={e=>setProfile(p=>({...p,[f]:e.target.value}))}
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-400"/>
                  </div>

                <div>
                  <div className="text-xs text-gray-400 mb-1">Password</div>
                  <div className="flex gap-2">
                    <input type={showPass?"text":"password"} value={profile.pass} onChange={e=>setProfile(p=>({...p,pass:e.target.value}))}
                      placeholder="New password…"
                      className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-400"/>
                    <button onClick={()=>setShowPass(v=>!v)} className="px-3 py-2 text-xs rounded-lg border border-gray-200 text-gray-500 hover:border-gray-300">{showPass?'Hide':'Show'}</button>
                  </div>
                </div>
                <div className="pt-2">
                  <button className="px-5 py-2 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-medium">Save profile</button>
                </div>
              </div>
            )}

            {activeTab==='accounts'&&(
              <div className="flex gap-4 h-full">
                {renderMacList()}
                {renderMacDetail()}
              </div>
            )}
            {activeTab==='signatures'&&(
              <div className="flex gap-4">
                {/* Signature list */}
                <div className="w-36 flex-shrink-0 space-y-1">
                  {signatures.map(sig=>(
                    <div key={sig.id} className="flex items-center gap-0.5 group">
                      <button onClick={()=>setSelSigId(sig.id)}
                        className={`flex-1 min-w-0 text-left px-2.5 py-2 rounded-lg text-xs transition-colors truncate ${selSigId===sig.id?'bg-indigo-50 text-indigo-700 font-semibold border border-indigo-200':'text-gray-600 hover:bg-gray-100 border border-transparent'}`}>
                        {sig.title||'(untitled)'}
                      </button>
                      {signatures.length>1&&(
                        <button onClick={()=>handleSigDelete(sig.id)}
                          className="opacity-0 group-hover:opacity-100 flex-shrink-0 w-5 h-5 flex items-center justify-center rounded text-gray-300 hover:text-red-400 text-base leading-none transition-opacity">
                          ×
                        </button>
                      )}
                    </div>
                  ))}
                  <button onClick={()=>handleSigAdd()}
                    className="mt-1 w-full text-left px-2 py-1.5 rounded-lg text-xs text-indigo-500 hover:bg-indigo-50 border border-dashed border-indigo-200 flex items-center gap-1.5">
                    <PlusIcon size={10}/> Add signature
                  </button>
                </div>

                {/* Editor */}
                {selSig&&(
                  <div className="flex-1 min-w-0 space-y-4">
                    <div>
                      <div className="text-xs text-gray-400 mb-1">Title</div>
                      <input value={selSig.title}
                        onChange={e=>setSignatures(prev=>prev.map(s=>s.id===selSigId?{...s,title:e.target.value}:s))}
                        onBlur={()=>persistSigFields(selSigId)}
                        className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400"/>
                    </div>
                    <div>
                      <div className="text-xs text-gray-400 mb-1">Signature text</div>
                      <textarea value={selSig.body}
                        onChange={e=>setSignatures(prev=>prev.map(s=>s.id===selSigId?{...s,body:e.target.value}:s))}
                        onBlur={()=>persistSigFields(selSigId)}
                        rows={5} className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400 resize-none font-mono"/>
                    </div>
                    <div>
                      <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100 mb-3">Linked accounts</div>
                      {accountEmails.length===0 && <div className="text-xs text-gray-400">No mail accounts connected yet.</div>}
                      <div className="space-y-2">
                        {accountEmails.map(acct=>{
                          const as=accountSigs[acct]||{linked:[],autoId:null};
                          const linked=as.linked.includes(selSigId);
                          const isAuto=as.autoId===selSigId;
                          return (
                            <div key={acct} className="flex items-center gap-3 py-1.5 border-b border-gray-50 last:border-0">
                              <input type="checkbox" checked={linked} onChange={e=>{
                                const cur = accountSigs[acct] || {linked:[], autoId:null};
                                const next = e.target.checked
                                  ? {...cur, linked: [...cur.linked, selSigId]}
                                  : {linked: cur.linked.filter(id=>id!==selSigId), autoId: cur.autoId===selSigId?null:cur.autoId};
                                const nextAll = {...accountSigs, [acct]: next};
                                setAccountSigs(nextAll);
                                persistSigLinks(selSigId, nextAll);
                              }} className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                              <span className="text-xs text-gray-700 flex-1 truncate">{acct}</span>
                              {linked&&(
                                <label className="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer select-none flex-shrink-0">
                                  <input type="radio" checked={isAuto} onChange={()=>{}} onClick={()=>{
                                    // Toggle off if already active; otherwise set this account,
                                    // clearing the same sig's auto-insert from all other accounts.
                                    const nextAll = {};
                                    for (const [k, v] of Object.entries(accountSigs)) {
                                      if (k === acct) nextAll[k] = {...v, autoId: isAuto ? null : selSigId};
                                      else            nextAll[k] = {...v, autoId: v.autoId === selSigId ? null : v.autoId};
                                    }
                                    setAccountSigs(nextAll);
                                    persistSigLinks(selSigId, nextAll);
                                  }} className="accent-indigo-600"/>
                                  Auto-insert
                                </label>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Compose Pane ─────────────────────────────────────────────────────────────

const SIG_SEP = '\n\n';

function ComposePane({replyTo, replyKind='reply', toContact, draft, initTo:initToOverride="", initCC="", initBCC="", initTag=null, initMsgTags=[], allKnownTags=[], selAccounts=[], myEmails=[], signatures=[], accountSigs={}, onSend, onSaveDraft, onDeleteDraft, onClose, mobileBack, mobileBackLabel}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const isReply     = !!replyTo && replyKind !== 'forward';
  const isReplyAll  = !!replyTo && replyKind === 'reply-all';
  const isForward   = !!replyTo && replyKind === 'forward';

  // To: forward starts empty; reply / reply-all target the original sender
  // (for incoming) or the original recipient (for outgoing).
  const primaryReplyTarget = replyTo
    ? (replyTo.dir === "out" ? replyTo.to : replyTo.from)
    : "";
  const initTo = draft?.to ?? (
    isForward ? "" :
    replyTo ? primaryReplyTarget :
    (initToOverride || toContact?.emails[0] || "")
  );

  // CC: reply-all fills every other addressee minus our own accounts and the
  // primary reply target, so we don't CC ourselves or duplicate the "To".
  const myEmailSet = new Set((myEmails || selAccounts || []).map(e => (e||'').toLowerCase()));
  const computedReplyAllCC = (isReplyAll && replyTo)
    ? [...new Set([
        ...(replyTo.toList || []),
        ...(replyTo.ccList || []),
      ])].filter(e =>
        e && e.toLowerCase() !== (primaryReplyTarget || '').toLowerCase()
        && !myEmailSet.has(e.toLowerCase())
      ).join(', ')
    : "";
  const initCCResolved = draft?.cc ?? (computedReplyAllCC || initCC);

  const initSubj = draft?.subject ?? (
    isForward ? "Fwd: " + (replyTo?.subject || '') :
    replyTo ? "Re: " + (replyTo.subject || '') :
    ""
  );
  const initBody = draft?.body ?? (replyTo ? "\n\n" + quoteHeader(replyTo) : "");

  // Compute initial auto-signature (only for new messages, not replies/drafts)
  const initFromAcct = selAccounts[0] || '';
  const initAcctSig  = accountSigs[initFromAcct]||{linked:[],autoId:null};
  const initAutoSig  = (!draft&&!replyTo&&initAcctSig.autoId)
    ? signatures.find(s=>s.id===initAcctSig.autoId)||null : null;
  const initBodyWithSig = initAutoSig ? initBody+SIG_SEP+initAutoSig.body : initBody;

  const [to,setTo]=useState(initTo);
  const [from,setFrom]=useState(initFromAcct);
  const [cc,setCc]=useState(initCCResolved);
  const [bcc,setBcc]=useState(initBCC);
  const [subj,setSubj]=useState(initSubj);
  const [body,setBody]=useState(initBodyWithSig);
  const [activeSigId,setActiveSigId]=useState(initAutoSig?.id||null);
  const [r2mDays,setR2mDays]=useState(toContact?.r2mDays??3);
  const [r2mHover,setR2mHover]=useState(false);
  const [showCC,setShowCC]=useState(!!initCCResolved);
  const [showBCC,setShowBCC]=useState(!!initBCC);
  const [msgTags,setMsgTags]=useState(initTag?[...new Set([...initMsgTags,initTag])]:initMsgTags);
  const [showDrop,    setShowDrop]    = useState(false);
  const [showFromDrop,setShowFromDrop]= useState(false);
  const [sending,     setSending]     = useState(false);
  const [sendErr,     setSendErr]     = useState('');
  const [savingDraft, setSavingDraft] = useState(false);
  // Local draft id — set once we POST a new draft, reused for subsequent PATCHes
  // so the user can keep saving the same draft without remounting the pane.
  const [draftId,     setDraftId]     = useState(draft?.id || null);
  const dropRef     = useRef(null);
  const fromDropRef = useRef(null);
  const multiFrom = selAccounts.length > 1;

  // Both Send and Revert2me are send actions; Revert2me additionally arms
  // revert-to-me on the new outgoing row using the current r2mDays value.
  async function handleSendClick(withR2m = false) {
    if (!to.trim() || sending) return;
    setSending(true); setSendErr('');
    try {
      await onSend?.({
        from, to, cc: showCC ? cc : '', bcc: showBCC ? bcc : '',
        subject: subj, body,
        reply_to_id: replyTo?.id,
        draft_id_to_delete: draftId,
        revert2me_days: withR2m ? Number(r2mDays) || 0 : undefined,
      });
    } catch (e) {
      setSendErr(e?.message || 'Send failed');
      setSending(false);
    }
  }
  async function handleSaveDraftClick() {
    if (savingDraft) return;
    setSavingDraft(true); setSendErr('');
    try {
      const newId = await onSaveDraft?.({
        from, to, cc: showCC ? cc : '', bcc: showBCC ? bcc : '',
        subject: subj, body,
        reply_to_id: replyTo?.id,
      }, draftId);
      if (newId && !draftId) setDraftId(newId);
    } catch (e) {
      setSendErr(e?.message || 'Save draft failed');
    }
    setSavingDraft(false);
  }
  async function handleDeleteDraftClick() {
    if (savingDraft) return;
    if (!confirm('Delete this draft?')) return;
    setSavingDraft(true);
    try {
      await onDeleteDraft?.(draftId);
    } catch (e) {
      setSendErr(e?.message || 'Delete failed');
      setSavingDraft(false);
    }
  }

  // Signatures for current from-account
  const acctSigCfg = accountSigs[from]||{linked:[],autoId:null};
  const linkedSigs = signatures.filter(s=>acctSigCfg.linked.includes(s.id));

  function switchSig(newId) {
    const oldSig = signatures.find(s=>s.id===activeSigId);
    const newSig = signatures.find(s=>s.id===newId);
    setBody(prev=>{
      let b = prev;
      if(oldSig){ const idx=b.lastIndexOf(SIG_SEP+oldSig.body); if(idx>=0) b=b.substring(0,idx); }
      if(newSig) b=b+SIG_SEP+newSig.body;
      return b;
    });
    setActiveSigId(newId||null);
  }

  useEffect(()=>{
    if(!showDrop)return;
    const h=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[showDrop]);

  useEffect(()=>{
    if(!showFromDrop)return;
    const h=e=>{if(fromDropRef.current&&!fromDropRef.current.contains(e.target))setShowFromDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[showFromDrop]);

  const hasMulti = toContact && toContact.emails.length>1 && !replyTo && !draft;
  const title = draft ? "Edit draft"
    : isForward ? "Forward"
    : isReplyAll ? "Reply all"
    : replyTo ? "Reply"
    : "New message";

  return (
    <div className="flex flex-col h-full bg-white">
      {isMobile&&mobileBack?(
        <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
          <div className="flex items-center gap-2 px-3 py-2">
            <button onClick={mobileBack}
              className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5 truncate min-w-0 flex-1">
              <svg className="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="truncate">{mobileBackLabel||"Mail"}</span>
            </button>
            {/* X cancel only for new drafts (not yet saved). Saved drafts use Delete in footer. */}
            {!draft&&<button onClick={onClose||mobileBack} title="Cancel"
              className="flex-shrink-0 w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>}
          </div>
        </div>
      ):(
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <span className="font-semibold text-gray-700 text-sm">{title}</span>
        {onClose&&<button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">×</button>}
      </div>
      )}
      <div className={isMobile?'flex-1 min-h-0 overflow-y-auto scroll flex flex-col':'contents'}
        style={isMobile?{WebkitOverflowScrolling:'touch'}:{display:'contents'}}>
      <div style={isMobile?{minHeight:'calc(100% + 1px)',display:'flex',flexDirection:'column'}:{display:'contents'}}>
      {/* From — only shown when multiple accounts active */}
      {multiFrom&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">From:</span>
          <div className="flex-1 relative" ref={fromDropRef}>
            <div className="flex items-center gap-1">
              <span className="flex-1 text-gray-800 truncate min-w-0">{from}</span>
              <button onClick={()=>setShowFromDrop(d=>!d)}
                className={`flex-shrink-0 w-5 h-5 flex items-center justify-center rounded transition-colors ${showFromDrop?"bg-indigo-100 text-indigo-600":"text-gray-300 hover:text-gray-500"}`}>
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
            {showFromDrop&&(
              <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:240}}>
                <div className="px-3 py-1.5 text-xs text-gray-400 border-b border-gray-100 font-medium">Send from</div>
                {selAccounts.map((acc,i)=>(
                  <button key={acc} onClick={()=>{setFrom(acc);setShowFromDrop(false);}}
                    className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-indigo-50 ${acc===from?"bg-indigo-50 text-indigo-700":"text-gray-700"}`}>
                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${acc===from?"bg-indigo-500":"bg-gray-300"}`}/>
                    <span className="truncate">{acc}</span>
                    {i===0&&<span className="ml-auto text-xs text-gray-400">primary</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>}
      {/* To */}
      <div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">To:</span>
          <div className="flex-1 relative" ref={dropRef}>
            <div className="flex items-center gap-1">
              <input className="flex-1 outline-none text-gray-800 min-w-0" value={to} onChange={e=>setTo(e.target.value)}/>
              {hasMulti&&<button onClick={()=>setShowDrop(d=>!d)}
                className={`flex-shrink-0 w-5 h-5 flex items-center justify-center rounded transition-colors ${showDrop?"bg-indigo-100 text-indigo-600":"text-gray-300 hover:text-gray-500"}`}>
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>}
              {!showCC&&<button onClick={()=>setShowCC(true)} className="text-xs text-gray-300 hover:text-gray-500 flex-shrink-0 ml-1">CC</button>}
              {!showBCC&&<button onClick={()=>setShowBCC(true)} className="text-xs text-gray-300 hover:text-gray-500 flex-shrink-0 ml-0.5">BCC</button>}
            </div>
            {showDrop&&hasMulti&&(
              <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:240}}>
                <div className="px-3 py-1.5 text-xs text-gray-400 border-b border-gray-100 font-medium">{toContact.name}</div>
                {toContact.emails.map((e,i)=>(
                  <button key={e} onClick={()=>{setTo(e);setShowDrop(false);}}
                    className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-indigo-50 ${e===to?"bg-indigo-50 text-indigo-700":"text-gray-700"}`}>
                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${e===to?"bg-indigo-500":"bg-gray-300"}`}/>
                    <span className="truncate">{e}</span>
                    {i===0&&<span className="ml-auto text-xs text-gray-400">primary</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      {/* CC */}
      {showCC&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">CC:</span>
          <input className="flex-1 outline-none text-gray-800" value={cc} onChange={e=>setCc(e.target.value)}/>
        </div>
      </div>}
      {/* BCC */}
      {showBCC&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">BCC:</span>
          <input className="flex-1 outline-none text-gray-800" value={bcc} onChange={e=>setBcc(e.target.value)}/>
        </div>
      </div>}
      {/* Subject */}
      <div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">Subj:</span>
          <input className="flex-1 outline-none text-gray-800" value={subj} onChange={e=>setSubj(e.target.value)}/>
        </div>
      </div>
      <textarea ref={el=>{
          if(isMobile&&el){
            el.style.height='auto';
            el.style.height = Math.max(260, el.scrollHeight) + 'px';
          }
        }}
        className={`${isMobile?'flex-shrink-0':'flex-1'} px-4 py-3 text-sm text-gray-800 outline-none resize-none overflow-hidden`}
        style={isMobile?{minHeight:260}:{}}
        value={body} onChange={e=>{
          setBody(e.target.value);
          if(isMobile){
            e.target.style.height='auto';
            e.target.style.height = Math.max(260, e.target.scrollHeight) + 'px';
          }
        }} placeholder="Write your message…"/>
      {/* Signature selector — shown when from-account has linked signatures */}
      {linkedSigs.length>0&&(
        <div className="px-4 py-2 flex-shrink-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xs text-gray-400 flex-shrink-0">Signature:</span>
            <button onClick={()=>switchSig(null)}
              className={`px-2 py-0.5 text-xs rounded-full border transition-colors ${!activeSigId?'bg-gray-100 text-gray-600 border-gray-300 font-medium':'text-gray-400 border-gray-200 hover:text-gray-600'}`}>
              None
            </button>
            {linkedSigs.map(sig=>(
              <button key={sig.id} onClick={()=>switchSig(sig.id)}
                className={`px-2 py-0.5 text-xs rounded-full border transition-colors ${activeSigId===sig.id?'bg-indigo-50 text-indigo-700 border-indigo-200 font-medium':'text-gray-400 border-gray-200 hover:text-gray-600'}`}>
                {sig.title}
              </button>
            ))}
          </div>
        </div>
      )}
      {/* Tags row — label-less on both layouts, matching IN / OUT mails */}
      <div className="px-4 py-2 border-t border-gray-100 flex-shrink-0">
        <TagPicker current={msgTags} suggestions={allKnownTags}
          onAdd={t=>setMsgTags(prev=>[...prev.filter(x=>x!==t),t])}
          onRemove={t=>setMsgTags(prev=>prev.filter(x=>x!==t))}/>
      </div>
      </div>{/* end bounce wrapper */}
      </div>{/* end scroll/contents wrapper */}
      {/* Footer */}
      <div className="px-4 py-3 border-t border-gray-200 flex items-center gap-2 flex-shrink-0 bg-white">
        {!(typeof window!=='undefined'&&window.innerWidth<768)&&<div className="flex items-center gap-1.5 cursor-default select-none"
          onMouseEnter={()=>setR2mHover(true)} onMouseLeave={()=>setR2mHover(false)}>
          <span className="text-xs text-gray-400">R2M:</span>
          {r2mHover
            ? <input autoFocus type="number" min="0" max="30" value={r2mDays} onChange={e=>setR2mDays(e.target.value)}
                className="w-10 text-xs text-center outline-none border border-gray-300 rounded px-1 py-0.5 bg-white text-gray-700"/>
            : <span className="text-xs font-medium text-gray-600 min-w-[1.5rem] text-center">{r2mDays}</span>}
          <span className="text-xs text-gray-400">days{Number(r2mDays)===0?' (instant)':''}</span>
        </div>}
        <div className="flex-1"/>
        {sendErr && <span className="text-xs text-red-600 truncate flex-shrink min-w-0" title={sendErr}>{sendErr}</span>}
        {draftId
          ? <button onClick={handleDeleteDraftClick} disabled={savingDraft||sending}
              className="px-3 py-1.5 text-xs rounded bg-red-50 hover:bg-red-100 disabled:opacity-50 text-red-600 font-medium">Delete</button>
          : <button onClick={handleSaveDraftClick} disabled={savingDraft||sending||(!to.trim()&&!subj.trim()&&!body.trim())}
              className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 disabled:opacity-50 text-gray-600">
              {savingDraft?'Saving…':'Save draft'}
            </button>}
        <button onClick={()=>handleSendClick(true)} disabled={sending || !to.trim()}
          title={`Send and arm Revert2Me — if no reply within ${r2mDays} day${r2mDays==1?'':'s'}, this mail resurfaces. 0 = instant.`}
          className="px-3 py-1.5 text-xs rounded bg-amber-400 hover:bg-amber-500 disabled:opacity-50 text-white font-medium">
          {sending ? 'Sending…' : `Revert2me${Number(r2mDays)===0?' · 0d':''}`}
        </button>
        <button onClick={()=>handleSendClick(false)} disabled={sending || !to.trim()}
          className="px-4 py-1.5 text-xs rounded bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium">
          {sending ? 'Sending…' : 'Send'}
        </button>
      </div>
    </div>
  );
}

// ─── Contact Edit Form ────────────────────────────────────────────────────────

function ContactEditForm({contact, contactTags, allKnownTags, isArchived, onSave, onCancel, onDelete, emailFlags, onToggleEmailFlag, onUnmergeEmail}) {
  const [name,   setName]   = useState(contact.name);
  const [org,    setOrg]    = useState(contact.org||"");
  const [primary,setPrimary]= useState(contact.emails[0]);

// ─── HTML message body (sandboxed iframe) ─────────────────────────────────
// HTML emails are rendered in a sandboxed iframe so any scripts / event
// handlers / form submissions in the source can't touch our app. We keep
// allow-same-origin so the onLoad handler can read contentDocument and
// resize the iframe to fit its content, and allow-popups so link clicks
// can open in a new tab without being trapped in the sandbox.
function HtmlMessageBody({html}) {
  const ref = useRef(null);
  function onLoad(e) {
    try {
      const doc = e.target.contentDocument;
      if (doc && doc.body) {
        e.target.style.height = (doc.body.scrollHeight + 24) + 'px';
      }
    } catch { /* ignore cross-origin issues */ }
  }
  // <base target="_blank"> makes every link open in a new tab instead of
  // hijacking the iframe. A tiny default stylesheet keeps things readable
  // when the source has no CSS of its own.
  const srcDoc = `<!doctype html>
<html><head><base target="_blank"><meta charset="utf-8">
<style>
  body { margin:0; padding:0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color:#374151; word-wrap: break-word; overflow-wrap: break-word; }
  img, video, iframe { max-width: 100%; height: auto; }
  table { max-width: 100%; }
  a { color: #4f46e5; }
  blockquote { margin: 0.5em 0; padding-left: 0.75em; border-left: 3px solid #e5e7eb; color: #6b7280; }
  pre, code { white-space: pre-wrap; word-break: break-word; }
</style>
</head><body>${html}</body></html>`;
  return (
    <iframe ref={ref}
      title="Message body"
      className="w-full border-0 bg-white"
      sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"
      srcDoc={srcDoc}
      onLoad={onLoad}
      style={{minHeight:200, display:'block'}}/>
  );
}

function fibSnoozeDays(count) {
  // Fibonacci snooze sequence: 3, 5, 8, 13, 21, 34 …
  if(count<=0) return 3;
  if(count===1) return 5;
  let a=3,b=5;
  for(let i=2;i<=count;i++){const c=a+b;a=b;b=c;}
  return b;
}

function MessageDetail({message,contact,isDeleted,msgTags,allTags,onReply,onReplyAll,onForward,onDelete,onRecover,onDismissR2m,onR2mSeen,onR2mSnooze,onMarkRead,onSnooze,onSpam,snoozeCount=0,onAddTag,onRemoveTag,selAccounts=[],fadeOut=false,fadeOutFast=false,slideIn=false,slideOut=false,fadingAlert=null,onHeaderHeight,mobileBack,mobileBackLabel}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const headerRef = useRef(null);
  const [headerH, setHeaderH] = useState(0);
  const alertSentinelRef = useRef(null);
  const scrollRootRef = useRef(null);
  const [alertOutOfView, setAlertOutOfView] = useState(false);
  // Lazily-loaded full body + attachments (IMAP round-trip, so only when we
  // actually need them: message has attachments or HTML contains cid: refs).
  const [enriched, setEnriched] = useState(null); // null | {html, text, attachments[]}
  const [enrichedLoading, setEnrichedLoading] = useState(false);
  const [enrichedErr, setEnrichedErr] = useState('');
  useEffect(()=>{
    setEnriched(null); setEnrichedErr('');
    if (!message || message.draft) return;
    const needs = message.hasAttachments || (typeof message.bodyHtml === 'string' && /cid:/i.test(message.bodyHtml));
    if (!needs) return;
    let cancelled = false;
    setEnrichedLoading(true);
    apiFetch(`/messages/${message.id}/body`)
      .then(r => { if (!cancelled) setEnriched(r || null); })
      .catch(e => { if (!cancelled) setEnrichedErr(e?.message || 'Failed to load full message'); })
      .finally(() => { if (!cancelled) setEnrichedLoading(false); });
    return () => { cancelled = true; };
  },[message?.id]);
  async function downloadAttachment(att) {
    try {
      const { data: { session } } = await sb.auth.getSession();
      const res = await fetch(`${BACKEND_URL}/messages/${message.id}/attachments/${att.index}`, {
        headers: session?.access_token ? { Authorization: `Bearer ${session.access_token}` } : {},
      });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = att.filename; a.rel = 'noopener';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 500);
    } catch (e) {
      alert('Download failed: ' + (e?.message || 'unknown error'));
    }
  }
  useEffect(()=>{
    if(headerRef.current){
      const h=headerRef.current.offsetHeight;
      setHeaderH(h);
      onHeaderHeight?.(h);
    }
  },[message?.id]);
  // Always open message scrolled to top (reset on mail change)
  useEffect(()=>{
    if(scrollRootRef.current) scrollRootRef.current.scrollTop = 0;
    setAlertOutOfView(false);
  },[message?.id]);
  useEffect(()=>{
    if(!isMobile) { setAlertOutOfView(false); return; }
    const root = scrollRootRef.current;
    if(!root) return;
    function check(){
      const sentinel = alertSentinelRef.current;
      if(!sentinel){ setAlertOutOfView(false); return; }
      // Subheader back bar is ~40px tall at top of scrollable root.
      // Show sticky Snooze/Seen once sentinel (after alert banner) goes above that.
      const rootRect = root.getBoundingClientRect();
      const sentRect = sentinel.getBoundingClientRect();
      setAlertOutOfView((sentRect.top - rootRect.top) < 40);
    }
    check();
    root.addEventListener('scroll', check, {passive:true});
    window.addEventListener('resize', check);
    return ()=>{root.removeEventListener('scroll', check); window.removeEventListener('resize', check);};
  },[isMobile,message?.id]);

  if (!message||!contact) return (
    <div className="flex items-center justify-center h-full text-gray-300 select-none bg-white">
      <div className="text-center"><div className="text-5xl mb-3">✉</div><div className="text-sm">Select a message</div></div>
    </div>
  );
  const isDraft=!!message.draft;
  const senderPerson = message.dir==="out" ? (message.sender || {name:'Me',avatar:'Me',color:'#6366f1',portrait:null}) : contact;
  // When fadingAlert is set (during action), freeze banner so alert stays until toast is gone
  const showAmberBanner = fadingAlert ? fadingAlert.amber : (message.revert2me&&message.dir==="out"&&!isDeleted);
  const showBlueBanner  = fadingAlert ? fadingAlert.blue  : (!message.read&&message.dir==="in"&&!isDraft&&!isDeleted);

  // Mobile: wrap header+body+spacer inside a scrollable middle div; keep subheader fixed top, action bar fixed bottom
  const MobileFixedSubheader = isMobile&&mobileBack ? (
    <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
      <div className="flex items-center gap-2 px-3 py-2">
        <button onClick={mobileBack}
          className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5 truncate min-w-0 flex-1">
          <svg className="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
          <span className="truncate">{mobileBackLabel||"Mail"}</span>
        </button>
        {alertOutOfView&&showAmberBanner&&(
          <div className="flex gap-1.5 flex-shrink-0">
            <button onClick={()=>onR2mSnooze?.(message.id)}
              className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Snooze</button>
            <button onClick={()=>onR2mSeen?.(message.id)}
              className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Seen</button>
          </div>
        )}
        {alertOutOfView&&showBlueBanner&&(
          <div className="flex gap-1.5 flex-shrink-0">
            <button onClick={()=>onSnooze?.(message.id)}
              className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Snooze</button>
            <button onClick={()=>onMarkRead?.(message.id)}
              className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Seen</button>
          </div>
        )}
      </div>
    </div>
  ) : null;

  return (
    <div className={`flex flex-col h-full bg-white${!isMobile?((fadeOut?' msg-fade-out':'')+(fadeOutFast?' msg-fade-out-fast':'')+(slideOut?' msg-slide-out':'')+(slideIn?' msg-slide-in':'')):''}`}>
      {MobileFixedSubheader}
      <div ref={scrollRootRef}
        className={`${isMobile?'flex-1 min-h-0 overflow-y-auto scroll':'flex flex-col h-full'}${isMobile?((fadeOut?' msg-fade-out':'')+(fadeOutFast?' msg-fade-out-fast':'')+(slideOut?' msg-slide-out':'')+(slideIn?' msg-slide-in':'')):''}`}
        style={isMobile?{WebkitOverflowScrolling:'touch'}:{}}>
      <div style={isMobile?{minHeight:'calc(100% + 1px)',display:'flex',flexDirection:'column'}:{display:'contents'}}>
      <div ref={headerRef} className="px-5 py-4 border-b border-gray-200 flex-shrink-0">
        <div className="flex items-start justify-between gap-3 mb-2">
          <div className="font-semibold text-gray-900 leading-snug">{message.subject}</div>
          <MsgLabel dir={message.dir} isDraft={isDraft} isDeleted={isDeleted}/>
        </div>
        <div className="flex items-start gap-3">
          <Avatar contact={senderPerson} size={36}/>
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-2">
              <span className="text-sm font-medium text-gray-800">{senderPerson.name}</span>
              <span className="text-xs text-gray-400 flex-shrink-0">{formatFull(message.date)}</span>
            </div>
            <div className="text-xs text-gray-400 mt-0.5">
              {message.dir==="in"
                ? <><span className="text-gray-500">From:</span> {message.from}</>
                : <><span className="text-gray-500">To:</span> {message.to}
                    {selAccounts.length > 1 && <><br/><span className="text-gray-500">From:</span> {message.from}</>}
                  </>}
            </div>
          </div>
        </div>
        {/* Tags on message */}
        <div className="mt-2">
          <TagPicker current={msgTags} suggestions={allTags}
            onAdd={t=>onAddTag(message.id,t)} onRemove={t=>onRemoveTag(message.id,t)}/>
        </div>
      </div>

      {/* Alert banners + toast — this zone never fades so toast stays fully readable */}
      <div className="relative flex-shrink-0">
        {showAmberBanner&&(
          <div className="mx-4 mt-3 px-3 py-2 rounded bg-amber-50 border border-amber-200 flex items-center gap-2 text-xs text-amber-700">
            <span><strong>Revert2Me:</strong> no reply</span>
            <div className="ml-auto flex gap-2">
              <button onClick={()=>onR2mSnooze?.(message.id)}
                className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 font-medium">Snooze</button>
              <button onClick={()=>onR2mSeen?.(message.id)}
                className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 font-medium">Seen</button>
            </div>
          </div>
        )}
        {showBlueBanner&&(
          <div className="mx-4 mt-3 px-3 py-2 rounded bg-indigo-50 border border-indigo-200 flex items-center gap-2 text-xs text-indigo-700">
            <span><strong>New message:</strong> not read.</span>
            <div className="ml-auto flex gap-2">
              <button onClick={()=>onSnooze?.(message.id)}
                className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 font-medium">Snooze</button>
              <button onClick={()=>onMarkRead?.(message.id)}
                className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 font-medium">Seen</button>
            </div>
          </div>
        )}
        {/* Sentinel used to detect when the alert banner scrolls out of view */}
        {isMobile&&(showAmberBanner||showBlueBanner)&&<div ref={alertSentinelRef} style={{height:1}}/>}
      </div>

      <div className={`${isMobile?'':'flex-1 overflow-y-auto scroll'} px-5 py-4 text-sm text-gray-700 leading-relaxed`}>
        {(() => {

          if (htmlToRender) return <HtmlMessageBody html={htmlToRender}/>;

        {enrichedErr && <p className="mt-3 text-xs text-red-500">Attachments load failed: {enrichedErr}</p>}
        {(() => {
          const atts = (enriched?.attachments || []).filter(a => !a.isInline);

          return (
            <div className="mt-4 pt-3 border-t border-gray-100">

                    </svg>
                    <span className="truncate">{a.filename}</span>
                    <span className="text-gray-400 flex-shrink-0">· {Math.round((a.size||0)/1024)} KB</span>

          <SpamIcon size={mob?16:13}/>{!mob&&<span>Spam</span>}
        </button>}
        </>})()}
      </div>
    </div>
  );
}

const FILTER_TABS = ["Now","All","In","Out","Draft","Deleted"];

function ThreadColumn({contact,allMsgs,deletedIds,selectedMsgId,msgTags,onSelect,onSelectDraft,onNewMsg,onEditContact,
                       contactTags,allTags,onAddContactTag,onRemoveContactTag,
                       emailFlags,archivedContacts,onToggleFlag,
                       savedFilter,onFilterChange,mobileBack}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const [nameHover,setNameHover]=useState(false);
  const [flagsOpen,setFlagsOpen]=useState(false);
  const flagsMenuRef=useRef(null);
  useEffect(()=>{
    if(!flagsOpen)return;
    const h=e=>{if(flagsMenuRef.current&&!flagsMenuRef.current.contains(e.target))setFlagsOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[flagsOpen]);
  const listRef=useRef(null);
  const filter = savedFilter||"now";
  const setFilterAndSave = f=>onFilterChange?.(f);
  useEffect(()=>{
    if(!selectedMsgId||!listRef.current) return;
    const el=listRef.current.querySelector(`[data-msgid="${selectedMsgId}"]`);
    if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});

  const msgs=useMemo(()=>{
    const del=x=>deletedIds.includes(x.id);
    let m=allMsgs;
    if(filter==="now")     m=m.filter(x=>!del(x)&&!x.draft&&((x.dir==="in"&&!x.read)||(x.dir==="out"&&x.revert2me)));
    else if(filter==="in") m=m.filter(x=>x.dir==="in"&&!x.draft&&!del(x));
    else if(filter==="out")m=m.filter(x=>x.dir==="out"&&!x.draft&&!del(x));
    else if(filter==="draft")m=m.filter(x=>x.draft&&!del(x));
    else if(filter==="deleted")m=m.filter(x=>del(x));
    else m=m.filter(x=>!del(x));
    const sortKey=x=>x.draft?(x.modifiedAt||x.date):x.date;
    return [...m].sort((a,b)=>sortKey(b).localeCompare(sortKey(a)));
  },[allMsgs,filter,deletedIds]);

  if(!contact) return (
    <div className="flex items-center justify-center h-full bg-white text-gray-300 text-sm select-none">
      <div className="text-center"><div className="text-4xl mb-2">👤</div><div>Select a contact</div></div>
    </div>
  );

  if (isMobile) {
    return (
      <div className="flex flex-col h-full bg-white overflow-hidden">
        {/* Fixed back link (outside scroll area) */}
        <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
          <div className="flex items-center gap-2 px-3 py-2">
            <button onClick={mobileBack}
              className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Contacts
            </button>
          </div>
        </div>
        {/* Scrollable content */}
        <div className="flex-1 min-h-0 overflow-y-auto scroll" style={{WebkitOverflowScrolling:'touch',overflowX:'hidden'}}>
        <div style={{minHeight:'calc(100% + 1px)'}}>

        {/* Contact card — scrolls away */}
        <div className="px-5 pt-3 pb-2 border-b border-gray-200 flex-shrink-0 bg-gray-50">

            <div className="flex items-center gap-2 cursor-pointer min-w-0 flex-1"
              onMouseEnter={()=>setNameHover(true)} onMouseLeave={()=>setNameHover(false)}
              onClick={onEditContact}>
              <Avatar contact={contact} size={28}/>
              <span className="font-semibold text-gray-900 text-base leading-snug hover:text-indigo-700 transition-colors truncate">{contact.name}</span>
              <span className="flex items-center justify-center text-gray-400 flex-shrink-0" style={{padding:2}}>
                <PencilIcon size={11}/>
              </span>
            </div>
            {/* Flags chevron pulldown */}
            <div className="relative flex-shrink-0" ref={flagsMenuRef}>
              <button onClick={()=>setFlagsOpen(v=>!v)}
                className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-400"
                title="Contact flags">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
              {flagsOpen&&(
                <div className="absolute right-0 top-full mt-1 z-20 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:140}}>
                  {[['News','isNews'],['Mute','isMuted']].map(([label,key])=>{
                    const checked=!!contact[key];
                    return <button key={label} onClick={()=>onToggleFlag?.(contact.id,key)}
                      className="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">
                      <span className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${checked?'bg-indigo-500 border-indigo-500':'border-gray-300'}`}>
                        {checked&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </span>
                      <span>{label}</span>
                    </button>;
                  })}
                </div>
              )}
            </div>
            <button onClick={onNewMsg} title="New message"
              className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex-shrink-0">
              <PlusIcon size={12}/>
            </button>
          </div>
          {contact.org&&<div className="text-xs text-gray-400 mt-0.5 pl-[36px]">{contact.org}</div>}
          <div className="mt-1 space-y-0.5 pl-[36px]">
            {contact.emails.map((e,i)=>(
              <div key={e} className="flex items-center gap-1.5">
                <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${i===0?"bg-indigo-400":"bg-gray-300"}`}/>
