          <button onClick={()=>{setMode('register');setErr('');}} className="text-xs text-gray-400 hover:text-gray-600 mb-5 flex items-center gap-1">← Back</button>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Set up your first mail account</h1>
          <p className="text-sm text-gray-400 mb-6">Connect an IMAP/SMTP account to start receiving mail.</p>
          {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
          <div className="space-y-4">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100">Incoming mail (IMAP)</div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {[['imapHost','Hostname','text'],['imapPort','Port','number'],['user','Username','text'],['pass','Password','password']].map(([f,label,type])=>(
                <div key={f} className={f==='imapHost'||f==='user'?'col-span-2':''}>
                  <div className="text-xs text-gray-400 mb-1">{label}</div>
                  <input type={type} value={regImap[f]||''} onChange={e=>setRegImap(p=>({...p,[f]:type==='number'?Number(e.target.value):e.target.value}))}
                    className={inputSmCls}/>
                </div>
              ))}
              <div>
                <div className="text-xs text-gray-400 mb-1">Authentication</div>
                <select value={regImap.auth||'Password'} onChange={e=>setRegImap(p=>({...p,auth:e.target.value}))}
                  className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400 bg-white text-gray-700">
                  {IMAP_AUTH_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              </div>
              <div>
                <div className="text-xs text-gray-400 mb-1">SSL/TLS</div>
                <label className="flex items-center gap-2 cursor-pointer mt-2">
                  <input type="checkbox" checked={!!regImap.imapSsl} onChange={e=>setRegImap(p=>({...p,imapSsl:e.target.checked}))} className="accent-indigo-600"/>
                  <span className="text-sm text-gray-700">Use SSL</span>
                </label>
              </div>
            </div>
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100">Outgoing mail (SMTP)</div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {[['smtpHost','Hostname','text'],['smtpPort','Port','number']].map(([f,label,type])=>(
                <div key={f} className={f==='smtpHost'?'col-span-2':''}>
                  <div className="text-xs text-gray-400 mb-1">{label}</div>
                  <input type={type} value={regImap[f]||''} onChange={e=>setRegImap(p=>({...p,[f]:type==='number'?Number(e.target.value):e.target.value}))}
                    className={inputSmCls}/>
                </div>
              ))}
              <div className="col-span-2">
                <div className="text-xs text-gray-400 mb-1">SSL/TLS</div>
                <label className="flex items-center gap-2 cursor-pointer">
                  <input type="checkbox" checked={!!regImap.smtpSsl} onChange={e=>setRegImap(p=>({...p,smtpSsl:e.target.checked}))} className="accent-indigo-600"/>
                  <span className="text-sm text-gray-700">Use SSL/TLS</span>
                </label>
              </div>
            </div>
            <button onClick={handleFinishImap} disabled={busy}
              className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold transition mt-2">
              {busy ? 'Saving…' : 'Finish setup & sign in'}
            </button>
          </div>
        </div>
      )}

      {/* ── Creating account ── */}
      {mode==='creating'&&(
        <div className={cardCls}>
          <div className="text-center">
            <div className="w-14 h-14 rounded-full bg-indigo-100 flex items-center justify-center text-2xl mx-auto mb-5">⚙️</div>
            <h1 className="text-xl font-bold text-gray-900 mb-2">Creating your account</h1>
            <p className="text-sm text-gray-400 mb-8">Please wait while we set everything up…</p>
            <CreatingAccountBar onComplete={finishOnboarding}/>
            <p className="text-xs text-gray-400 mt-4">This may take a few seconds</p>
          </div>
        </div>
      )}

      <p className="mt-8 text-xs text-gray-400">© 2026 ConvoMail</p>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

// ─── Mail-accounts provider presets (used by SettingsModal accounts tab) ─────
const PROVIDER_PRESETS = {
  icloud: { imap_host: "imap.mail.me.com", imap_port: 993, smtp_host: "smtp.mail.me.com", smtp_port: 587 },
  generic: { imap_host: "", imap_port: 993, smtp_host: "", smtp_port: 587 },
};

const BLANK_MAC_FORM = {
  provider: 'generic', email: '', display_name: '',
  imap_host: '', imap_port: 993, imap_user: '', imap_password: '',
  smtp_host: '', smtp_port: 587, smtp_user: '', smtp_password: '',
  retention_deleted_days: null, retention_spam_days: null, auto_sync: false,
};
const RETENTION_OPTIONS = [
  { value: null,  label: 'Never (keep on server)' },
  { value: 7,    label: 'After 7 days' },
  { value: 14,   label: 'After 14 days' },
  { value: 30,   label: 'After 1 month' },
  { value: 90,   label: 'After 3 months' },
  { value: 180,  label: 'After 6 months' },
  { value: 365,  label: 'After 1 year' },
];

function App({onSignOut}) {
  // Mobile
  const [isMobile,    setIsMobile]    = useState(()=>window.innerWidth < 768);
  const [mobileCol,   setMobileCol]   = useState(0); // 0=contacts 1=thread 2=detail
  React.useEffect(()=>{
    const handler=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);
  // Layout
  const [colWidths,    setColWidths]    = useState([20,40,40]);
  const [tagsHeight,   setTagsHeight]   = useState(180);
  const [archiveHeight,setArchiveHeight]= useState(120);
  // Data
  const [mailAccounts, setMailAccounts] = useState([]);   // [{id, email, display_name, ...}]
  const [contactList,  setContactList]  = useState([]);
  const [messageList,  setMessageList]  = useState([]);
  const [dataLoading,  setDataLoading]  = useState(true);
  const [dataError,    setDataError]    = useState('');
  const [dataRefreshTick, setDataRefreshTick] = useState(0);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setDataLoading(true); setDataError('');
      try {
        const { mail_accounts, contacts, messages, drafts, tags, message_tags, r2m_state, signatures: sigs, account_signatures: accSigs } = await apiFetch('/bootstrap?limit=500');
        if (cancelled) return;

        // accountId → email lookup
        const accountEmailById = new Map();
        for (const a of mail_accounts) accountEmailById.set(a.id, (a.email || '').toLowerCase());

        // email → contact_id lookup
        const emailToContactId = new Map();
        for (const c of contacts) {
          for (const ce of c.contact_emails || []) {
            if (ce.email) emailToContactId.set(ce.email.toLowerCase(), c.id);
          }
          if (c.primary_email) emailToContactId.set(c.primary_email.toLowerCase(), c.id);
        }

        // Revert-to-me rows, keyed by message UUID
        const r2mByMsg = new Map((r2m_state || []).map(r => [r.message_id, r]));
        const nowMs = Date.now();
        function isR2mActive(row) {
          if (!row) return false;
          if (row.dismissed_at) return false;
          if (!row.snooze_until) return true;
          return new Date(row.snooze_until).getTime() <= nowMs;
        }
        // Reply-detection: a reply's RFC thread_id points at the original's
        // RFC message_id (set by sync.ts from In-Reply-To/References). We use
        // the SET of incoming thread_ids to suppress r2m on any outgoing mail
        // that has already been replied to.
        const repliedRfcIds = new Set();
        for (const m of messages) {
          if (m.direction === 'in' && m.thread_id) repliedRfcIds.add(m.thread_id);
        }

        // Lookup of the full account row by id, for outgoing-sender identity
        const accountById = new Map((mail_accounts || []).map(a => [a.id, a]));

        // Shape messages first (we need them to compute per-contact accountEmails)
        const shapedMessages = messages.map(m => {
          const accountEmail = accountEmailById.get(m.mail_account_id) ?? '';
          const otherEmail = m.direction === 'in'
            ? (m.from_email || '').toLowerCase()
            : (m.to_emails?.[0]?.email || '').toLowerCase();
          const contactId = emailToContactId.get(otherEmail) ?? null;
          const r2mRow = r2mByMsg.get(m.id);
          // r2m is suppressed as soon as any later incoming message in the
          // same RFC thread exists — i.e. the recipient has already replied.
          const r2mActive = isR2mActive(r2mRow)
            && !(m.direction === 'out' && m.message_id && repliedRfcIds.has(m.message_id));
          // Sender identity for outgoing messages = the sending mail account.
          // Avatar component wants { name, avatar, color, portrait }.
          let sender = null;
          if (m.direction === 'out') {
            const acc = accountById.get(m.mail_account_id);
            const name = acc?.display_name || acc?.email || accountEmail || 'Me';
            sender = {
              name,
              emails: [accountEmail],
              avatar: initialsOf(name),
              color: acc?.color || '#6366f1',
              portrait: null,
            };
          }
          // Recipient breakdown: the to_emails JSONB carries {email, role} for
          // each addressee. Reply-all needs both lists independently.
          const allRecipients = Array.isArray(m.to_emails) ? m.to_emails : [];
          const toList = allRecipients.filter(e => (e.role || 'to') === 'to').map(e => e.email).filter(Boolean);
          const ccList = allRecipients.filter(e => e.role === 'cc').map(e => e.email).filter(Boolean);
          return {
            id: m.id,
            accountId: m.mail_account_id,
            accountEmail,
            contactId,
            dir: m.direction,
            subject: m.subject || '(no subject)',
            from: m.from_email || '',
            to: toList[0] || allRecipients[0]?.email || '',
            toList,
            ccList,
            date: m.date,
            read: !!m.flags?.seen,
            revert2me: r2mActive,
            r2mArmed: !!r2mRow && !r2mRow.dismissed_at,
            draft: !!m.flags?.draft,
            body: m.body_text || m.snippet || '',
            bodyHtml: (typeof m.body_html === 'string' && m.body_html.trim()) ? m.body_html : null,
            hasAttachments: !!m.has_attachments,
            sender,
          };
        }).filter(m => m.contactId !== null);

        // Shape drafts into the same shape as messages (dir='out', draft=true)
        const shapedDrafts = (drafts || []).map(d => {
          const accountEmail = accountEmailById.get(d.mail_account_id) ?? '';
          const firstTo = (d.to_emails?.[0]?.email || '').toLowerCase();
          const contactId = emailToContactId.get(firstTo) ?? null;
          const acc = accountById.get(d.mail_account_id);
          const senderName = acc?.display_name || acc?.email || accountEmail || 'Me';
          return {
            id: d.id,
            accountId: d.mail_account_id,
            accountEmail,
            contactId,
            dir: 'out',
            subject: d.subject || '(no subject)',
            from: accountEmail,
            to: d.to_emails?.[0]?.email || '',
            cc: (d.cc_emails || []).map(x => x.email).join(', '),
            bcc: (d.bcc_emails || []).map(x => x.email).join(', '),
            date: d.modified_at,
            modifiedAt: d.modified_at,
            read: true,
            revert2me: false,
            draft: true,
            body: d.body || '',
            replyToId: d.reply_to_message_id || null,
            sender: {
              name: senderName,
              emails: [accountEmail],
              avatar: initialsOf(senderName),
              color: acc?.color || '#6366f1',
              portrait: null,
            },
          };
        }).filter(m => m.contactId !== null);

        // Per-contact: which account-emails have we seen activity from/to?
        const contactAccounts = new Map(); // contact_id → Set<accountEmail>
        for (const m of shapedMessages) {
          if (!m.accountEmail) continue;
          let s = contactAccounts.get(m.contactId);
          if (!s) { s = new Set(); contactAccounts.set(m.contactId, s); }
          s.add(m.accountEmail);
        }
        for (const d of shapedDrafts) {
          if (!d.accountEmail) continue;
          let s = contactAccounts.get(d.contactId);
          if (!s) { s = new Set(); contactAccounts.set(d.contactId, s); }
          s.add(d.accountEmail);
        }

        // Shape contacts
        const shapedContacts = contacts.map(c => {
          const rawEmails = (c.contact_emails && c.contact_emails.length
            ? c.contact_emails.map(e => e.email)
            : [c.primary_email].filter(Boolean));
          // Primary (if known) always leads the list so the UI shows it first.
          const primary = c.primary_email && rawEmails.includes(c.primary_email) ? c.primary_email : rawEmails[0];
          const emails = primary ? [primary, ...rawEmails.filter(e => e !== primary)] : rawEmails;
          const accEmails = [...(contactAccounts.get(c.id) || [])];
          return {
            id: c.id,
            name: c.name || emails[0] || '(unknown)',
            org: c.org || '',
            emails,
            avatar: initialsOf(c.name || emails[0] || ''),
            color: c.color || colorFromSeed(c.name || emails[0] || ''),
            portrait: c.portrait_url || null,
            r2mDays: c.r2m_days ?? 3,
            isNews: !!c.is_news,
            isMuted: !!c.is_muted,
            archivedAt: c.archived_at || null,
            accountEmails: accEmails,                 // array of all account-emails this contact has activity in
            account: accEmails[0] || null,            // "primary" account (first seen) — kept for back-compat
          };
        });

        // Tags: hydrate the server-side tag list + per-message-tag map, plus a
        // name→id lookup used by the detach path (API takes tag_id, UI uses name).
        const tagList = tags || [];
        const tagById = new Map(tagList.map(t => [t.id, t]));
        const idByName = new Map(tagList.map(t => [t.name, t.id]));
        const mt = {};
        for (const row of (message_tags || [])) {
          const t = tagById.get(row.tag_id);
          if (!t) continue;
          if (!mt[row.message_id]) mt[row.message_id] = [];
          mt[row.message_id].push(t.name);
        }

        setMailAccounts(mail_accounts);
        setContactList(shapedContacts);
        setMessageList([...shapedMessages, ...shapedDrafts]);
        setTagList(tagList);
        setTagIdByName(idByName);
        setMsgTags(mt);
        // Hydrate archived contacts set from server state
        setArchivedContacts(new Set(shapedContacts.filter(c => c.archivedAt).map(c => c.id)));
        // Hydrate per-tag email roles ({ tagName: { email: role } }) from JSONB
        {
          const roles = {};
          for (const t of tagList) {
            if (t.email_roles && typeof t.email_roles === 'object' && Object.keys(t.email_roles).length > 0) {
              roles[t.name] = t.email_roles;
            }
          }
          setTagRoles(roles);
        }
        // Initialize deletedIds from server state (soft-delete column)
        setDeletedIds(messages.filter(m => m.deleted_at != null).map(m => m.id));
        // Hydrate snooze-counts from r2m_state so the next snooze continues
        // the Fibonacci series from where it left off.
        setMsgSnoozeCounts(Object.fromEntries(
          (r2m_state || []).map(r => [r.message_id, r.snooze_count || 0]),
        ));
        // Hydrate signatures + per-account linkage. accountSigs is keyed by
        // mail-account email to match the existing SettingsModal rendering.
        setSignatures((sigs || []).map(s => ({ id: s.id, title: s.title, body: s.body })));
        {
          const byEmail = {};
          const emailByAccId = new Map(mail_accounts.map(a => [a.id, (a.email || '').toLowerCase()]));
          for (const row of (accSigs || [])) {
            const email = emailByAccId.get(row.mail_account_id);
            if (!email) continue;
            if (!byEmail[email]) byEmail[email] = { linked: [], autoId: null };
            byEmail[email].linked.push(row.signature_id);
            if (row.is_auto) byEmail[email].autoId = row.signature_id;
          }
          setAccountSigs(byEmail);
        }
      } catch (e) {
        if (!cancelled) setDataError(e.message);
      } finally {
        if (!cancelled) setDataLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [dataRefreshTick]);

  const refreshData = useCallback(() => setDataRefreshTick(t => t + 1), []);
  const [deletedIds,   setDeletedIds]   = useState(INIT_DELETED);
  const [msgTags,      setMsgTags]      = useState({});            // {msgId: [tagName,...]}
  const [tagList,      setTagList]      = useState([]);             // [{id, name, archived_at}]
  const [tagIdByName,  setTagIdByName]  = useState(()=>new Map());  // name → id (for detach)
  const [conTags,      setConTags]      = useState(INIT_CON_TAGS);
  const [tagRoles,     setTagRoles]     = useState(INIT_TAG_EMAIL_ROLES);
  // Selection
  const [selContact,   setSelContact]   = useState(null);
  const [mergeContact, setMergeContact] = useState(null);
  const [selMsg,       setSelMsg]       = useState(null);
  const [selTag,       setSelTag]       = useState(null);
  const [editingContact,setEditingContact]=useState(null);
  const [archivedContacts, setArchivedContacts] = useState(new Set());
  const [archivedTags,     setArchivedTags]     = useState(new Set());
  const [emailFlags,       setEmailFlags]       = useState(INIT_EMAIL_FLAGS);
  const [editingTag,       setEditingTag]       = useState(null);
  const [leftCollapsed,    setLeftCollapsed]    = useState({contacts:false,tags:true,archive:true});
  const [settingsTab,      setSettingsTab]      = useState(null); // null | 'profile' | 'accounts' | 'signatures'
  const [selAccounts,      setSelAccounts]      = useState([]);
  // Once real accounts are loaded, select them all by default
  useEffect(() => {
    if (mailAccounts.length === 0) return;
    const allEmails = mailAccounts.map(a => (a.email || '').toLowerCase()).filter(Boolean);
    setSelAccounts(prev => prev.length === 0 ? allEmails : prev.filter(e => allEmails.includes(e)));
  }, [mailAccounts]);
  const [showUserMenu,     setShowUserMenu]     = useState(false);
  const [updateStatus,     setUpdateStatus]     = useState(null); // null | 'checking' | 'uptodate' | 'error'
  const checkForUpdate = useCallback(async ()=>{
    setUpdateStatus('checking');
    try {
      const r = await fetch('version.json?t='+Date.now(), {cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      const {version} = await r.json();
      if(version && version !== APP_VERSION){
        // Force a cold load of the HTML: new query → new cache key
        window.location.replace(window.location.pathname + '?v=' + version);
        return;
      }
      setUpdateStatus('uptodate');
      setTimeout(()=>setUpdateStatus(null), 2000);
    } catch(e) {
      setUpdateStatus('error');
      setTimeout(()=>setUpdateStatus(null), 2500);
    }
  }, []);
  const [searchQuery,      setSearchQuery]      = useState('');
  const [searchScope,      setSearchScope]      = useState('all');
  const [searchActive,     setSearchActive]     = useState(false);
  const userMenuRef = useRef(null);
  const [signatures,       setSignatures]       = useState([]);
  const [accountSigs,      setAccountSigs]      = useState({});
  const [contactFilter,    setContactFilter]    = useState('now');
  const [tagFilter,        setTagFilter]        = useState('all');
  const [msgSnoozeCounts,  setMsgSnoozeCounts]  = useState({});
  const [actionToast,      setActionToast]      = useState(null);
  useEffect(()=>{
    if(!actionToast) return;
    const t=setTimeout(()=>setActionToast(null), 3000);
    return ()=>clearTimeout(t);
  },[actionToast]);
  const [fadingOut,    setFadingOut]    = useState(false); // slow 3s fade (delete/spam)
  const [fadingOutFast,setFadingOutFast]= useState(false); // fast 0.4s fade (last on Now)
  const [pendingMsgId, setPendingMsgId] = useState(undefined);
  const [fadingAlert,  setFadingAlert]  = useState(null); // {amber,blue} frozen while toast shows
  const [detailHeaderH,setDetailHeaderH]= useState(0);
  const [slidingIn,    setSlidingIn]    = useState(false);
  const [slidingOut,   setSlidingOut]   = useState(false);
  useEffect(()=>{
    if(!fadingOut) return;
    const t=setTimeout(()=>{
      const nid = pendingMsgId??null;
      setSelMsg(nid);
      setFadingOut(false);
      setPendingMsgId(undefined);
      setActionToast(null);
      setFadingAlert(null);
      if(nid) setSlidingIn(true); // slide in new mail after fade
    }, 3000);
    return ()=>clearTimeout(t);
  },[fadingOut]);
  useEffect(()=>{
    if(!fadingOutFast) return;
    const t=setTimeout(()=>{
      const nid = pendingMsgId??null;
      setSelMsg(nid);
      setFadingOutFast(false);
      setPendingMsgId(undefined);
      setFadingAlert(null);
      if(nid) setSlidingIn(true);
      // On mobile with no next mail: slide back to col 2 and keep toast visible during transition
      if(isMobile && !nid) {
        setMobileCol(1);
        setTimeout(()=>setActionToast(null), 1800);
      } else {
        setActionToast(null);
      }
    }, 400);
    return ()=>clearTimeout(t);
  },[fadingOutFast]);
  useEffect(()=>{
    if(!slidingOut) return;
    const t=setTimeout(()=>{
      const nid = pendingMsgId??null;
      setSelMsg(nid);
      setSlidingOut(false);
      setPendingMsgId(undefined);
      setActionToast(null);
      if(nid) setSlidingIn(true);
    }, 300);
    return ()=>clearTimeout(t);
  },[slidingOut]);
  useEffect(()=>{
    if(!slidingIn) return;
    const t=setTimeout(()=>setSlidingIn(false), 1550);
    return ()=>clearTimeout(t);
  },[slidingIn]);
  // When staying on same mail: clear fadingAlert once toast auto-clears
  useEffect(()=>{
    if(!actionToast&&!fadingOut) setFadingAlert(null);
  },[actionToast]);

  // Compose
  const [showCompose,  setShowCompose]  = useState(false);
  const [replyTo,      setReplyTo]      = useState(null);
  const [replyKind,    setReplyKind]    = useState(null); // null | 'reply' | 'reply-all' | 'forward'
  const [composeContact,setComposeContact]=useState(null);
  const [composeDraft, setComposeDraft] = useState(null);
  // Per-contact memory: which message was last open in that contact's thread
  const [lastMsgByContact, setLastMsgByContact] = useState(() => new Map());
  // Mobile compose origin: 'contacts' | 'thread' | 'tag' | 'search' | 'detail' | null
  const [composeOrigin, setComposeOrigin] = useState(null);
  const [tagComposeInit,setTagComposeInit]=useState(null);

  const containerRef=useRef(null), leftColRef=useRef(null);
  const colDragRef=useRef(null), rowDragRef=useRef(null);
  const tagsOpenRef=useRef(true); // tracks !leftCollapsed.tags for use in drag handlers
  const [activeColDiv,setActiveColDiv]=useState(null);
  const [activeRowDiv,setActiveRowDiv]=useState(false);

  useEffect(()=>{ tagsOpenRef.current=!leftCollapsed.tags; },[leftCollapsed.tags]);
  useEffect(()=>{
    if(!showUserMenu) return;
    const h=e=>{if(userMenuRef.current&&!userMenuRef.current.contains(e.target))setShowUserMenu(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showUserMenu]);

  // ── Column resize ──
  const onColDivDown=useCallback((e,idx)=>{
    e.preventDefault();
    colDragRef.current={idx,startX:e.clientX,startW:[...colWidths]};
    setActiveColDiv(idx);
  },[colWidths]);

  // ── Tags / Archive divider drag (pixel-based heights) ──
  const onTagsDivDown=useCallback(e=>{
    e.preventDefault();
    rowDragRef.current={which:'tags',startY:e.clientY,startVal:tagsHeight};
    setActiveRowDiv(true);
  },[tagsHeight]);

  const onArchiveDivDown=useCallback(e=>{
    e.preventDefault();
    rowDragRef.current={which:'archive',startY:e.clientY,startVal:archiveHeight};
    setActiveRowDiv(true);
  },[archiveHeight]);

  useEffect(()=>{

    setArchivedTags(prev=>{const s=new Set(prev);archive?s.add(tag):s.delete(tag);return s;});
  }
  function handleEditTag(tag){ setEditingTag(tag); setShowCompose(false); }
  function handleSaveTag({oldTag, name, roles, archived}){
    if(name!==oldTag) handleRenameTag(oldTag,name);
    handleUpdateTagRoles(name,roles);
    handleArchiveTag(name,archived);
    setEditingTag(null);
    // Persist to backend. Tag must already exist server-side (it does if it
    // appeared in usedTags — which means at least one message carries it).
    const tagId = tagIdByName.get(oldTag) || tagIdByName.get(name);
    if (!tagId) return; // purely-local tag; nothing to persist
    const body = { email_roles: roles || {}, archived: !!archived };
    if (name !== oldTag) body.name = name;
    apiFetch(`/tags/${tagId}`, { method:'PATCH', body: JSON.stringify(body) })
      .then(() => {
        // Keep tagIdByName coherent if renamed
        if (name !== oldTag) {
          setTagIdByName(map => {
            const next = new Map(map);
            next.delete(oldTag);
            next.set(name, tagId);
            return next;
          });
        }
      })
      .catch(e => {
        setActionToast('Tag save failed: ' + e.message);
        refreshData();
      });
  }
  function handleToggleAccount(acc){
    if(acc.startsWith('__exclusive__')){
      setSelAccounts([acc.slice('__exclusive__'.length)]);
      return;
    }
    setSelAccounts(prev=>prev.includes(acc)?(prev.length>1?prev.filter(a=>a!==acc):prev):[...prev,acc]);
  }
  // Toggle a contact-level flag (isNews | isMuted | archive). Optimistic flip
  // then PATCH /contacts/:id — revert + toast on failure.
  function handleToggleContactFlag(id, flag){
    const contact = contactList.find(c=>c.id===id);
    if (!contact) return;
    if (flag === 'archive') {
      const wasArchived = archivedContacts.has(id);
      setArchivedContacts(prev=>{const n=new Set(prev);wasArchived?n.delete(id):n.add(id);return n;});
      apiFetch(`/contacts/${id}`, { method:'PATCH', body: JSON.stringify({ archived: !wasArchived }) })
        .catch(e => {
          setArchivedContacts(prev=>{const n=new Set(prev);wasArchived?n.add(id):n.delete(id);return n;});
          setActionToast('Archive failed: ' + e.message);
        });
      return;
    }
    // flag = 'isNews' | 'isMuted'
    const wasOn = !!contact[flag];
    const newVal = !wasOn;
    setContactList(prev => prev.map(c => c.id===id ? {...c, [flag]: newVal} : c));
    const bodyKey = flag === 'isNews' ? 'is_news' : 'is_muted';
    apiFetch(`/contacts/${id}`, { method:'PATCH', body: JSON.stringify({ [bodyKey]: newVal }) })
      .catch(e => {
        setContactList(prev => prev.map(c => c.id===id ? {...c, [flag]: wasOn} : c));
        setActionToast((flag==='isNews'?'News':'Mute') + ' toggle failed: ' + e.message);
      });
  }
  function handleToggleEmailFlag(id, email, flag){
    if(flag==='archive'){
      // per-email archive only updates emailFlags (contact-level archive via checkbox/button)
    }
    setEmailFlags(prev=>{
      const cf={...(prev[id]||{})};
      cf[email]={...(cf[email]||{}),[flag]:!(cf[email]?.[flag])};
      return{...prev,[id]:cf};
    });
  }
  function handleToggleCollapse(key){
    setLeftCollapsed(prev=>{
      const opening = prev[key]; // true = was collapsed, now opening
      const next = {...prev, [key]: !prev[key]};

        const colH = leftColRef.current?.offsetHeight||600;
        const tagsOpen = !prev.tags;
        setArchiveHeight(tagsOpen ? Math.round(colH/6) : Math.round(colH/4));
      }
      return next;
    });
  }
  async function handleUnmergeEmail(contactId, email){
    const contact = contactList.find(c=>c.id===contactId);
    if(!contact || contact.emails.length <= 1) return;
    try {
      await apiFetch(`/contacts/${contactId}/unmerge-email`, {
        method:'POST',
        body: JSON.stringify({ email }),
      });
      refreshData();
    } catch (e) {
      alert('Unmerge failed: ' + e.message);
    }
  }
  async function handleAddMsgTag(msgId, tagName) {
    const prev = msgTags[msgId] || [];
    if (prev.includes(tagName)) return;
    // Optimistic
    setMsgTags(m => ({...m, [msgId]: [...prev.filter(t=>t!==tagName), tagName]}));
    try {
      const r = await apiFetch(`/messages/${msgId}/tags`, {
        method: 'POST',
        body: JSON.stringify({ name: tagName }),
      });
      // Register the (possibly newly-created) tag id so detach can find it.
      if (r.tag) {
        setTagIdByName(map => {
          if (map.get(r.tag.name) === r.tag.id) return map;
          const next = new Map(map); next.set(r.tag.name, r.tag.id); return next;
        });
        setTagList(list => list.find(t => t.id === r.tag.id) ? list : [...list, r.tag]);
      }
    } catch (e) {
      setMsgTags(m => ({...m, [msgId]: (m[msgId]||[]).filter(t=>t!==tagName)}));
      setActionToast('Tag add failed: ' + e.message);
    }
  }
  async function handleRemoveMsgTag(msgId, tagName) {
    const prev = msgTags[msgId] || [];
    if (!prev.includes(tagName)) return;
    // Optimistic
    setMsgTags(m => ({...m, [msgId]: (m[msgId]||[]).filter(t=>t!==tagName)}));
    const tagId = tagIdByName.get(tagName);
    if (!tagId) return; // nothing to detach server-side (tag wasn't server-created)
    try {
      await apiFetch(`/messages/${msgId}/tags/${tagId}`, { method: 'DELETE' });
    } catch (e) {
      setMsgTags(m => ({...m, [msgId]: [...(m[msgId]||[]).filter(t=>t!==tagName), tagName]}));
      setActionToast('Tag remove failed: ' + e.message);
    }
  }
  function handleRenameTag(oldTag,newTag){
    setMsgTags(prev=>{const n={};for(const[k,v]of Object.entries(prev))n[k]=v.map(t=>t===oldTag?newTag:t);return n;});
    setConTags(prev=>{const n={};for(const[k,v]of Object.entries(prev))n[k]=v.map(t=>t===oldTag?newTag:t);return n;});
    setTagRoles(prev=>{const n={...prev};if(n[oldTag]){n[newTag]=n[oldTag];delete n[oldTag];}return n;});
    setSelTag(newTag);

    setTagComposeInit({to:toAddr,cc:ccAddr,bcc:bccAddr,tag:selTag});

            <div style={{width:'100vw',height:'100%',overflow:'hidden',flexShrink:0}}>
              <LeftColumn contactMeta={contactMeta} selectedId={selContact} mergeId={mergeContact}
                onSelect={handleSelectContact} usedTags={usedTags} selectedTag={selTag} onSelectTag={id=>{handleSelectTag(id);if(isMobile)setMobileCol(1);}}
                tagsHeight={tagsHeight} onTagsDividerDrag={onTagsDivDown}
                archivedContacts={archivedContacts} archivedTags={archivedTags}
                archiveHeight={archiveHeight} onArchiveDividerDrag={onArchiveDivDown}
                collapsed={leftCollapsed} onToggleCollapse={handleToggleCollapse}
                emailFlags={emailFlags}
                selAccounts={selAccounts} onToggleAccount={handleToggleAccount}
                mailAccounts={mailAccounts}/>
            </div>
            {/* Mobile Col 2 */}
            <div style={{width:'100vw',height:'100%',overflow:'hidden',flexShrink:0}} className="flex flex-col">
              <div className="flex-1 min-h-0 overflow-hidden">{col2}</div>
            </div>
            {/* Mobile Col 3 */}
            <div style={{width:'100vw',height:'100%',overflow:'hidden',flexShrink:0,position:'relative'}}>
              <div style={{height:'100%', overflow:'hidden', position:'relative'}}>
                {showCompose?(
                  <ComposePane key={`${replyTo?.id??"x"}-${composeContact?.id??"x"}-${composeDraft?.id??"x"}-${tagComposeInit?.to??"x"}`}
                    replyTo={replyTo} replyKind={replyKind} toContact={composeContact} draft={composeDraft}
                    myEmails={mailAccounts.map(a=>(a.email||'').toLowerCase())}
                    initTo={tagComposeInit?.to??""} initCC={tagComposeInit?.cc??""} initBCC={tagComposeInit?.bcc??""} initTag={tagComposeInit?.tag??null}
                    initMsgTags={composeDraft?msgTags[composeDraft.id]||[]:replyTo?msgTags[replyTo.id]||[]:[]}
                    allKnownTags={allKnownTags} selAccounts={selAccounts}
                    signatures={signatures} accountSigs={accountSigs}
                    onSend={handleSend} onSaveDraft={handleSaveDraft} onDeleteDraft={handleDeleteDraft}
                    onClose={handleCloseCompose}
                    mobileBack={handleCloseCompose}
                    mobileBackLabel={
                      composeOrigin==='contacts' ? "Contacts"
                      : composeOrigin==='tag' ? (selTag||"Tags")
                      : composeOrigin==='thread' ? (selectedContact?.name||"Contacts")
                      : searchActive ? "Search"
                      : (selTag || selectedContact?.name || "Contacts")
                    }/>
                ):(
                  <MessageDetail message={selectedMsg} contact={detailContact}
                    isDeleted={selMsg!==null&&deletedIds.includes(selMsg)}
                    msgTags={msgTags[selMsg]||[]} allTags={allKnownTags}
                    selAccounts={selAccounts}
                    onReply={()=>handleReply(selectedMsg)} onReplyAll={()=>handleReplyAll(selectedMsg)} onForward={()=>handleForward(selectedMsg)}
                    onDelete={()=>handleDelete(selMsg)} onRecover={()=>handleRecover(selMsg)}
                    onDismissR2m={handleDismissR2m} onR2mSeen={handleR2mSeen} onR2mSnooze={handleR2mSnooze}
                    onMarkRead={handleMarkRead} onSnooze={handleSnoozeMsg} onSpam={handleSpam}
                    snoozeCount={msgSnoozeCounts[selMsg]||0}
                    onAddTag={handleAddMsgTag} onRemoveTag={handleRemoveMsgTag}
                    fadeOut={fadingOut} fadeOutFast={fadingOutFast} slideIn={slidingIn} slideOut={slidingOut} fadingAlert={fadingAlert}
                    onHeaderHeight={setDetailHeaderH}
                    mobileBack={()=>setMobileCol(1)}
                    mobileBackLabel={searchActive?"Search":(selTag||detailContact?.name||"Mail")}/>
                )}
              </div>
            </div>
          </div></div>
        ) : (
          /* ── Desktop: existing 3-column resizable layout ── */
          <>
            {/* Col 1 */}
            <div ref={leftColRef} style={{width:colWidths[0]+"%",minWidth:"10%",overflow:"hidden"}}>
              <LeftColumn contactMeta={contactMeta} selectedId={selContact} mergeId={mergeContact}
                onSelect={handleSelectContact} usedTags={usedTags} selectedTag={selTag} onSelectTag={handleSelectTag}
                tagsHeight={tagsHeight} onTagsDividerDrag={onTagsDivDown}
                archivedContacts={archivedContacts} archivedTags={archivedTags}
                archiveHeight={archiveHeight} onArchiveDividerDrag={onArchiveDivDown}
                collapsed={leftCollapsed} onToggleCollapse={handleToggleCollapse}
                emailFlags={emailFlags}
                selAccounts={selAccounts} onToggleAccount={handleToggleAccount}
                mailAccounts={mailAccounts}/>
            </div>

            <div onMouseDown={e=>onColDivDown(e,0)} className={`col-divider${activeColDiv===0?" active":""}`}/>

            {/* Col 2 */}
            <div style={{width:colWidths[1]+"%",minWidth:"10%",overflow:"hidden"}} className="flex flex-col">
              <div className="flex-1 min-h-0 overflow-hidden">{col2}</div>
            </div>

            <div onMouseDown={e=>onColDivDown(e,1)} className={`col-divider${activeColDiv===1?" active":""}`}/>

            {/* Col 3 */}
            <div style={{width:colWidths[2]+"%",minWidth:"10%",overflow:"hidden"}} className="relative">
              {showCompose?(
                <ComposePane key={`${replyTo?.id??"x"}-${composeContact?.id??"x"}-${composeDraft?.id??"x"}-${tagComposeInit?.to??"x"}`}
                  replyTo={replyTo} replyKind={replyKind} toContact={composeContact} draft={composeDraft}
                  myEmails={mailAccounts.map(a=>(a.email||'').toLowerCase())}
                  initTo={tagComposeInit?.to??""} initCC={tagComposeInit?.cc??""} initBCC={tagComposeInit?.bcc??""} initTag={tagComposeInit?.tag??null}
                  initMsgTags={composeDraft?msgTags[composeDraft.id]||[]:replyTo?msgTags[replyTo.id]||[]:[]}
                  allKnownTags={allKnownTags}
                  selAccounts={selAccounts}
                  signatures={signatures} accountSigs={accountSigs}
                  onSend={handleSend} onSaveDraft={handleSaveDraft} onDeleteDraft={handleDeleteDraft}
                  onClose={handleCloseCompose}/>
              ):(
                <MessageDetail message={selectedMsg} contact={detailContact}
                  isDeleted={selMsg!==null&&deletedIds.includes(selMsg)}
                  msgTags={msgTags[selMsg]||[]} allTags={allKnownTags}
                  selAccounts={selAccounts}
                  onReply={()=>handleReply(selectedMsg)} onReplyAll={()=>handleReplyAll(selectedMsg)} onForward={()=>handleForward(selectedMsg)}
                  onDelete={()=>handleDelete(selMsg)} onRecover={()=>handleRecover(selMsg)}
                  onDismissR2m={handleDismissR2m} onR2mSeen={handleR2mSeen} onR2mSnooze={handleR2mSnooze}
                  onMarkRead={handleMarkRead} onSnooze={handleSnoozeMsg} onSpam={handleSpam}
                  snoozeCount={msgSnoozeCounts[selMsg]||0}
                  onAddTag={handleAddMsgTag} onRemoveTag={handleRemoveMsgTag}
                  fadeOut={fadingOut} fadeOutFast={fadingOutFast} slideIn={slidingIn} slideOut={slidingOut} fadingAlert={fadingAlert}
                  onHeaderHeight={setDetailHeaderH}/>
              )}
              {/* Toast — outside MessageDetail so it never fades with the message */}
              {actionToast&&!showCompose&&(
                <div style={{position:'absolute',left:16,right:16,top:detailHeaderH+12,zIndex:20}}
                  className="px-3 py-2.5 rounded bg-gray-800 border border-transparent text-white text-xs flex items-center gap-2 pointer-events-none">
                  {actionToast}
                </div>
              )}
            </div>
          </>
        )}
      </div>

      {/* Status bar — desktop only */}
      {!isMobile&&<div className="h-6 bg-white border-t border-gray-200 flex items-center px-4 gap-3 text-xs text-gray-400 flex-shrink-0">
        <span>Last sync: just now</span><span>·</span>
        <span><span className="font-bold text-indigo-600">{totalUnread}</span> unread</span>
        {totalR2m>0&&<><span>·</span><span><span className="font-bold text-amber-500">{totalR2m}</span> revert2me</span></>}
        {mergeContact&&<><span>·</span><span className="text-violet-500 font-medium">Merge mode — Shift+click a contact</span></>}
      </div>}
    </div>
  );
}

function Root() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out, object = logged in
  const [recoveryMode, setRecoveryMode] = useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((event, sess) => {
      setSession(sess ?? null);
      if (event === 'PASSWORD_RECOVERY') setRecoveryMode(true);
      if (event === 'USER_UPDATED' && recoveryMode) setRecoveryMode(false);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-100 flex items-center justify-center">
      <div className="text-sm text-gray-400">Loading…</div>
    </div>;
  }

  // Recovery: user clicked reset-password link in email. Show set-new-password screen regardless of session.
  if (recoveryMode) return <RecoveryScreen onDone={()=>setRecoveryMode(false)}/>;

  if (!session) return <LoginScreen/>;

  return <App onSignOut={async ()=>{ await sb.auth.signOut(); }}/>;
}

function RecoveryScreen({onDone}) {
  const [newPass, setNewPass]   = useState('');
  const [newPass2, setNewPass2] = useState('');
  const [err, setErr]           = useState('');
  const [busy, setBusy]         = useState(false);
  const cardCls = "bg-white rounded-2xl shadow-xl px-6 py-8 sm:px-10 sm:py-10 w-full max-w-sm";
  const inputCls = "w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition";
  async function submit(e) {
    e.preventDefault();
    if(newPass.length<6){setErr('Password must be at least 6 characters.');return;}
    if(newPass!==newPass2){setErr('Passwords do not match.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.updateUser({ password: newPass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    onDone();
  }
  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-100 flex flex-col items-center justify-center px-4 py-6">
      <div className={cardCls}>
        <div className="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-2xl mx-auto mb-5">✓</div>
        <h1 className="text-xl font-bold text-gray-900 mb-1 text-center">Set a new password</h1>
        <p className="text-sm text-gray-400 mb-6 text-center">Choose something at least 6 characters.</p>
        {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
        <form onSubmit={submit} className="space-y-4">
          <input autoFocus type="password" value={newPass} onChange={e=>{setNewPass(e.target.value);setErr('');}} placeholder="New password" className={inputCls}/>
          <input type="password" value={newPass2} onChange={e=>{setNewPass2(e.target.value);setErr('');}} placeholder="Confirm new password" className={inputCls}/>
          <button type="submit" disabled={busy}
            className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold transition">
            {busy?'Saving…':'Save & continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
