            ))}
          </div>
        </div>

        {/* Sticky filter tabs — colored active states, bg matches card above */}
        <div className="bg-gray-50 border-b border-gray-200 flex-shrink-0 px-5 py-2" style={{position:'sticky',top:0,zIndex:10,overscrollBehavior:'none'}}>
          <div className="flex gap-0.5 flex-wrap">
            {FILTER_TABS.map(f=>{
              const k=f.toLowerCase(), active=filter===k;
              const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
                in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
                draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
                :"text-gray-400 hover:text-gray-600";
              return <button key={f} onClick={()=>setFilterAndSave(k)}
                className={`px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{f}</button>;
            })}
          </div>
        </div>

        {/* Messages */}
        <div ref={listRef} className="flex-shrink-0 bg-white">
          {msgs.length===0&&<div className="text-center text-gray-300 text-sm mt-10">No messages</div>}
          {msgs.map(msg=>{
            const isSel=msg.id===selectedMsgId, isDel=deletedIds.includes(msg.id), isDraft=!!msg.draft&&!isDel;
            const isOut=msg.dir==="out"||isDraft;
            const dt=isDraft?formatTime(msg.modifiedAt||msg.date):formatTime(msg.date);
            return (
              <div key={msg.id} data-msgid={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelect(msg.id)}
                className={`py-2.5 border-b border-gray-100 cursor-pointer transition-colors
                  ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":"hover:bg-gray-50"}
                  ${isDel?"opacity-60":""}
                  ${isOut?"pl-10 pr-4":"pl-4 pr-4"}`}>
                <div className="flex items-center justify-between gap-1 mb-0.5">
                  <div className="flex items-center gap-1.5 min-w-0">
                    {!msg.read&&!isDel&&!isDraft&&msg.dir==="in"&&<span className="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"/>}
                    {msg.revert2me&&msg.dir==="out"&&!isDel&&!isDraft&&<span className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"/>}
                    <span className={`text-xs truncate ${(!msg.read&&!isDel&&!isDraft)?"font-semibold text-gray-900":"text-gray-600"}`}>{msg.subject}</span>
                    {msg.hasAttachments&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-400 flex-shrink-0" aria-label="has attachment"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>}
                  </div>
                  <span className="text-xs text-gray-400 flex-shrink-0">{dt}</span>
                </div>
                <div className="flex items-center gap-1.5 pr-14">
                  {isDraft?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                    :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==="in"?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==="in"?"In":"Out"}</span>}
                  {isDel&&<span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>}
                  <span className="text-xs text-gray-400 truncate flex-1 min-w-0">{msg.body.replace(/\n/g," ")}</span>
                </div>
              </div>
            );
          })}
        </div>
        </div>{/* end min-height wrapper */}
        </div>{/* end scrollable content */}
      </div>
    );
  }

  return (
    <div className="flex flex-col h-full bg-white">
      {/* Contact card */}
      <div className="px-5 pt-5 pb-3 border-b border-gray-200 flex-shrink-0 bg-gray-50">
        <div className="flex items-start gap-4 mb-2">
          <Avatar contact={contact} size={80}/>
          <div className="min-w-0 flex-1 pt-1">
            <div className="flex items-center gap-1.5">
              <div className="flex items-center gap-1.5 cursor-pointer flex-1 min-w-0"
                onMouseEnter={()=>setNameHover(true)} onMouseLeave={()=>setNameHover(false)}
                onClick={onEditContact}>
                <span className="font-semibold text-gray-900 text-base leading-snug hover:text-indigo-700 transition-colors truncate">{contact.name}</span>
                <span className={`flex items-center justify-center text-gray-400 transition-opacity flex-shrink-0 ${nameHover?"opacity-100":"opacity-0"}`}
                  style={{padding:2}}>
                  <PencilIcon size={11}/>
                </span>
              </div>
              {[['News','isNews'],['Mute','isMuted']].map(([label,key])=>{
                const on=!!contact[key];
                const cls=on?'bg-indigo-50 border-indigo-300 text-indigo-600'
                  :'border-gray-200 text-gray-300 hover:border-gray-300 hover:text-gray-500';
                return <button key={label} onClick={()=>onToggleFlag?.(contact.id,key)}
                  className={`text-xs px-1.5 py-0.5 rounded border flex-shrink-0 transition-colors ${cls}`}>
                  {label}
                </button>;
              })}
            </div>
            {contact.org&&<div className="text-xs text-gray-400 mt-0.5">{contact.org}</div>}
            <div className="mt-1.5 space-y-0.5">
              {contact.emails.map((e,i)=>(
                <div key={e} className="flex items-center gap-1.5">
                  <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${i===0?"bg-indigo-400":"bg-gray-300"}`}/>
                  <span className="text-xs text-gray-400 truncate">{e}</span>
                </div>
              ))}
            </div>
          </div>
          {/* New message button only */}
          <button onClick={onNewMsg} title="New message"
            className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex-shrink-0">
            <PlusIcon size={12}/>
          </button>
        </div>
        {/* Filter tabs */}
        <div className="flex gap-0.5 flex-wrap mt-1">
          {FILTER_TABS.map(f=>{
            const k=f.toLowerCase(), active=filter===k;
            const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
              in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
              draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
              :"text-gray-400 hover:text-gray-600";
            return <button key={f} onClick={()=>setFilterAndSave(k)}
              className={`px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{f}</button>;
          })}
        </div>
      </div>
      {/* Messages */}
      <div ref={listRef} className="flex-1 overflow-y-auto scroll">
        {msgs.length===0&&<div className="text-center text-gray-300 text-sm mt-10">No messages</div>}
        {msgs.map(msg=>{
          const isSel=msg.id===selectedMsgId, isDel=deletedIds.includes(msg.id), isDraft=!!msg.draft&&!isDel;
          const isOut=msg.dir==="out"||isDraft;
          const dt=isDraft?formatTime(msg.modifiedAt||msg.date):formatTime(msg.date);
          return (
            <div key={msg.id} data-msgid={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelect(msg.id)}
              className={`py-2.5 border-b border-gray-100 cursor-pointer transition-colors
                ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":"hover:bg-gray-50"}
                ${isDel?"opacity-60":""}
                ${isOut?"pl-10 pr-4":"pl-4 pr-4"}`}>
              <div className="flex items-center justify-between gap-1 mb-0.5">
                <div className="flex items-center gap-1.5 min-w-0">
                  {!msg.read&&!isDel&&!isDraft&&msg.dir==="in"&&<span className="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"/>}
                  {msg.revert2me&&msg.dir==="out"&&!isDel&&!isDraft&&<span className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"/>}
                  <span className={`text-xs truncate ${(!msg.read&&!isDel&&!isDraft)?"font-semibold text-gray-900":"text-gray-600"}`}>{msg.subject}</span>
                  {msg.hasAttachments&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-400 flex-shrink-0" aria-label="has attachment"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>}
                </div>
                <span className="text-xs text-gray-400 flex-shrink-0">{dt}</span>
              </div>
              <div className="flex items-center gap-1.5 pr-14">
                {isDraft?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                  :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==="in"?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==="in"?"In":"Out"}</span>}
                {isDel&&<span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>}
                <span className="text-xs text-gray-400 truncate flex-1 min-w-0">{msg.body.replace(/\n/g," ")}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const ROLE_OPTIONS = ["", "To", "CC", "BCC"];

// ─── Tag View ─────────────────────────────────────────────────────────────────

function TagView({tag, messages, contacts, deletedIds, msgTags, emailRoles, myEmails, msgMatchesSearch, selectedMsgId, onSelectMsg, onSelectDraft,
                  onEditTag, onUpdateRoles, onNewTagMsg, savedFilter, onFilterChange, onSelectContact, mobileBack}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const tagFilter = savedFilter||'all';
  const setTagFilterAndSave = f=>onFilterChange?.(f);
  const tagSortKey=x=>x.draft?(x.modifiedAt||x.date):x.date;
  const allTaggedMsgs = messages.filter(m=>(msgTags[m.id]||[]).includes(tag))
    .sort((a,b)=>tagSortKey(b).localeCompare(tagSortKey(a)));
  const searchFn = msgMatchesSearch || (()=>true);
  const taggedMsgs = allTaggedMsgs.filter(m=>{
    if(!searchFn(m)) return false;
    if(tagFilter==='in')    return m.dir==='in' && !m.draft && !deletedIds.includes(m.id);
    if(tagFilter==='out')   return m.dir==='out' && !m.draft && !deletedIds.includes(m.id);
    if(tagFilter==='draft') return !!m.draft && !deletedIds.includes(m.id);
    return true; // 'all'
  });

  // Stats and emails always based on ALL tagged messages (not the filtered subset)
  const myEmailSet = new Set((myEmails || []).map(x => x.toLowerCase()));
  const involvedEmails = [...new Set(
    allTaggedMsgs.flatMap(m=>[m.from,m.to]).filter(e => e && !myEmailSet.has(e.toLowerCase()))
  )];
  const oldest = allTaggedMsgs.length ? allTaggedMsgs[allTaggedMsgs.length-1].date : null;
  const newest = allTaggedMsgs.length ? allTaggedMsgs[0].date : null;

  const [nameHover, setNameHover] = useState(false);
  const roles = emailRoles||{};

  return (
    <div className={`flex flex-col h-full bg-white${isMobile?' overflow-hidden':''}`}>
      {/* Fixed back header (mobile) — outside scroll */}
      {isMobile&&mobileBack&&(
        <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
          <div className="flex items-center gap-2 px-3 py-2">
            <button onClick={mobileBack}
              className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Tags
            </button>
          </div>
        </div>
      )}
      <div className={isMobile?'flex-1 min-h-0 overflow-y-auto scroll':'flex flex-col h-full'}
        style={isMobile?{WebkitOverflowScrolling:'touch',overflowX:'hidden'}:{}}>
      <div style={isMobile?{minHeight:'calc(100% + 1px)'}:{display:'contents'}}>
      {/* Tag card */}
      <div className="px-5 pt-4 pb-3 flex-shrink-0 bg-gray-50" style={isMobile?{overflowX:'hidden'}:{}}>

        {/* Header row: tag icon + name + inline pencil + new msg button */}
        <div className="flex items-start justify-between gap-2 mb-3">
          <div className="flex items-start gap-1.5 cursor-pointer min-w-0 flex-1"
            onClick={onEditTag}>
            <span className="text-indigo-500 flex-shrink-0 mt-1"><TagIcon size={14}/></span>
            <span className="font-bold text-gray-900 text-base hover:text-indigo-700 transition-colors leading-snug">
              {tag}<span className="text-gray-400 align-middle ml-1 inline-flex"><PencilIcon size={11}/></span>
            </span>
          </div>
          <button onClick={onNewTagMsg} title="New message"
            className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex-shrink-0">
            <PlusIcon size={12}/>
          </button>
        </div>

        {/* View mode: stats + email list side by side */}
        <div className="flex items-start gap-4">
          {/* Figures */}
          <div className="flex gap-4 flex-shrink-0">
            <div><div className="text-xs text-gray-400 mb-0.5">Messages</div>
              <div className="text-sm font-semibold text-gray-800">{allTaggedMsgs.length}</div></div>
            {oldest&&<div><div className="text-xs text-gray-400 mb-0.5">Oldest</div>
              <div className="text-sm font-medium text-gray-700">{new Date(oldest).toLocaleDateString("nl-NL",{day:"numeric",month:"short"})}</div></div>}
            {newest&&<div><div className="text-xs text-gray-400 mb-0.5">Newest</div>
              <div className="text-sm font-medium text-gray-700">{new Date(newest).toLocaleDateString("nl-NL",{day:"numeric",month:"short"})}</div></div>}
          </div>
          {/* Email addresses — right of figures, separated by a subtle divider */}
          {involvedEmails.length>0&&(
            <div className="flex-1 min-w-0 border-l border-gray-200 pl-4">
              <div className="text-xs text-gray-400 mb-0.5">Addresses</div>
              <div className="space-y-0.5">
                {involvedEmails.map(e=>{
                  const c=contacts.find(c=>c.emails.includes(e));
                  const canNav=!!(c&&onSelectContact);
                  return (
                    <div key={e} className={`flex items-center gap-1.5 min-w-0 group${canNav?" cursor-pointer":""}`}
                      onClick={canNav?()=>onSelectContact(c.id):undefined}>
                      <span className={`text-xs truncate min-w-0 flex-1 ${canNav?"text-gray-600 group-hover:text-indigo-600 group-hover:underline":"text-gray-600"}`}>{e}</span>
                      {c&&<span className={`text-xs flex-shrink-0 truncate ${canNav?"text-gray-400 group-hover:text-indigo-500 group-hover:underline":"text-gray-400"}`}>{c.name}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Filter tabs — colored active states, bg matches tag card above */}
      <div className="flex gap-0.5 px-3 py-2 border-b border-gray-200 flex-shrink-0 bg-gray-50"
        style={isMobile?{position:'sticky',top:37,zIndex:10,overscrollBehavior:'none'}:{}}>
        {['All','In','Out','Draft'].map(f=>{
          const k=f.toLowerCase(), active=tagFilter===k;
          const style=active?{all:"bg-gray-200 text-gray-700 font-semibold",in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",draft:"bg-gray-100 text-gray-600 font-semibold"}[k]:"text-gray-400 hover:text-gray-600";
          return <button key={f} onClick={()=>setTagFilterAndSave(k)}
            className={`px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{f}</button>;
        })}
      </div>

      {/* Tagged messages */}
      <div className={isMobile?"flex-shrink-0":"flex-1 overflow-y-auto scroll"}>
        {taggedMsgs.length===0&&<div className="text-center text-gray-300 text-sm mt-10">No messages</div>}
        {taggedMsgs.map(msg=>{
          const contact=contacts.find(c=>c.id===msg.contactId);
          const isDraft=!!msg.draft;
          const isOut=msg.dir==="out"||isDraft;
          const rowAvatar=isOut?(msg.sender||null):contact;
          const rowName=isOut?(msg.sender?.name||'Me'):contact?.name;
          return (
            <div key={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelectMsg(msg.id)}
              className={`${isOut?"pl-10":"pl-4"} pr-4 py-2.5 border-b border-gray-100 cursor-pointer transition-colors ${deletedIds.includes(msg.id)?"opacity-50":""}
                ${msg.id===selectedMsgId?"bg-indigo-50 border-l-2 border-l-indigo-400":"hover:bg-gray-50"}`}>
              <div className="flex items-center justify-between gap-1 mb-0.5">
                <div className="flex items-center gap-2 min-w-0">
                  {rowAvatar&&<Avatar contact={rowAvatar} size={20}/>}
                  <span className="text-xs font-medium text-gray-700 truncate">{rowName}</span>
                </div>
                <span className="text-xs text-gray-400 flex-shrink-0">{formatTime(msg.date)}</span>
              </div>
              <div className="flex items-center gap-1.5 pl-6 pr-14">
                {isDraft
                  ?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                  :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==="in"?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==="in"?"In":"Out"}</span>}
                <span className="text-xs text-gray-600 truncate">{msg.subject}</span>
              </div>
              <div className="pl-6 pr-14 mt-0.5">
                <span className="text-xs text-gray-400 truncate block">{msg.body.replace(/\n/g," ")}</span>
              </div>
            </div>
          );
        })}
      </div>
      </div>{/* end min-height wrapper */}
      </div>{/* end scrollable content */}
    </div>
  );
}

  );
}

// ─── Global Search Results ───────────────────────────────────────────────────

const SEARCH_FILTER_TABS = ["Now","All","In","Out","Draft","Deleted"];

function GlobalSearchResults({messages, contacts, deletedIds, msgTags, msgMatchesSearch, selectedMsgId, onSelectMsg, onSelectDraft}) {
  const [filter, setFilter] = useState('all');

  const filtered = useMemo(()=>{
    const del = x => deletedIds.includes(x.id);
    let m = messages.filter(msgMatchesSearch);
    if(filter==='now')     m = m.filter(x=>!del(x)&&!x.draft&&((x.dir==='in'&&!x.read)||(x.dir==='out'&&x.revert2me)));
    else if(filter==='in')      m = m.filter(x=>x.dir==='in'&&!x.draft&&!del(x));
    else if(filter==='out')     m = m.filter(x=>x.dir==='out'&&!x.draft&&!del(x));
    else if(filter==='draft')   m = m.filter(x=>x.draft&&!del(x));
    else if(filter==='deleted') m = m.filter(x=>del(x));
    else m = m.filter(x=>!del(x));
    return [...m].sort((a,b)=>filter==='draft'?(b.modifiedAt||b.date).localeCompare(a.modifiedAt||a.date):b.date.localeCompare(a.date));
  },[messages,deletedIds,filter,msgMatchesSearch]);

  return (
    <div className="flex flex-col h-full bg-white">
      {/* Filter bar */}
      <div className="flex gap-0.5 px-3 py-2 border-b border-gray-200 flex-shrink-0 bg-gray-50">
        {SEARCH_FILTER_TABS.map(f=>{
          const k=f.toLowerCase(), active=filter===k;
          const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
            in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
            draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
            :"text-gray-400 hover:text-gray-600";
          return <button key={f} onClick={()=>setFilter(k)}
            className={`px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{f}</button>;
        })}
      </div>
      {/* Results list */}
      <div className="flex-1 overflow-y-auto scroll">
        {filtered.length===0&&<div className="text-center text-gray-300 text-sm mt-10">No results</div>}
        {filtered.map(msg=>{
          const contact=contacts.find(c=>c.id===msg.contactId);
          const isDraft=!!msg.draft;
          const isOut=msg.dir==='out'||isDraft;
          const rowContact=isOut?(msg.sender||null):contact;
          const rowName=isOut?(msg.sender?.name||'Me'):contact?.name??msg.from;
          const isSel=msg.id===selectedMsgId;
          return (
            <div key={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelectMsg(msg.id)}
              className={`${isOut?"pl-10":"pl-4"} pr-4 py-2.5 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors
                ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":""}
                ${deletedIds.includes(msg.id)?"opacity-50":""}`}>
              <div className="flex items-center justify-between gap-1 mb-0.5">
                <div className="flex items-center gap-2 min-w-0">
                  {rowContact&&<Avatar contact={rowContact} size={20}/>}
                  <span className="text-xs font-medium text-gray-700 truncate">{rowName}</span>
                </div>
                <span className="text-xs text-gray-400 flex-shrink-0">{formatTime(msg.date)}</span>
              </div>
              <div className="flex items-center gap-2 pr-4 mt-0.5">
                {/* dot column — same width as avatar (20px) so it sits centered under it */}
                <div style={{width:20,flexShrink:0}} className="flex justify-center">
                  {!msg.read&&!isDraft&&msg.dir==='in'&&!deletedIds.includes(msg.id)
                    ?<span className="w-1.5 h-1.5 rounded-full bg-indigo-500"/>
                    :msg.revert2me&&msg.dir==='out'&&!isDraft&&!deletedIds.includes(msg.id)
                      ?<span className="w-1.5 h-1.5 rounded-full bg-amber-400"/>
                      :null}
                </div>
                <div className="flex items-center gap-1.5 min-w-0 flex-1">
                  {isDraft
                    ?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                    :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==='in'?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==='in'?"In":"Out"}</span>}
                  {deletedIds.includes(msg.id)&&<span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>}
                  <span className={`text-xs truncate ${!msg.read&&!isDraft&&msg.dir==='in'&&!deletedIds.includes(msg.id)?"font-semibold text-gray-800":"text-gray-600"}`}>{msg.subject}</span>
                </div>
              </div>
              <div className="flex gap-2 pr-4 mt-0.5">
                <div style={{width:20,flexShrink:0}}/>
                <span className="text-xs text-gray-400 truncate flex-1">{msg.body.replace(/\n/g," ")}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Left Column ─────────────────────────────────────────────────────────────

function LeftColumn({contactMeta, archivedContacts, selectedId, mergeId, onSelect,
                     usedTags, archivedTags, selectedTag, onSelectTag,
                     tagsHeight, onTagsDividerDrag, archiveHeight, onArchiveDividerDrag,
                     collapsed, onToggleCollapse,
                     emailFlags,
                     selAccounts, onToggleAccount,
                     mailAccounts=[]}) {
  const [accDropOpen, setAccDropOpen] = useState(false);
  const [contactTab,  setContactTab]  = useState('Convo');
  const [archiveTagsVisible, setArchiveTagsVisible] = useState(false);
  const accDropRef = useRef(null);
  const tagsDivStartY = useRef(null);
  const archiveDivStartY = useRef(null);

  useEffect(()=>{
    if(!accDropOpen)return;
    const h=e=>{if(accDropRef.current&&!accDropRef.current.contains(e.target))setAccDropOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[accDropOpen]);

  function getTab(id){
    const c = contactMeta.find(m => m.contact.id === id)?.contact;
    if (!c) return 'Convo';
    if (archivedContacts.has(id)) return 'Archive';
    if (c.isMuted) return 'Muted';
    if (c.isNews)  return 'News';
    return 'Convo';
  }
  const activeContacts  = contactMeta
    .filter(m=>getTab(m.contact.id,m.contact.emails)===contactTab)
    .slice()
    .sort((a,b)=>{
      // Actionable contacts (badge > 0) first; within each group preserve original order
      const ba = a.unread + (a.r2mCount||0);
      const bb = b.unread + (b.r2mCount||0);
      if((ba>0)!==(bb>0)) return ba>0 ? -1 : 1;
      return 0;
    });
  const activeTags      = usedTags.filter(t=>!archivedTags.has(t));
  const archiveTags     = usedTags.filter(t=>archivedTags.has(t));
  function tabBadge(tab){
    return contactMeta.filter(m=>getTab(m.contact.id,m.contact.emails)===tab)
      .reduce((s,m)=>s+m.unread+(m.r2mCount||0),0);
  }

  const labelForEmail = (email) => {
    const a = mailAccounts.find(a => (a.email||'').toLowerCase() === email);
    return a ? (a.display_name || a.email) : email;
  };
  const accountLabel = mailAccounts.length === 0
    ? 'No accounts'
    : selAccounts.length === mailAccounts.length ? 'All accounts'
    : selAccounts.length === 1 ? labelForEmail(selAccounts[0])
    : selAccounts.length === 0 ? '(none)'
    : `${selAccounts.length} accounts`;

  function CollapseIcon({open}) {
    return <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d={open?"M2 3.5L5 6.5L8 3.5":"M3.5 2L6.5 5L3.5 8"} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>;
  }

  function ContactRow({contact, unread, hasR2m, r2mCount}) {
    const isSel=contact.id===selectedId, isMerge=contact.id===mergeId;
    const badge = unread + (r2mCount||0);
    const badgeColor = (r2mCount||0)>0 ? 'bg-amber-500' : 'bg-indigo-600';
    return (
      <div onClick={e=>onSelect(contact.id,e)}
        className={`px-3 py-2 border-b border-gray-100 cursor-pointer transition-colors
          ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-500":""}
          ${isMerge?"bg-violet-50 border-l-2 border-l-violet-500":""}
          ${!isSel&&!isMerge?"hover:bg-gray-50":""}`}>
        <div className="flex items-center gap-2.5">
          <Avatar contact={contact} size={28}/>
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-1">
              <span className={`text-sm truncate ${badge>0?"font-semibold text-gray-900":"text-gray-700"}`}>
                {isMerge&&<span className="mr-1 text-violet-400">⇄</span>}{contact.name}
              </span>
              {badge>0&&<span className={`${badgeColor} text-white rounded-full flex-shrink-0 font-bold`}
                style={{minWidth:22,height:16,fontSize:"0.55rem",padding:"0 6px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {badge}
              </span>}
            </div>
            <div className="flex items-center mt-0.5">
              <span className="text-xs text-gray-400 truncate">{contact.org||contact.emails[0]}</span>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function TagRow({tag}) {
    const isTagSel=tag===selectedTag;
    return (
      <div onClick={()=>onSelectTag(tag)}
        className={`px-3 py-2.5 border-b border-gray-100 cursor-pointer transition-colors
          ${isTagSel?"bg-indigo-50 border-l-2 border-l-indigo-500":"hover:bg-gray-50"}`}>
        <div className="flex items-center gap-2">
          <span className={`flex-shrink-0 ${isTagSel?"text-indigo-600":"text-indigo-400"}`}><TagIcon size={12}/></span>
          <span className={`text-sm truncate ${isTagSel?"font-semibold text-gray-900":"text-gray-700"}`}>
            {tag}
          </span>
        </div>
      </div>
    );
  }

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

  if (isMobile) {
    // Tags bottom sheet:
    //  - closed (40px): just header stuck to bottom
    //  - open & contacts open: 33% bottom
    //  - open & contacts collapsed: leaves just account selector + contacts header visible (~76px)
    const tagsSheetHeight = collapsed.tags
      ? 36
      : (collapsed.contacts ? 'calc(100% - 60px)' : '40%');
    return (
      <div className="relative h-full bg-gray-50 overflow-hidden flex flex-col">
        {/* Full scrollable area — accounts + CONTACTS label scroll away, only tabs stay sticky */}
        <div className="flex-1 overflow-y-auto scroll" style={{paddingBottom: 40}}>
          {/* Account selector — scrolls with content */}
          <div className="border-b border-gray-100 bg-white relative" ref={accDropRef}>
            <button onClick={()=>setAccDropOpen(o=>!o)}
              className="w-full px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between hover:text-gray-600 transition-colors">
              <span className="truncate flex-1 text-left">{accountLabel}</span>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className="flex-shrink-0 mr-1">
                <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
            {accDropOpen&&(
              <div className="absolute left-0 right-0 top-full z-50 bg-white border border-gray-200 rounded-b-lg shadow-lg overflow-hidden">
                {mailAccounts.length===0 && <div className="px-3 py-2 text-xs text-gray-400">No mail accounts connected.</div>}
                {mailAccounts.map(a=>{
                  const email=(a.email||'').toLowerCase();
                  const checked=selAccounts.includes(email);
                  return (
                    <div key={a.id} className="flex items-center gap-2 px-3 py-2 hover:bg-gray-50">
                      <input type="checkbox" checked={checked}
                        onChange={e=>{e.stopPropagation();onToggleAccount(email);}}
                        className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                      <span className="text-xs text-gray-700 truncate flex-1 cursor-pointer"
                        onClick={()=>{onToggleAccount('__exclusive__'+email);setAccDropOpen(false);}}>
                        {a.display_name ? <><span>{a.display_name}</span> <span className="text-gray-400">· {a.email}</span></> : a.email}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {/* CONTACTS label — scrolls away; click to collapse */}
          <div onClick={()=>onToggleCollapse('contacts')}
            className="border-b border-gray-100 bg-white cursor-pointer select-none hover:bg-gray-50 transition-colors">
            <div className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between" style={{height:30}}>
              <span>Contacts
                {mergeId!==null&&<span className="ml-2 text-indigo-500 normal-case font-normal">· Shift+click</span>}
              </span>
            </div>
          </div>
          {/* Sticky Tabs — only when contacts open */}
          {!collapsed.contacts&&<div className="bg-white border-b border-gray-100" style={{position:'sticky',top:0,zIndex:10}}>
            <div className="flex px-2 pt-[3px] pb-1.5 gap-0.5">
              {['Convo','News','Muted','Archive'].map(tab=>{
                const active=contactTab===tab;
                const badge=(!active&&(tab==='Convo'||tab==='News'))?tabBadge(tab):0;
                return <button key={tab} onClick={()=>setContactTab(tab)}
                  className={`flex-1 text-xs py-1 rounded transition-colors ${active?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
                  {tab}{badge>0&&<span className="ml-0.5 opacity-70">({badge})</span>}
                </button>;
              })}
            </div>
          </div>}
          {/* Contacts list */}
          {!collapsed.contacts&&<div className="bg-gray-50">
            {activeContacts.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">
              {contactTab==='News'?'No newsletter contacts':contactTab==='Muted'?'No muted contacts':contactTab==='Archive'?'No archived contacts':'No contacts'}
            </div>}
            {activeContacts.map(({contact,unread,hasR2m,r2mCount})=><ContactRow key={contact.id} contact={contact} unread={unread} hasR2m={hasR2m} r2mCount={r2mCount}/>)}
          </div>}
        </div>

        {/* Tags bottom sheet — sticky at bottom */}
        <div className="absolute left-0 right-0 bottom-0 bg-white border-t border-gray-200 flex flex-col"
          style={{height: tagsSheetHeight, transition: 'height 0.25s ease', boxShadow: collapsed.tags ? 'none' : '0 -4px 12px rgba(0,0,0,0.06)'}}>
          {/* Header — fully clickable */}
          <div className="flex items-center justify-between cursor-pointer select-none flex-shrink-0 hover:bg-gray-50 transition-colors px-3"
            onClick={()=>onToggleCollapse('tags')} style={{height:36}}>
            <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tags</span>
            {!collapsed.tags&&<button onClick={e=>{e.stopPropagation();setArchiveTagsVisible(v=>!v);}}
              className={`text-xs py-0.5 px-2 rounded transition-colors ${archiveTagsVisible?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
              Archive
            </button>}
          </div>
          {!collapsed.tags&&<div className="flex-1 overflow-y-auto scroll bg-gray-50">
            {!archiveTagsVisible&&activeTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No tags yet</div>}
            {!archiveTagsVisible&&activeTags.map(tag=><TagRow key={tag} tag={tag}/>)}
            {archiveTagsVisible&&archiveTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No archived tags</div>}
            {archiveTagsVisible&&archiveTags.map(tag=><TagRow key={tag} tag={tag}/>)}
          </div>}
        </div>
      </div>
    );
  }

  return (
    <div className="flex flex-col h-full bg-gray-50">

      {/* Account selector */}
      <div className="border-b border-gray-100 flex-shrink-0 bg-white relative" ref={accDropRef}>
        <button onClick={()=>setAccDropOpen(o=>!o)}
          className="w-full px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between hover:text-gray-600 transition-colors">
          <span className="truncate flex-1 text-left">{accountLabel}</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className="flex-shrink-0 mr-1">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        {accDropOpen&&(
          <div className="absolute left-0 right-0 top-full z-50 bg-white border border-gray-200 rounded-b-lg shadow-lg overflow-hidden">
            {mailAccounts.length===0 && <div className="px-3 py-2 text-xs text-gray-400">No mail accounts connected.</div>}
            {mailAccounts.map(a=>{
              const email=(a.email||'').toLowerCase();
              const checked=selAccounts.includes(email);
              return (
                <div key={a.id} className="flex items-center gap-2 px-3 py-2 hover:bg-gray-50">
                  <input type="checkbox" checked={checked}
                    onChange={e=>{e.stopPropagation();onToggleAccount(email);}}
                    className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                  <span className="text-xs text-gray-700 truncate flex-1 cursor-pointer"
                    onClick={()=>{onToggleAccount('__exclusive__'+email);setAccDropOpen(false);}}>
                    {a.display_name ? <><span>{a.display_name}</span> <span className="text-gray-400">· {a.email}</span></> : a.email}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* CONTACTS header */}
      <div className="border-b border-gray-100 flex-shrink-0 bg-white">
        <div className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between">
          <span>Contacts
            {mergeId!==null&&<span className="ml-2 text-indigo-500 normal-case font-normal">· Shift+click</span>}
          </span>
          <button onClick={()=>onToggleCollapse('contacts')} className="text-gray-300 hover:text-gray-500 pr-1">
            <CollapseIcon open={!collapsed.contacts}/>
          </button>
        </div>
        {!collapsed.contacts&&<div className="flex px-2 pt-[3px] pb-1.5 gap-0.5">
          {['Convo','News','Muted','Archive'].map(tab=>{
            const active=contactTab===tab;
            const badge=(!active&&(tab==='Convo'||tab==='News'))?tabBadge(tab):0;
            return <button key={tab} onClick={()=>setContactTab(tab)}
              className={`flex-1 text-xs py-1 rounded transition-colors ${active?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
              {tab}{badge>0&&<span className="ml-0.5 opacity-70">({badge})</span>}
            </button>;
          })}
        </div>}
      </div>

      {/* CONTACTS + TAGS wrapper — fills all remaining space in left column */}
      <div style={{flex:'1 1 0',minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',background:'#f9fafb'}}>

        {/* CONTACTS content
            Tags open:   contacts min 43%, max 60% of wrapper; tags content fills rest.
            Tags closed: contacts grows to fill all available space (no white zone). */}
        <div style={{
          flexShrink: 0,
          flexGrow: (!collapsed.contacts && collapsed.tags) ? 1 : 0,
          flexBasis: (!collapsed.contacts && collapsed.tags) ? 0 : 'auto',
          minHeight: collapsed.contacts ? 0 : (collapsed.tags ? 0 : '43%'),
          maxHeight: collapsed.contacts ? 0 : (collapsed.tags ? 'none' : '60%'),
          overflow: 'hidden',
          display: 'flex',
          flexDirection: 'column',
          transition: 'min-height 0.15s ease, max-height 0.15s ease, flex-grow 0.2s ease'
        }}>
          <div className="flex-1 overflow-y-auto scroll">
            {activeContacts.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">
              {contactTab==='News'?'No newsletter contacts':contactTab==='Muted'?'No muted contacts':contactTab==='Archive'?'No archived contacts':'No contacts'}
            </div>}
            {activeContacts.map(({contact,unread,hasR2m,r2mCount})=><ContactRow key={contact.id} contact={contact} unread={unread} hasR2m={hasR2m} r2mCount={r2mCount}/>)}
          </div>
        </div>

        {/* TAGS header — same style as Contacts header */}
        <div className="border-t border-gray-200 border-b border-gray-100 flex-shrink-0 bg-white">
          <div className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between">
            <span>Tags</span>
            <button onClick={()=>onToggleCollapse('tags')} className="text-gray-300 hover:text-gray-500 pr-1">
              <CollapseIcon open={!collapsed.tags}/>
            </button>
          </div>
          {!collapsed.tags&&<div className="flex px-2 pt-[3px] pb-1.5 gap-0.5 justify-end">
            <button onClick={()=>setArchiveTagsVisible(v=>!v)}
              className={`text-xs py-1 px-2.5 rounded transition-colors ${archiveTagsVisible?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
              Archive
            </button>
          </div>}
        </div>

        {/* TAGS content — fills remaining space, collapses to 0 */}
        <div style={{flex:collapsed.tags?'0 0 0px':'1 1 0',overflow:'hidden',display:'flex',flexDirection:'column',transition:'flex 0.15s ease'}}>
          <div className="flex-1 overflow-y-auto scroll">
            {!archiveTagsVisible&&activeTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No tags yet</div>}
            {!archiveTagsVisible&&activeTags.map(tag=><TagRow key={tag} tag={tag}/>)}
            {archiveTagsVisible&&archiveTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No archived tags</div>}
            {archiveTagsVisible&&archiveTags.map(tag=><TagRow key={tag} tag={tag}/>)}
          </div>
        </div>

      </div>

    </div>
  );
}

function MergeDialog({primary,secondary,onMerge,onCancel}) {
  const [keepId,setKeepId]=useState(primary.id);
  const keep=keepId===primary.id?primary:secondary;
  const discard=keepId===primary.id?secondary:primary;
  const merged=[...new Set([...primary.emails,...secondary.emails])];
  return (
    <div className="flex flex-col h-full bg-white">
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <span className="font-semibold text-gray-800 text-sm">Merge contacts</span>
        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 text-xl">×</button>
      </div>
      <div className="flex-1 overflow-y-auto scroll px-4 py-4">
        <p className="text-xs text-gray-500 mb-4">Choose which name to keep. All email addresses will be combined.</p>
        <div className="flex gap-3 mb-5">
          {[primary,secondary].map(c=>{
            const isKeep=c.id===keepId;
            return (
              <button key={c.id} onClick={()=>setKeepId(c.id)}
                className={`flex-1 p-3 rounded-lg border-2 text-left transition-all ${isKeep?"border-indigo-500 bg-indigo-50":"border-gray-200 bg-gray-50 hover:border-gray-300"}`}>
                <div className="flex items-center gap-2 mb-2">
                  <Avatar contact={c} size={36}/>
                  <div>
                    <div className="text-xs font-semibold text-gray-800">{c.name}</div>
                    {isKeep&&<div className="text-xs text-indigo-600 font-medium">Keep this name</div>}
                  </div>
                </div>
                {c.emails.map(e=><div key={e} className="text-xs text-gray-500 truncate">· {e}</div>)}
              </button>
            );
          })}
        </div>
        <div className="rounded-lg border border-gray-200 bg-gray-50 p-3">
          <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Result</div>
          <div className="flex items-center gap-2 mb-2"><Avatar contact={keep} size={36}/><span className="text-sm font-semibold text-gray-800">{keep.name}</span></div>
          <div className="space-y-1">{merged.map((e,i)=>(
            <div key={e} className="flex items-center gap-1.5 text-xs text-gray-600">
              <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${i===0?"bg-indigo-500":"bg-gray-300"}`}/>
              <span className="truncate">{e}</span>
              {i===0&&<span className="text-indigo-400 ml-auto">primary</span>}
            </div>
          ))}</div>
        </div>
      </div>
      <div className="px-4 py-3 border-t border-gray-200 flex gap-2 justify-end flex-shrink-0">
        <button onClick={onCancel} className="px-4 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-600">Cancel</button>
        <button onClick={()=>onMerge(keep,discard,merged)}
          className="px-4 py-1.5 text-xs rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium">Merge contacts</button>
      </div>
    </div>
  );
}

function CreatingAccountBar({onComplete}) {
  const [progress, setProgress] = useState(0);
  useEffect(()=>{
    const start = Date.now();
    const duration = 8000;
    const interval = setInterval(()=>{
      const elapsed = Date.now() - start;
      const p = Math.min(100, (elapsed / duration) * 100);
      setProgress(p);
      if(p >= 100){ clearInterval(interval); setTimeout(onComplete, 300); }
    }, 50);
    return ()=>clearInterval(interval);
  },[]);
  return (
    <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
      <div className="bg-indigo-600 h-2 rounded-full" style={{width:`${progress}%`, transition:'width 0.05s linear'}}/>
    </div>
  );
}

function LoginScreen() {
  // mode: 'login' | 'forgot' | 'reset-code' | 'reset-done' | 'register' | 'register-imap' | 'creating'
  const [mode, setMode]               = useState('login');
  const [email, setEmail]             = useState('');
  const [pass, setPass]               = useState('');
  const [showPass, setShowPass]       = useState(false);
  const [codeMethod, setCodeMethod]   = useState(null); // 'sms'|'email'
  const [code, setCode]               = useState('');
  const [newPass, setNewPass]         = useState('');
  const [newPass2, setNewPass2]       = useState('');
  const [err, setErr]                 = useState('');
  // Register state
  const [regEmail, setRegEmail]               = useState('');
  const [regPass, setRegPass]                 = useState('');
  const [showRegPass, setShowRegPass]         = useState(false);
  const [regMobile, setRegMobile]             = useState('');
  const [showRegMobile, setShowRegMobile]     = useState(false);
  const [regRecovEmail, setRegRecovEmail]     = useState('');
  const [showRegRecovEmail, setShowRegRecovEmail] = useState(false);
  const [regDisplayName, setRegDisplayName]   = useState('');
  const [regImap, setRegImap]                 = useState({
    imapHost:'', imapPort:993, imapSsl:true, smtpHost:'', smtpPort:465, smtpSsl:true,
    user:'', pass:'', auth:'Password', eraseDeleted:'never', eraseSpam:'never'
  });
  const [inviteToken, setInviteToken]         = useState(null);   // base64url token from ?invite=
  const [newMailAccountId, setNewMailAccountId] = useState(null); // set after register-imap save

  const [busy, setBusy] = useState(false);

  // ── Invite link support ──
  // If the URL carries `?invite=TOKEN`, look it up and pre-fill the register
  // form with the bound email. Only then is the register flow reachable —
  // without a valid token the UI shows "invite-only" on submit.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const t = params.get('invite');
    if (!t) return;
    (async () => {
      try {
        const r = await apiFetch(`/invites/${encodeURIComponent(t)}`);
        if (r?.ok) {
          setInviteToken(t);
          setRegEmail(r.email || '');
          setMode('register');
          setErr('');
        }
      } catch (e) {
        setErr('This invite link is invalid, expired, or already used.');
      }
    })();
  }, []);
  async function handleLogin(e) {
    e.preventDefault();
    if(!email||!pass){setErr('Fill in email and password.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // Root listens to auth state changes and will swap views
  }
  async function handleSendResetEmail() {
    if(!email){setErr('Enter your email first.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname,
    });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setMode('reset-sent');
  }
  async function handleNewPassSubmit(e) {
    e.preventDefault();
    if(newPass.length<6){setErr('Password must be at least 6 characters.');return;}
    if(newPass!==newPass2){setErr('Passwords do not match.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.updateUser({ password: newPass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // Session is already active; Root will swap to App via onAuthStateChange
  }
  function handleRegisterSubmit(e) {
    e.preventDefault();
    if (!inviteToken) {
      setErr('Registration is invite-only. Ask the admin for an invite link.');
      return;
    }
    if (!regPass || regPass.length < 8) { setErr('Choose a password of 8 characters or more.'); return; }
    setErr('');
    // Seed IMAP username with the email — most providers use the full address.
    setRegImap(p => ({ ...p, user: regEmail }));
    setMode('register-imap');
  }
  // Final step of the invite-driven onboarding: accept the invite with the
  // IMAP details so the backend creates the Supabase user + mail_account in
  // one transaction. Afterwards we show the progress bar, then sign in —
  // sign-in must happen LAST because onAuthStateChange would otherwise swap
  // Root to the App and unmount this screen mid-flow.
  async function handleFinishImap() {
    if (!inviteToken) { setErr('Invite link required.'); return; }
    if (!regImap.imapHost || !regImap.user) { setErr('Fill in at least the IMAP hostname and username.'); return; }
    if (!regImap.pass) { setErr('Password is required.'); return; }
    setErr(''); setBusy(true);
    try {
      await apiFetch(`/invites/${encodeURIComponent(inviteToken)}/accept`, {
        method: 'POST',
        body: JSON.stringify({
          password: regPass,
          display_name: regDisplayName || undefined,
          imap: {
            host: regImap.imapHost,
            port: Number(regImap.imapPort) || 993,
            user: regImap.user,
            password: regImap.pass,
            smtp_host: regImap.smtpHost || regImap.imapHost.replace(/^imap\./i, 'smtp.'),
            smtp_port: Number(regImap.smtpPort) || 465,
          },
        }),
      });
      setMode('creating');
    } catch (e) {
      setErr(e?.message || 'Could not finish setup. Check IMAP hostname / credentials.');
    }
    setBusy(false);
  }
  // Called when the CreatingAccountBar animation completes. Signs the new
  // user in — onAuthStateChange then fires and Root swaps to the app.
  async function finishOnboarding() {
    try {
      const { error } = await sb.auth.signInWithPassword({ email: regEmail, password: regPass });
      if (error) {
        setErr(`Account ready, but sign-in failed: ${error.message}. Try signing in again.`);
        setMode('login');
      }
    } catch (e) {
      setErr(e?.message || 'Sign-in failed');
      setMode('login');
    }
  }

  const cardCls = "bg-white rounded-2xl shadow-xl px-6 py-8 sm:px-10 sm:py-10 w-full max-w-sm";
  const inputCls = "w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition";
  const inputSmCls = "w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400";

  return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 to-slate-100 flex flex-col items-center justify-center px-4 py-6">

      {/* Logo */}
      <div className="mb-8 flex items-center gap-2.5 select-none">
        <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h14M3 10h14M3 15h8" stroke="white" strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
        <span className="font-bold text-indigo-700 text-2xl tracking-tight">ConvoMail</span>
      </div>

      {/* ── Login ── */}
      {mode==='login'&&(
        <div className={cardCls}>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Sign in</h1>
          <p className="text-sm text-gray-400 mb-7">Welcome back</p>
          {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
          <form onSubmit={handleLogin} className="space-y-4">
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Email address</label>
              <input autoFocus type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr('');}}
                placeholder="you@example.com" className={inputCls}/>
            </div>
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Password</label>
              <div className="relative">
                <input type={showPass?"text":"password"} value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}
                  placeholder="••••••••"
                  className="w-full border border-gray-200 rounded-xl px-4 py-2.5 pr-16 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"/>
                <button type="button" onClick={()=>setShowPass(v=>!v)}
                  className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600">
                  {showPass?'Hide':'Show'}
                </button>
              </div>
            </div>
            <div className="flex justify-end">
              <button type="button" onClick={()=>{setMode('forgot');setErr('');}}
                className="text-xs text-indigo-500 hover:text-indigo-700 hover:underline">
                Forgot password?
              </button>
            </div>
            <button type="submit"
              className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold transition">
              Sign in
            </button>
          </form>
          <div className="mt-6 pt-5 border-t border-gray-100 text-center">
            <span className="text-xs text-gray-400">New to ConvoMail? </span>
            <button onClick={()=>{setMode('register');setErr('');}}
              className="text-xs text-indigo-500 hover:text-indigo-700 font-medium hover:underline">
              Create account
            </button>
          </div>
        </div>
      )}

      {/* ── Forgot password ── */}
      {mode==='forgot'&&(
        <div className={cardCls}>
          <button onClick={()=>{setMode('login');setErr('');}} className="text-xs text-gray-400 hover:text-gray-600 mb-5 flex items-center gap-1">← Back to sign in</button>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Reset password</h1>
          <p className="text-sm text-gray-400 mb-7">We'll email you a link to set a new password.</p>
          {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
          <div className="space-y-4">
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Email address</label>
              <input autoFocus type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr('');}}
                placeholder="you@example.com" className={inputCls}/>
            </div>
            <button onClick={handleSendResetEmail} disabled={busy}
              className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold transition">
              {busy?'Sending…':'Send reset email'}
            </button>
          </div>
        </div>
      )}

      {/* ── Reset email sent ── */}
      {mode==='reset-sent'&&(
        <div className={cardCls}>
          <div className="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-2xl mx-auto mb-5">📬</div>
          <h1 className="text-xl font-bold text-gray-900 mb-1 text-center">Check your inbox</h1>
          <p className="text-sm text-gray-400 mb-6 text-center">
            If an account exists for <span className="text-gray-600">{email}</span>, we've sent a reset link. Click it to set a new password.
          </p>
          <button onClick={()=>{setMode('login');setErr('');}}
            className="w-full py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium transition">
            Back to sign in
          </button>
        </div>
      )}

      {/* ── Enter reset code ── */}
      {mode==='reset-code'&&(
        <div className={cardCls}>
          <button onClick={()=>{setMode('forgot');setErr('');}} className="text-xs text-gray-400 hover:text-gray-600 mb-5 flex items-center gap-1">← Back</button>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Enter code</h1>
          <p className="text-sm text-gray-400 mb-7">
            {codeMethod==='sms'

            </button>

        <div className={cardCls}>

          <h1 className="text-xl font-bold text-gray-900 mb-1">Create account</h1>

      {/* ── Register: first IMAP account ── */}
