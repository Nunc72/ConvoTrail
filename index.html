  // batches until the server reports remaining=0 (or the route is
  // unavailable, in which case we silently stop — prod backend may not
  // have this endpoint yet). Best-effort and idempotent; safe to call
  // on every unlock. v0.0.246.
  async function runEncryptionBackfill() {
    // Messages first.
    let safety = 200; // ≤ 10k mails total
    while (safety-- > 0) {
      try {
        const r = await apiFetch('/me/crypto/backfill?limit=50', { method: 'POST' });
        if (!r || typeof r.remaining !== 'number') break;
        if (r.processed === 0 && r.remaining === 0) break;
        console.log(`[backfill msg] +${r.processed} encrypted, ${r.remaining} to go`);
        if (r.remaining === 0) break;
        await new Promise(r => setTimeout(r, 250));
      } catch (e) {
        console.warn('[backfill msg] aborted:', e?.message || e);
        break;
      }
    }
    // Then contacts + contact_emails (Phase 1.5a/b/c).
    safety = 200;
    while (safety-- > 0) {
      try {
        const r = await apiFetch('/me/crypto/backfill-contacts?limit=50', { method: 'POST' });
        if (!r || typeof r.remaining !== 'number') break;
        if (r.processed === 0 && r.remaining === 0) break;
        console.log(`[backfill contacts] +${r.processed} encrypted, ${r.remaining} to go`);
        if (r.remaining === 0) break;
        await new Promise(r => setTimeout(r, 250));
      } catch (e) {
        console.warn('[backfill contacts] aborted:', e?.message || e);
        break;
      }
    }
  }

  // ── Crypto action handlers used by the passphrase modal ──
  async function handleCryptoSetup(passphrase) {
    setPassphraseModal(m => ({ ...m, busy: true, error: null }));
    try {
      await CONVOOZ_CRYPTO.ready();
      const salt    = CONVOOZ_CRYPTO.generateSalt();
      const derived = await CONVOOZ_CRYPTO.deriveKeyFromPassphrase(passphrase, salt);
      const master  = await CONVOOZ_CRYPTO.generateMasterKey();
      const wrapped = await CONVOOZ_CRYPTO.wrapMasterKey(master, derived);
      const saltB64    = CONVOOZ_CRYPTO.b64.fromBytes(salt);
      const wrappedB64 = CONVOOZ_CRYPTO.b64.fromBytes(wrapped);
      await apiFetch('/me/crypto', {
        method: 'PUT',
        body: JSON.stringify({
          passphrase_salt:    saltB64,
          wrapped_master_key: wrappedB64,
          kdf_algorithm:      'pbkdf2-sha256',
          kdf_params:         { iterations: 600000, hash: 'SHA-256' },
          cipher_algorithm:   'aes-256-gcm',

      setMasterKeyForDecrypt(master);
      // Export raw bytes once so every subsequent apiFetch can attach
      // X-User-Key without re-exporting per call.
      const rawForHeader = await CONVOOZ_CRYPTO.exportRawKey(master);
      setUserKeyHeader(CONVOOZ_CRYPTO.b64.fromBytes(rawForHeader));
      setCryptoMaterial({ passphrase_salt: saltB64, wrapped_master_key: wrappedB64 });
      setCryptoStatus('unlocked');
      setPassphraseModal(null);
      setActionToast('Encryption enabled');
      // Phase 1.3c: kick off backfill of pre-existing plaintext rows. Silent
      // background process — no UI banner needed for now, finishes in a few
      // batches for a typical 1k-mail mailbox.
      runEncryptionBackfill();
    } catch (e) {
      setPassphraseModal(m => ({ ...m, busy: false, error: e?.message || 'Setup failed' }));
    }
  }
  async function handleCryptoUnlock(passphrase) {

      setPassphraseModal(m => ({ ...m, busy: false, error: 'No wrapped key on server' }));
      return;
    }
    setPassphraseModal(m => ({ ...m, busy: true, error: null }));
    try {
      await CONVOOZ_CRYPTO.ready();
      const salt    = CONVOOZ_CRYPTO.b64.toBytes(cryptoMaterial.passphrase_salt);
      const derived = await CONVOOZ_CRYPTO.deriveKeyFromPassphrase(passphrase, salt);
      const wrapped = CONVOOZ_CRYPTO.b64.toBytes(cryptoMaterial.wrapped_master_key);
      const master  = await CONVOOZ_CRYPTO.unwrapMasterKey(wrapped, derived);
      if (!master) {
        setPassphraseModal(m => ({ ...m, busy: false, error: 'Wrong passphrase' }));
        return;
      }
      masterKeyRef.current = master;
      setMasterKeyForDecrypt(master);
      const rawForHeader = await CONVOOZ_CRYPTO.exportRawKey(master);
      setUserKeyHeader(CONVOOZ_CRYPTO.b64.fromBytes(rawForHeader));
      setCryptoStatus('unlocked');
      setPassphraseModal(null);
      setActionToast('Encryption unlocked');
      // Re-fetch the bootstrap so the shape pass re-runs with the master

    } catch (e) {
      setPassphraseModal(m => ({ ...m, busy: false, error: e?.message || 'Unlock failed' }));
    }
  }
  function handleCryptoLock() {
    masterKeyRef.current = null;
    setMasterKeyForDecrypt(null);
    setUserKeyHeader(null);
    if (cryptoMaterial) setCryptoStatus('locked');
    else setCryptoStatus('unset');

    // — swaps the decrypted plaintext back to the raw base64 cues. v0.0.250.
    refreshData();
  }

  const [updateStatus,     setUpdateStatus]     = useState(null); // null | 'checking' | 'uptodate' | 'error'
  const checkForUpdate = useCallback(async ()=>{
    setUpdateStatus('checking');
    try {
      const r = await fetch('version.json?t='+Date.now(), {cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);

        // clicking "update" on staging doesn't snap back to prod.

      setUpdateStatus('uptodate');

      setUpdateStatus('error');
      setTimeout(()=>setUpdateStatus(null), 2500);

  const [searchQuery,      setSearchQuery]      = useState('');
  const [searchScope,      setSearchScope]      = useState('all');
  const [searchActive,     setSearchActive]     = useState(false);
  // Server-side search hits for mail older than the ~300 we cache. Fired
  // on a debounce after the user types, merged after the client-side
  // results in GlobalSearchResults under an "Older mail" header.
  const [serverHits,       setServerHits]       = useState([]);
  const [serverSearching,  setServerSearching]  = useState(false);
  useEffect(() => {
    if (!searchActive) { setServerHits([]); setServerSearching(false); return; }
    const q = (searchQuery || '').trim();
    if (q.length < 2) { setServerHits([]); setServerSearching(false); return; }
    let cancelled = false;
    setServerSearching(true);
    const handle = setTimeout(async () => {
      try {
        const r = await apiFetch('/search?q=' + encodeURIComponent(q));
        if (cancelled) return;
        // Shape the raw rows into the same form messageList items use,
        // so GlobalSearchResults can render them with the same code.
        // sender/revert2me aren't reconstructed here (we'd need r2m_state
        // and per-account display names) — both are search-irrelevant
        // and the row falls back to a sane default.
        const accountEmailById = new Map(mailAccounts.map(a => [a.id, (a.email || '').toLowerCase()]));
        const emailToContactId = new Map();
        for (const c of contactList) {
          for (const e of (c.emails || [])) emailToContactId.set(e.toLowerCase(), c.id);
        }
        const shaped = (r.messages || []).map(raw => {
          const fromEmail = (raw.from_email || '').toLowerCase();
          const allRecipients = Array.isArray(raw.to_emails) ? raw.to_emails : [];
          const toList = allRecipients.filter(e => (e.role || 'to') === 'to').map(e => e.email).filter(Boolean);
          const firstTo = (toList[0] || allRecipients[0]?.email || '').toLowerCase();
          const otherEmail = raw.direction === 'in' ? fromEmail : firstTo;
          const contactId = emailToContactId.get(otherEmail) ?? null;
          return {
            id: raw.id,
            accountId: raw.mail_account_id,
            accountEmail: accountEmailById.get(raw.mail_account_id) ?? '',
            contactId,
            dir: raw.direction,
            subject: raw.subject || '(no subject)',
            from: raw.from_email || '',
            to: toList[0] || allRecipients[0]?.email || '',
            toList,
            ccList: allRecipients.filter(e => e.role === 'cc').map(e => e.email).filter(Boolean),
            date: raw.date,
            read: !!raw.flags?.seen,
            revert2me: false,
            r2mArmed: false,

    const seenTotal = new Set();

  function getDestination(currentMsgId, actionType) {
    // actionType: 'seen'|'snooze'|'delete'|'spam'|'r2m'
    // Returns {id, alwaysGo}: id=null+alwaysGo=true → empty state; id=null+alwaysGo=false → stay
    const currentMsg = messageList.find(m=>m.id===currentMsgId);
    if(!currentMsg) return {id:null, alwaysGo:true};
    const contactId = currentMsg.contactId;
    const isGone = actionType==='delete'||actionType==='spam';
    // Simulate post-action state
    const simDel = isGone ? new Set([...deletedIds, currentMsgId]) : new Set(deletedIds);
    const del = id => simDel.has(id);
    const isRead = m => (actionType==='seen'||actionType==='snooze')&&m.id===currentMsgId ? true : m.read;
    const getR2m = m => actionType==='r2m'&&m.id===currentMsgId ? false : m.revert2me;
    // All msgs for this contact except current
    const all = messageList.filter(m=>m.contactId===contactId&&m.id!==currentMsgId);
    // Filter to current tab
    const f = contactFilter;
    let remaining;
    if(f==='now')         remaining = all.filter(m=>!del(m.id)&&!m.draft&&((m.dir==='in'&&!isRead(m))||(m.dir==='out'&&getR2m(m))));
    else if(f==='in')     remaining = all.filter(m=>!del(m.id)&&!m.draft&&m.dir==='in');
    else if(f==='out')    remaining = all.filter(m=>!del(m.id)&&!m.draft&&m.dir==='out');
    else if(f==='draft')  remaining = all.filter(m=>!del(m.id)&&m.draft);
    else if(f==='deleted')remaining = all.filter(m=>del(m.id));
    else                  remaining = all.filter(m=>!del(m.id)); // 'all'

    if(remaining.length===0) {
      if(!isGone) {
        if(f==='now') return {id:null, alwaysGo:true, forceFade:true}; // last on Now: fade out to empty state
        return {id:null, alwaysGo:false}; // other tabs: stay on current mail
      }
      // delete/spam: mail is gone → empty state
      return {id:null, alwaysGo:true};
    }
    if(!isGone) {
      // seen/snooze/r2m: next actionable after current, else stay
      const actionable = remaining
        .filter(m=>(m.dir==='in'&&!isRead(m))||(m.dir==='out'&&getR2m(m)))
        .sort((a,b)=>a.date.localeCompare(b.date));
      const next = actionable.filter(m=>m.date>currentMsg.date)[0];
      return next ? {id:next.id, alwaysGo:true} : {id:null, alwaysGo:false};
    }
    // delete/spam: next actionable, else mail above/below
    const actionable = remaining
      .filter(m=>(m.dir==='in'&&!isRead(m))||(m.dir==='out'&&getR2m(m)))
      .sort((a,b)=>a.date.localeCompare(b.date));

    if (!tagId) return; // nothing to detach server-side (tag wasn't server-created)
    try {
      await apiFetch(`/messages/${msgId}/tags/${tagId}`, { method: 'DELETE' });
    } catch (e) {
      setMsgTags(m => ({...m, [msgId]: [...(m[msgId]||[]).filter(t=>t!==tagName), tagName]}));

    }

  const selectedContact = (() => {

    // a plain id-match for non-thread contexts (search results, etc).
    const m =
      (selContact != null && messageList.find(x => x.id === selMsg && x.contactId === selContact))
      || messageList.find(x => x.id === selMsg);
    if (!m) return null;
    if (m.accountEmail && !selAccounts.includes(m.accountEmail)) return null;

    // active filter tab — otherwise col 3 shows a mail that's invisible

  const totalUnread=new Set(messageList.filter(m=>!m.read&&m.dir==='in'&&!deletedIds.includes(m.id)&&!m.draft&&selAccounts.includes(m.accountEmail)).map(m=>m.id)).size;

  function msgMatchesSearch(m) {
    if(!searchQuery) return true;

                      <span>Enable home-screen badge</span>
                    </button>
                  )}
                  {isStandalonePWA && badgePermission === 'denied' && (
                    <div className="px-3 py-2 text-xs text-gray-400">

                    </div>

function Root() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out, object = logged in
  const [recoveryMode, setRecoveryMode] = useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((event, sess) => {
      setSession(sess ?? null);
      if (event === 'PASSWORD_RECOVERY') setRecoveryMode(true);
      if (event === 'USER_UPDATED' && recoveryMode) setRecoveryMode(false);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  // Auto-update on every cold start. iOS PWA standalone-mode keeps the
  // HTML in its own cache and ignores the no-cache meta tags, so a
  // returning user often opens the previous build's HTML and stays on
  // it until they manually click the version row. Fetching version.json
  // with cache:'no-store' and redirecting to ?v=<new> on a mismatch
  // forces a fresh HTML download exactly once per upgrade.
  //
  // Redirect-loop guard: if the service worker is misbehaving and keeps
  // serving the same old index.html no matter what we do, blindly
  // redirecting on every mount would leave the user stuck on a perma-
  // spinner. sessionStorage gets us a 10s cooldown so the FIRST redirect
  // still fires, but a second mismatch within 10 seconds skips the
  // redirect and triggers a service-worker rescue: unregister every SW
  // for this origin and reload, which forces a network-first fetch of
  // the fresh HTML on the next load.
  useEffect(() => {
    let cancelled = false;
    fetch('version.json?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        if (cancelled || !j?.version || j.version === APP_VERSION) return;
        const lastRedirect = parseInt(sessionStorage.getItem('convooz-update-redirect-at') || '0', 10);
        const recentlyRedirected = Date.now() - lastRedirect < 10_000;
        if (recentlyRedirected) {
          console.warn('[auto-update] still on old code after redirect → unregistering service worker(s) and reloading');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(rs => Promise.all(rs.map(r => r.unregister())))
              .then(() => caches?.keys?.().then(keys => Promise.all(keys.map(k => caches.delete(k)))))
              .finally(() => {
                sessionStorage.removeItem('convooz-update-redirect-at');
                window.location.reload();
              });
          } else {
            window.location.reload();
          }
          return;
        }
        console.log('[auto-update] version.json says', j.version, '— reloading');
        sessionStorage.setItem('convooz-update-redirect-at', String(Date.now()));
        // v0.0.242: preserve ?env=staging when updating; only the v= param
        // is replaced.
        const params = new URLSearchParams(window.location.search);
        params.set('v', j.version);
        window.location.replace(window.location.pathname + '?' + params.toString());
      })
      .catch(() => {});
    return () => { cancelled = true; };
  }, []);

  if (session === undefined) {
    // Re-use the same inline bootloader markup that index.html showed
    // before React mounted — same white background, same Convooz logo,
    // same rotating circle. Without this React mounting replaced the
    // bootloader with a gradient + 'Loading…' text panel, which read
    // as a second, slower load step.
    return (
      <div className="bootloader">
        <div className="bootloader-logo">Convooz</div>
        <div className="bootloader-spinner"/>
      </div>
    );
  }

  // Recovery: user clicked reset-password link in email. Show set-new-password screen regardless of session.
  if (recoveryMode) return <RecoveryScreen onDone={()=>setRecoveryMode(false)}/>;

  if (!session) return <LoginScreen/>;

  return <App userId={session.user?.id || null} onSignOut={async ()=>{ await sb.auth.signOut(); }}/>;
}

function RecoveryScreen({onDone}) {
  const [newPass, setNewPass]   = useState('');
  const [newPass2, setNewPass2] = useState('');
  const [err, setErr]           = useState('');
  const [busy, setBusy]         = useState(false);
  const cardCls = "bg-white rounded-2xl shadow-xl px-6 py-8 sm:px-10 sm:py-10 w-full max-w-sm";
  const inputCls = "w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition";
  async function submit(e) {
    e.preventDefault();
    if(newPass.length<6){setErr('Password must be at least 6 characters.');return;}
    if(newPass!==newPass2){setErr('Passwords do not match.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.updateUser({ password: newPass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    onDone();
  }
  return (
    // Same scrollable-wrapper treatment as LoginScreen — the recovery
    // flow shows the same kind of form on the same constrained mobile
    // viewport, so the submit button is just as easy to lose under the
    // on-screen keyboard without overflow-y-auto on the wrapper.
    <div className="h-full overflow-y-auto bg-gradient-to-br from-indigo-50 to-slate-100 flex flex-col items-center justify-center px-4 py-6">
      <div className={cardCls}>
        <div className="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-2xl mx-auto mb-5">✓</div>
        <h1 className="text-xl font-bold text-gray-900 mb-1 text-center">Set a new password</h1>
        <p className="text-sm text-gray-400 mb-6 text-center">Choose something at least 6 characters.</p>
        {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
        <form onSubmit={submit} className="space-y-4">
          <input autoFocus type="password" value={newPass} onChange={e=>{setNewPass(e.target.value);setErr('');}} placeholder="New password" className={inputCls}/>
          <input type="password" value={newPass2} onChange={e=>{setNewPass2(e.target.value);setErr('');}} placeholder="Confirm new password" className={inputCls}/>
          <button type="submit" disabled={busy}
            className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold transition">
            {busy?'Saving…':'Save & continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
