// ─── Global Search Results ───────────────────────────────────────────────────

const SEARCH_FILTER_TABS = [
  { label: "All",     key: "all" },
  { label: "Now",     key: "now" },
  { label: "In",      key: "in" },
  { label: "Out",     key: "out" },
  { label: "Draft",   key: "draft" },
  { label: "Deleted", key: "deleted" },
];

function GlobalSearchResults({messages, contacts, deletedIds, msgTags, msgMatchesSearch, selectedMsgId, onSelectMsg, onSelectDraft, serverHits=[], serverSearching=false}) {
  const [filter, setFilter] = useState('all');

  const filtered = useMemo(()=>{
    const del = x => deletedIds.includes(x.id);
    let m = messages.filter(msgMatchesSearch);
    if(filter==='now')     m = m.filter(x=>!del(x)&&!x.draft&&((x.dir==='in'&&!x.read)||(x.dir==='out'&&x.revert2me)));
    else if(filter==='in')      m = m.filter(x=>x.dir==='in'&&!x.draft&&!del(x));
    else if(filter==='out')     m = m.filter(x=>x.dir==='out'&&!x.draft&&!del(x));
    else if(filter==='draft')   m = m.filter(x=>x.draft&&!del(x));
    else if(filter==='deleted') m = m.filter(x=>del(x));
    else m = m.filter(x=>!del(x));
    // Global search spans every contact thread, so it picks up every
    // shape-entry of a mail (one per recipient for outgoing). Dedup by
    // id so the result list shows each matching mail exactly once.
    const seenIds = new Set();
    const deduped = [];
    for (const x of m) {
      if (seenIds.has(x.id)) continue;
      seenIds.add(x.id);
      deduped.push(x);
    }
    return deduped.sort((a,b)=>filter==='draft'?(b.modifiedAt||b.date).localeCompare(a.modifiedAt||a.date):b.date.localeCompare(a.date));
  },[messages,deletedIds,filter,msgMatchesSearch]);

  // "Older mail" section: server-search hits that aren't already in the
  // client-side results (so we don't double-list a mail the user has in
  // their cache). Same filter tabs apply.
  const olderHits = useMemo(()=>{
    if (!serverHits.length) return [];
    const clientIds = new Set(filtered.map(m => m.id));
    const del = x => deletedIds.includes(x.id);
    let m = serverHits.filter(x => !clientIds.has(x.id));
    if(filter==='now')     m = m.filter(x=>!del(x)&&!x.draft&&((x.dir==='in'&&!x.read)||(x.dir==='out'&&x.revert2me)));
    else if(filter==='in')      m = m.filter(x=>x.dir==='in'&&!x.draft&&!del(x));
    else if(filter==='out')     m = m.filter(x=>x.dir==='out'&&!x.draft&&!del(x));
    else if(filter==='draft')   m = m.filter(x=>x.draft&&!del(x));
    else if(filter==='deleted') m = m.filter(x=>del(x));
    else m = m.filter(x=>!del(x));
    return [...m].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  },[serverHits,filtered,deletedIds,filter]);

  return (
    <div className="flex flex-col h-full bg-white">
      {/* Filter bar */}
      <div className="flex gap-0.5 px-3 py-2 border-b border-gray-200 flex-shrink-0 bg-gray-50">
        {SEARCH_FILTER_TABS.map(({label, key:k})=>{
          const active=filter===k;
          const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
            in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
            draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
            :"text-gray-400 hover:text-gray-600";
          return <button key={k} onClick={()=>setFilter(k)}
            className={`convooz-thread-filter-tab px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{label}</button>;
        })}
      </div>
      {/* Results list */}
      <div className="flex-1 overflow-y-auto scroll">
        {filtered.length===0 && olderHits.length===0 && !serverSearching &&
          <div className="text-center text-gray-300 text-sm mt-10">No results</div>}
        {filtered.map(msg => renderSearchRow({msg, contacts, deletedIds, selectedMsgId, onSelectMsg, onSelectDraft}))}
        {(olderHits.length>0 || serverSearching) && (
          <div className="px-3 py-2 border-b border-gray-100 bg-gray-50 flex items-center gap-2">
            <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Older mail</span>
            {serverSearching && <Spinner size={10}/>}
          </div>
        )}
        {olderHits.map(msg => renderSearchRow({msg, contacts, deletedIds, selectedMsgId, onSelectMsg, onSelectDraft}))}
      </div>
    </div>
  );
}

// Single mail-row used in both the client-side and server-side search
// result lists. Extracted so the two sections stay visually identical.
function renderSearchRow({msg, contacts, deletedIds, selectedMsgId, onSelectMsg, onSelectDraft}) {
  const contact = contacts.find(c => c.id === msg.contactId);
  const isDraft = !!msg.draft;
  const isOut = msg.dir==='out' || isDraft;
  const rowContact = isOut ? (msg.sender || null) : contact;
  const rowName = isOut ? (msg.sender?.name || 'Me') : (contact?.name ?? msg.from);
  const isSel = msg.id === selectedMsgId;
  const isDel = deletedIds.includes(msg.id);
  return (
    <div key={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelectMsg(msg.id)}
      className={`${isOut?"pl-10":"pl-4"} pr-4 py-2.5 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition-colors
        ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":""}
        ${isDel?"opacity-50":""}`}>
      <div className="flex items-center justify-between gap-1 mb-0.5">
        <div className="flex items-center gap-2 min-w-0">
          {rowContact && <Avatar contact={rowContact} size={20}/>}
          <span className="text-xs font-medium text-gray-700 truncate">{rowName}</span>
        </div>
        <span className="text-xs text-gray-400 flex-shrink-0">{formatTime(msg.date)}</span>
      </div>
      <div className="flex items-center gap-2 pr-4 mt-0.5">
        <div style={{width:20,flexShrink:0}} className="flex justify-center">
          {!msg.read && !isDraft && msg.dir==='in' && !isDel
            ? <span className="w-1.5 h-1.5 rounded-full bg-indigo-500"/>
            : msg.revert2me && msg.dir==='out' && !isDraft && !isDel
              ? <span className="w-1.5 h-1.5 rounded-full bg-amber-400"/>
              : null}
        </div>
        <div className="flex items-center gap-1.5 min-w-0 flex-1">
          {isDraft
            ? <span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
            : <span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==='in'?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==='in'?"In":"Out"}</span>}
          {isDel && (msg.spam
            ? <span className="text-xs px-1.5 rounded font-medium bg-fuchsia-100 text-fuchsia-700 flex-shrink-0">Spam</span>
            : <span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>)}
          <span className={`text-xs truncate ${!msg.read&&!isDraft&&msg.dir==='in'&&!isDel?"font-semibold text-gray-800":"text-gray-600"}`}>{msg.subject}</span>
        </div>
      </div>
      <div className="flex gap-2 pr-4 mt-0.5">
        <div style={{width:20,flexShrink:0}}/>
        <span className="text-xs text-gray-400 truncate flex-1">{(msg.snippet||msg.body||'').replace(/\n/g," ")}</span>
      </div>
    </div>
  );
}

// ─── Left Column ─────────────────────────────────────────────────────────────

function LeftColumn({contactMeta, archivedContacts, selectedId, mergeId, onSelect,
                     usedTags, archivedTags, selectedTag, onSelectTag,
                     tagsHeight, onTagsDividerDrag, archiveHeight, onArchiveDividerDrag,
                     collapsed, onToggleCollapse,
                     emailFlags,
                     selAccounts, onToggleAccount,
                     mailAccounts=[],
                     actionableCounts={total:0, inSel:0},
                     onContactTabChange,
                     pendingMergeId=null, onSwipeMerge,
                     arrowFocus='contacts',
                     dataLoading=false}) {
  const [accDropOpen, setAccDropOpen] = useState(false);
  const [contactTab,  setContactTabRaw] = useState('Convo');
  // Switching tabs (Convo / News / noReply / Archive) shows a different
  // contact subset, so the currently-open contact + mail in cols 2/3
  // should clear back to empty state. The parent App handles the actual
  // state clearing — we just fire the callback on every tab change.
  const setContactTab = (tab) => {
    setContactTabRaw(tab);
    onContactTabChange?.(tab);
  };
  const [archiveTagsVisible, setArchiveTagsVisible] = useState(false);
  // Archive moved out of the contact tabs (which now mirror the data model:
  // Convo / News / noReply / Muted) and into its own toggle, just like the
  // Tags section. When this is true the contact list shows archived rows
  // regardless of the selected tab.
  const [archiveContactsVisible, setArchiveContactsVisible] = useState(false);
  const accDropRef = useRef(null);
  const tagsDivStartY = useRef(null);
  const archiveDivStartY = useRef(null);

  useEffect(()=>{
    if(!accDropOpen)return;
    const h=e=>{if(accDropRef.current&&!accDropRef.current.contains(e.target))setAccDropOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[accDropOpen]);

  function getTab(id){
    const c = contactMeta.find(m => m.contact.id === id)?.contact;
    if (!c) return 'Convo';
    // Soft-deleted contacts: same bucket as Archive (Rik's item 3 spec),
    // but rendered with a red "Deleted" chip on the row so they're easy
    // to tell apart from regularly-archived contacts. They stay in
    // Archive until the cleanupOrphanContacts pass eventually hard-
    // deletes them once their last attributed mail is gone.
    if (c.deletedAt) return 'Archive';
    // Archive is now its own toggle in the section header (mirrors Tags
    // bar). Archived contacts disappear from the tabs above and only show
    // when the Archive toggle is on, so we surface them via a synthetic
    // "Archive" tab name that the renderer treats specially.
    if (archivedContacts.has(id)) return 'Archive';
    // Muted wins over everything (spam path forces is_muted=true). After
    // that, News beats Noreply per Rik's spec: a noreply@-style address
    // that also ships a List-Unsubscribe header (typical newsletter
    // pattern) should land in News, not Noreply — News is the more
    // informative bucket. The auto-tagger in sync.ts sets both flags
    // independently; this is where the tie-break gets resolved.
    if (c.isMuted)   return 'Muted';
    if (c.isNews)    return 'News';
    if (c.isNoReply) return 'Noreply';
    return 'Convo';
  }
  // When Archive toggle is on, the tab filter is replaced by "is archived"
  // — same UX as the Tags Archive button. The contactTab still controls the
  // empty-state copy below, but the displayed rows are the archived ones.
  const activeContacts  = contactMeta
    .filter(m => archiveContactsVisible
      ? getTab(m.contact.id) === 'Archive'
      : getTab(m.contact.id) === contactTab)
    .slice()
    .sort((a,b)=>{
      // Actionable contacts (badge > 0) first; within each group preserve original order
      const ba = a.unread + (a.r2mCount||0);
      const bb = b.unread + (b.r2mCount||0);
      if((ba>0)!==(bb>0)) return ba>0 ? -1 : 1;
      return 0;
    });
  // Hold the latest activeContacts in a ref so the keydown handler can
  // read the freshest list without us re-binding the document listener
  // on every render. activeContacts is recomputed each render (new
  // array reference); if we put it in the useEffect deps we'd churn
  // through addEventListener/removeEventListener at the same cadence.
  const activeContactsRef = useRef([]);
  activeContactsRef.current = activeContacts;
  // Arrow up / arrow down: walk through the contact list currently
  // visible under the active contact tab + archive toggle. Only fires
  // when arrowFocus === 'contacts' so the thread-list arrow-nav in
  // ThreadColumn doesn't double-handle. Modifier keys and text-field
  // focus are passed through, same rule as the thread-list handler.
  // onSelect receives an empty event object so handleSelectContact's
  // shift-merge path stays inactive — a keyboard arrow shouldn't start
  // a merge.
  useEffect(()=>{
    function onKey(e){
      if(arrowFocus!=='contacts') return;
      if(e.key!=='ArrowDown'&&e.key!=='ArrowUp') return;
      if(e.metaKey||e.ctrlKey||e.altKey||e.shiftKey) return;
      const el=document.activeElement;
      if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable)) return;
      const list=activeContactsRef.current;
      if(list.length===0) return;
      e.preventDefault();
      const currIdx=selectedId?list.findIndex(c=>c.contact.id===selectedId):-1;
      let nextIdx;
      if(e.key==='ArrowDown') nextIdx=currIdx<0?0:Math.min(currIdx+1,list.length-1);
      else                    nextIdx=currIdx<=0?0:currIdx-1;
      const next=list[nextIdx];
      if(next) onSelect?.(next.contact.id,{});
    }
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[selectedId,onSelect,arrowFocus]);
  const activeTags      = usedTags.filter(t=>!archivedTags.has(t));
  const archiveTags     = usedTags.filter(t=>archivedTags.has(t));
  function tabBadge(tab){
    return contactMeta.filter(m=>getTab(m.contact.id,m.contact.emails)===tab)
      .reduce((s,m)=>s+m.unread+(m.r2mCount||0),0);
  }

  const labelForEmail = (email) => {
    const a = mailAccounts.find(a => (a.email||'').toLowerCase() === email);
    return a ? (a.display_name || a.email) : email;
  };
  // Label format:
  //   • all selected         → "All accounts"           (no count)
  //   • 1 selected           → "alice@example.com (4/44 now)"
  //   • subset selected (2+) → "3 accounts (17/44 now)" (in-scope/total)
  //   • zero selected        → "(none)"
  // X/Y "now" reads more naturally than "mails" — it's the same number
  // as the Now-tab actionable count (unread incoming + armed r2m).
  // When mailAccounts.length <= 1 the selector itself is hidden, so the
  // "No accounts" branch is no longer reached.
  const allSelected = mailAccounts.length > 0 && selAccounts.length === mailAccounts.length;
  const baseAccountLabel = allSelected
    ? 'All accounts'
    : selAccounts.length === 0 ? '(none)'
    : selAccounts.length === 1 ? labelForEmail(selAccounts[0])
    : `${selAccounts.length} accounts`;
  const actionableSuffix = (!allSelected && selAccounts.length > 0)
    ? ` (${actionableCounts.inSel}/${actionableCounts.total} now)`
    : '';
  const accountLabel = baseAccountLabel + actionableSuffix;

  function CollapseIcon({open}) {
    return <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d={open?"M2 3.5L5 6.5L8 3.5":"M3.5 2L6.5 5L3.5 8"} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>;
  }

  function ContactRow({contact, unread, hasR2m, r2mCount}) {
    const isSel=contact.id===selectedId, isMerge=contact.id===mergeId;
    const isPending = contact.id === pendingMergeId;
    const badge = unread + (r2mCount||0);
    // New-mail (blue) wins when both kinds of alert are present — it's the
    // more urgent of the two. Pure-r2m contacts still show amber.
    const badgeColor = unread > 0 ? 'bg-indigo-600' : 'bg-amber-500';
    // Mobile swipe-right gesture for the merge flow. The row drags with
    // the finger and an indigo strip with white "Merge" text reveals on
    // the left as it moves. Release past the threshold fires the merge
    // AND leaves the row resting open at SWIPE_RESTING — so the user
    // sees that the first half of the merge is staged and a swipe on
    // any second row will complete it. Release short of the threshold
    // springs the row back to closed. A normal tap still selects the
    // contact; tapping a pending row (or any other) cancels the staged
    // merge via handleSelectContact.
    const SWIPE_TRIGGER = 80;
    const SWIPE_RESTING = 100; // open position the row sits at while it's the pending merge
    const SWIPE_MAX     = 160;
    const startRef = useRef(null);
    const swipedRef = useRef(false);
    const rawDxRef  = useRef(0); // delta-from-finger-start, separate from rendered dx so we can compare against the trigger without losing accuracy when the slide is capped at SWIPE_MAX
    const [dx, setDx] = useState(0);
    const [dragging, setDragging] = useState(false);
    // Effective displacement we actually render. While the user is
    // dragging, follow their finger. When they're not dragging, snap
    // closed unless this row is the staged half — then sit at the
    // resting open position so the indigo strip stays visible until
    // a second swipe (anywhere) or a tap clears the staged merge.
    const renderDx = dragging ? dx : (isPending ? SWIPE_RESTING : 0);
    function onTouchStart(e) {
      const t = e.touches[0];
      startRef.current = { x: t.clientX, y: t.clientY };
      swipedRef.current = false;
      rawDxRef.current = 0;
    }
    function onTouchMove(e) {
      const s = startRef.current;
      if (!s) return;
      const t = e.touches[0];
      const rawDx = t.clientX - s.x;
      const rawDy = t.clientY - s.y;
      // Cancel if the user is clearly swiping vertically — let the column
      // scroll instead. Once we've committed to horizontal dragging the
      // vertical component is ignored.
      if (!dragging && Math.abs(rawDy) > Math.abs(rawDx)) { return; }
      if (rawDx > 5 || dragging) {
        setDragging(true);
        swipedRef.current = true;
        rawDxRef.current = rawDx;
        // For a row that's already staged, drag starts from its resting
        // open position so the slide is visually continuous instead of
        // jumping back to 0 the moment the finger touches it.
        const base = isPending ? SWIPE_RESTING : 0;
        setDx(Math.max(0, Math.min(base + rawDx, SWIPE_MAX)));
      }
    }
    function onTouchEnd() {
      const s = startRef.current;
      if (!s) return;
      const finalRaw = rawDxRef.current;
      startRef.current = null;
      setDragging(false);
      rawDxRef.current = 0;
      if (finalRaw >= SWIPE_TRIGGER) {
        onSwipeMerge?.(contact.id);
      }
      // Always reset the live drag value; whether the row STAYS open
      // is decided by isPending via renderDx above.
      setDx(0);
    }
    function onClickRow(e) {
      if (swipedRef.current) { swipedRef.current = false; e.stopPropagation(); return; }
      onSelect(contact.id, e);
    }
    // The reveal strip width fills from the left edge of the row to
    // where the row currently sits — width == renderDx, anchored left.
    return (
      <div className="relative overflow-hidden border-b border-gray-100">
        {renderDx > 0 && (
          <div className="absolute inset-y-0 left-0 flex items-center px-4 text-white text-sm font-semibold pointer-events-none"
            style={{width: renderDx, background: '#6366f1'}}>
            <span style={{opacity: Math.min(1, renderDx / SWIPE_TRIGGER)}}>Merge</span>
          </div>
        )}
        <div onClick={onClickRow}
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
          style={{
            transform: `translateX(${renderDx}px)`,
            transition: dragging ? 'none' : 'transform 200ms ease',
            willChange: 'transform',
          }}
          className={`px-3 py-2 cursor-pointer transition-colors
            ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-500":""}
            ${isMerge||isPending?"bg-violet-50 border-l-2 border-l-violet-500":""}
            ${!isSel&&!isMerge&&!isPending?"hover:bg-gray-50":""}`}>
          <div className="flex items-center gap-2.5">
            <Avatar contact={contact} size={28}/>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between gap-1">
                <span className={`text-sm truncate ${badge>0?"font-semibold text-gray-900":"text-gray-700"}`}>
                  {isMerge&&<span className="mr-1 text-violet-400">⇄</span>}{contact.name}
                </span>
                {/* "Spam" chip on muted-via-spam contacts so the Muted tab can
                    tell auto-muted (Spam action) rows apart from manual ones. */}
                {contact.muteReason === 'spam' && (
                  <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-fuchsia-100 text-fuchsia-700 font-semibold flex-shrink-0 uppercase tracking-wider">Spam</span>
                )}
                {/* Red "Deleted" chip on soft-deleted contacts (item 3).
                    They live in Archive until the cleanup pass removes
                    them for good. */}
                {contact.deletedAt && (
                  <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-red-100 text-red-700 font-semibold flex-shrink-0 uppercase tracking-wider">Deleted</span>
                )}
                {isPending
                  ? <span className="text-xs text-violet-600 font-semibold flex-shrink-0">Mergen…</span>
                  : badge>0 && <span className={`${badgeColor} text-white rounded-full flex-shrink-0 font-bold`}
                      style={{minWidth:22,height:16,fontSize:"0.55rem",padding:"0 6px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {badge}
                    </span>}
              </div>
              <div className="flex items-center mt-0.5">
                <span className="text-xs text-gray-400 truncate">{contact.org||contact.emails[0]}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function TagRow({tag}) {
    const isTagSel=tag===selectedTag;
    return (
      <div onClick={()=>onSelectTag(tag)}
        className={`px-3 py-2.5 border-b border-gray-100 cursor-pointer transition-colors
          ${isTagSel?"bg-indigo-50 border-l-2 border-l-indigo-500":"hover:bg-gray-50"}`}>
        <div className="flex items-center gap-2">
          <span className={`flex-shrink-0 ${isTagSel?"text-indigo-600":"text-indigo-400"}`}><TagIcon size={12}/></span>
          <span className={`text-sm truncate ${isTagSel?"font-semibold text-gray-900":"text-gray-700"}`}>
            {tag}
          </span>
        </div>
      </div>
    );
  }

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

  if (isMobile) {
    // Clean mobile layout — four flex rows, no absolute positioning:
    //   1. Account selector    (fixed, ~30px)
    //   2. Contacts header     (fixed: label + tabs, ~50px when contacts open)
    //   3. Contacts list       (flex-1 min-h-0 — scrolls, bounces, pull-to-sync)
    //   4. Tags section        (fixed-height flex row — header always visible,
    //                          list fills remainder when tags expanded).
    // Tags is a real flex sibling so it can never disappear behind the
    // contacts list or be clipped by a stacking context created on the
    // contacts scroller.
    // Account selector is only meaningful when there's more than one
    // IMAP account; with zero or one account there's nothing to pick
    // and the row would just consume space.
    const accountHeader = mailAccounts.length > 1 ? (
      <div className="border-b border-gray-100 bg-white relative flex-shrink-0" ref={accDropRef}>
        <button onClick={()=>setAccDropOpen(o=>!o)}
          className="w-full px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 flex items-center justify-between hover:text-gray-600 transition-colors">
          <span className="truncate flex-1 text-left">{accountLabel}</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className="flex-shrink-0 mr-1">
            <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        {accDropOpen&&(
          <div className="absolute left-0 right-0 top-full z-50 bg-white border border-gray-200 rounded-b-lg shadow-lg overflow-hidden">
            {mailAccounts.length===0 && <div className="px-3 py-2 text-xs text-gray-400">No mail accounts connected.</div>}
            {mailAccounts.map(a=>{
              const email=(a.email||'').toLowerCase();
              const checked=selAccounts.includes(email);
              return (
                <div key={a.id} className="flex items-center gap-2 px-3 py-2 hover:bg-gray-50">
                  <input type="checkbox" checked={checked}
                    onChange={e=>{e.stopPropagation();onToggleAccount(email);}}
                    className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                  <span className="text-xs text-gray-700 truncate flex-1 cursor-pointer"
                    onClick={()=>{onToggleAccount('__exclusive__'+email);setAccDropOpen(false);}}>
                    {a.display_name ? <><span>{a.display_name}</span> <span className="text-gray-400">· {a.imap_user || a.email}</span></> : (a.imap_user || a.email)}
                  </span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    ) : null;

    const contactsHeader = (
      <div className="border-b border-gray-100 bg-white flex-shrink-0">
        <div onClick={()=>onToggleCollapse('contacts')}
          className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between cursor-pointer select-none hover:bg-gray-50 transition-colors"
          style={{height:30}}>
          <span>Contacts
            {mergeId!==null&&<span className="ml-2 text-indigo-500 normal-case font-normal">· Shift+click</span>}
          </span>
          {/* Archive lives on the same line as the section label, mirroring
              the Tags header. stopPropagation so a click on the chip doesn't
              also collapse the contacts panel. */}
          {!collapsed.contacts && (
            <button onClick={e=>{e.stopPropagation(); setArchiveContactsVisible(v=>!v);}}
              className={`text-xs py-0.5 px-2 rounded transition-colors font-normal normal-case tracking-normal ${archiveContactsVisible?'bg-gray-100 text-gray-600':'text-gray-400 hover:text-gray-600'}`}>
              Archive
            </button>
          )}
        </div>
        {!collapsed.contacts&&(
          <div className="flex px-2 pt-[3px] pb-1.5 gap-0.5">
            {['Convo','News','Noreply','Muted'].map(tab=>{
              const active=contactTab===tab && !archiveContactsVisible;
              // Muted is a destination, not an actionable bucket — no badge.
              const badge=(!active && !archiveContactsVisible && tab !== 'Muted')?tabBadge(tab):0;
              return <button key={tab} onClick={()=>{setArchiveContactsVisible(false); setContactTab(tab);}}
                className={`convooz-contact-tab flex-1 text-xs py-1 rounded transition-colors ${active?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
                {tab}{badge>0&&<span className="ml-0.5 opacity-70">({badge})</span>}
              </button>;
            })}
          </div>
        )}
      </div>
    );

    // Scrollable contacts list. Inner wrapper with `minHeight:
    // calc(100% + 1px)` guarantees scrollHeight > clientHeight on
    // every tab, even when the rows fit the screen — iOS Safari
    // otherwise refuses to rubber-band on a non-overflowing element,
    // which is why tabs with only a handful of contacts didn't
    // bounce (while tags bounced because users typically have enough
    // tags to overflow). No pull-to-sync — use the Sync button in
    // the topbar to refresh mail.
    const contactsList = !collapsed.contacts && (
      <div className="flex-1 min-h-0 overflow-y-auto scroll bg-gray-50"
        style={{WebkitOverflowScrolling:'touch'}}>
        <div style={{minHeight:'calc(100% + 1px)'}}>
          {/* No inline "Loading contacts…" — sync feedback is the topbar spinner.
             On a true cold load (no cache, contactMeta empty) the panel just
             stays blank for the half-second the bootstrap fetch takes. */}
          {!(dataLoading && contactMeta.length===0) && (<>
            {activeContacts.length===0 && (
              <div className="px-3 py-3 text-xs text-gray-300 italic">
                {archiveContactsVisible?'No archived contacts'
                  :contactTab==='News'?'No newsletter contacts'
                  :contactTab==='Noreply'?'No Noreply contacts'
                  :contactTab==='Muted'?'No muted contacts'
                  :'No contacts'}
              </div>
            )}
            {activeContacts.map(({contact,unread,hasR2m,r2mCount})=><ContactRow key={contact.id} contact={contact} unread={unread} hasR2m={hasR2m} r2mCount={r2mCount}/>)}
          </>)}
        </div>
      </div>
    );

    // Tags section: header is always visible, list fills remaining space
    // when expanded. When contacts is collapsed, tags takes all the middle
    // space (flex-1) so users still see their tags.
    const tagsExpanded = !collapsed.tags;
    const tagsFillsSpace = tagsExpanded && collapsed.contacts;
    const tagsHeightStyle = tagsExpanded
      ? (tagsFillsSpace ? undefined : { height: '40vh' })
      : undefined;
    const tagsSection = (
      <div className={`bg-white border-t border-gray-200 flex flex-col flex-shrink-0 ${tagsFillsSpace ? 'flex-1 min-h-0' : ''}`}
        style={{...(tagsHeightStyle||{}), boxShadow: tagsExpanded ? '0 -4px 12px rgba(0,0,0,0.06)' : 'none', transition: 'height 0.2s ease'}}>
        <div className="flex items-center justify-between cursor-pointer select-none flex-shrink-0 hover:bg-gray-50 transition-colors px-3"
          onClick={()=>onToggleCollapse('tags')} style={{height:36}}>
          <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tags</span>
          <div className="flex items-center gap-2">
            {tagsExpanded&&<button onClick={e=>{e.stopPropagation();setArchiveTagsVisible(v=>!v);}}
              className={`text-xs py-0.5 px-2 rounded transition-colors font-normal normal-case tracking-normal ${archiveTagsVisible?'bg-gray-100 text-gray-600':'text-gray-400 hover:text-gray-600'}`}>
              Archive
            </button>}
          </div>
        </div>
        {tagsExpanded&&(
          <div className="flex-1 min-h-0 overflow-y-auto scroll bg-gray-50" style={{WebkitOverflowScrolling:'touch'}}>
            {!archiveTagsVisible&&activeTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No tags yet</div>}
            {!archiveTagsVisible&&activeTags.map(tag=><TagRow key={tag} tag={tag}/>)}
            {archiveTagsVisible&&archiveTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No archived tags</div>}
            {archiveTagsVisible&&archiveTags.map(tag=><TagRow key={tag} tag={tag}/>)}
          </div>
        )}
      </div>
    );

    return (
      <div className="h-full bg-gray-50 overflow-hidden flex flex-col">
        {accountHeader}
        {contactsHeader}
        {contactsList}
        {tagsSection}
      </div>
    );
  }

  return (
    <div className="flex flex-col h-full bg-gray-50">

      {/* Account selector — only when there's more than one IMAP account.
          With zero or one account the row would be useless real-estate. */}
      {mailAccounts.length > 1 && (
        <div className="border-b border-gray-100 flex-shrink-0 bg-white relative" ref={accDropRef}>
          <button onClick={()=>setAccDropOpen(o=>!o)}
            className="w-full px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 flex items-center justify-between hover:text-gray-600 transition-colors">
            <span className="truncate flex-1 text-left">{accountLabel}</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className="flex-shrink-0 mr-1">
              <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          {accDropOpen&&(
            <div className="absolute left-0 right-0 top-full z-50 bg-white border border-gray-200 rounded-b-lg shadow-lg overflow-hidden">
              {mailAccounts.map(a=>{
                const email=(a.email||'').toLowerCase();
                const checked=selAccounts.includes(email);
                return (
                  <div key={a.id} className="flex items-center gap-2 px-3 py-2 hover:bg-gray-50">
                    <input type="checkbox" checked={checked}
                      onChange={e=>{e.stopPropagation();onToggleAccount(email);}}
                      className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                    <span className="text-xs text-gray-700 truncate flex-1 cursor-pointer"
                      onClick={()=>{onToggleAccount('__exclusive__'+email);setAccDropOpen(false);}}>
                      {a.display_name ? <><span>{a.display_name}</span> <span className="text-gray-400">· {a.imap_user || a.email}</span></> : (a.imap_user || a.email)}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* CONTACTS header */}
      <div className="border-b border-gray-100 flex-shrink-0 bg-white">
        <div className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between">
          <span>Contacts
            {mergeId!==null&&<span className="ml-2 text-indigo-500 normal-case font-normal">· Shift+click</span>}
          </span>
          <div className="flex items-center gap-2">
            {/* Archive toggle on the same row as the section label, like
                Tags. Only shows when contacts panel is expanded — collapsing
                hides it along with the rest of the tabs. */}
            {!collapsed.contacts && (
              <button onClick={()=>setArchiveContactsVisible(v=>!v)}
                className={`text-xs py-0.5 px-2 rounded transition-colors font-normal normal-case tracking-normal ${archiveContactsVisible?'bg-gray-100 text-gray-600':'text-gray-400 hover:text-gray-600'}`}>
                Archive
              </button>
            )}
            <button onClick={()=>onToggleCollapse('contacts')} className="text-gray-300 hover:text-gray-500 pr-1">
              <CollapseIcon open={!collapsed.contacts}/>
            </button>
          </div>
        </div>
        {!collapsed.contacts&&<div className="flex px-2 pt-[3px] pb-1.5 gap-0.5">
          {['Convo','News','Noreply','Muted'].map(tab=>{
            const active=contactTab===tab && !archiveContactsVisible;
            // Muted is a destination, not an actionable bucket — no badge.
            const badge=(!active && !archiveContactsVisible && tab !== 'Muted')?tabBadge(tab):0;
            return <button key={tab} onClick={()=>{setArchiveContactsVisible(false); setContactTab(tab);}}
              className={`convooz-contact-tab flex-1 text-xs py-1 rounded transition-colors ${active?'bg-indigo-50 text-indigo-700 font-semibold':'text-gray-400 hover:text-gray-600'}`}>
              {tab}{badge>0&&<span className="ml-0.5 opacity-70">({badge})</span>}
            </button>;

        </div>}
      </div>

      {/* CONTACTS + TAGS wrapper — fills all remaining space in left column */}
      <div style={{flex:'1 1 0',minHeight:0,display:'flex',flexDirection:'column',overflow:'hidden',background:'#f5f6f8'}}>

        {/* CONTACTS content
            Tags open:   contacts min 43%, max 60% of wrapper; tags content fills rest.
            Tags closed: contacts grows to fill all available space (no white zone). */}
        <div style={{
          flexShrink: 0,
          flexGrow: (!collapsed.contacts && collapsed.tags) ? 1 : 0,
          flexBasis: (!collapsed.contacts && collapsed.tags) ? 0 : 'auto',

          maxHeight: collapsed.contacts ? 0 : (collapsed.tags ? 'none' : '60%'),

          transition: 'min-height 0.15s ease, max-height 0.15s ease, flex-grow 0.2s ease'
        }}>
          <div className="flex-1 overflow-y-auto scroll">
            {!(dataLoading && contactMeta.length===0) && (<>
              {activeContacts.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">
                {archiveContactsVisible?'No archived contacts'
                  :contactTab==='News'?'No newsletter contacts'
                  :contactTab==='Noreply'?'No Noreply contacts'
                  :contactTab==='Muted'?'No muted contacts'
                  :'No contacts'}
              </div>}
              {activeContacts.map(({contact,unread,hasR2m,r2mCount})=><ContactRow key={contact.id} contact={contact} unread={unread} hasR2m={hasR2m} r2mCount={r2mCount}/>)}
            </>)}
          </div>
        </div>

        {/* TAGS header — same style as Contacts header */}
        <div className="border-t border-gray-200 border-b border-gray-100 flex-shrink-0 bg-white">
          <div className="px-3 pt-2 pb-1 text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center justify-between">
            <span>Tags</span>
            <div className="flex items-center gap-2">
              {!collapsed.tags && (
                <button onClick={()=>setArchiveTagsVisible(v=>!v)}
                  className={`text-xs py-0.5 px-2 rounded transition-colors font-normal normal-case tracking-normal ${archiveTagsVisible?'bg-gray-100 text-gray-600':'text-gray-400 hover:text-gray-600'}`}>
                  Archive
                </button>
              )}
              <button onClick={()=>onToggleCollapse('tags')} className="text-gray-300 hover:text-gray-500 pr-1">
                <CollapseIcon open={!collapsed.tags}/>
              </button>
            </div>
          </div>
        </div>

        {/* TAGS content — fills remaining space, collapses to 0 */}
        <div style={{flex:collapsed.tags?'0 0 0px':'1 1 0',overflow:'hidden',display:'flex',flexDirection:'column',transition:'flex 0.15s ease'}}>
          <div className="flex-1 overflow-y-auto scroll">
            {!archiveTagsVisible&&activeTags.length===0&&<div className="px-3 py-3 text-xs text-gray-300 italic">No tags yet</div>}
            {!archiveTagsVisible&&activeTags.map(tag=><TagRow key={tag} tag={tag}/>)}

// Passphrase setup / unlock for Pad A end-to-end encryption.
// mode='setup'  → asks for passphrase + confirm; on submit the parent
//                  derives + wraps + PUTs to /me/crypto.
// mode='unlock' → single passphrase field; on submit the parent
//                  unwraps the master key into masterKeyRef.
// busy + error  → controlled by the parent App so the modal can show a
//                  spinner/state during the round-trip and surface a
//                  "Wrong passphrase" / network failure inline.
function PassphraseModalContent({mode, busy, error, onSubmit, onCancel}) {
  const [pw,  setPw]  = useState('');
  const [pw2, setPw2] = useState('');
  const minLen = 8;
  const tooShort = mode === 'setup' && pw.length > 0 && pw.length < minLen;
  const mismatch = mode === 'setup' && pw2.length > 0 && pw !== pw2;
  const canSubmit = mode === 'setup' ? (pw.length >= minLen && pw === pw2) : pw.length > 0;
  function handleSubmit(){ if (canSubmit && !busy) onSubmit(pw); }
  return (
    <div className="bg-white rounded-lg shadow-xl w-full max-w-sm p-5" onClick={e=>e.stopPropagation()}>
      <div className="font-semibold text-gray-800 text-sm mb-1">
        {mode === 'setup' ? 'Set up encryption' : 'Unlock encryption'}
      </div>
      <p className="text-xs text-gray-600 mb-4 leading-relaxed">
        {mode === 'setup'
          ? 'Choose a passphrase. It locks your mail bodies, subjects and contacts so even Convooz admins can’t read them. There is no recovery — forgetting your passphrase means losing access to everything you encrypt.'
          : 'Enter your passphrase to unlock your encrypted data. The key is derived locally and never sent to the server.'}
      </p>
      <input type="password" value={pw}
        onChange={e=>setPw(e.target.value)}
        onKeyDown={e=>{ if (e.key === 'Enter') handleSubmit(); }}
        placeholder="Passphrase"
        className="w-full px-3 py-2 mb-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-indigo-500"
        autoFocus disabled={busy}/>
      {mode === 'setup' && (
        <input type="password" value={pw2}
          onChange={e=>setPw2(e.target.value)}
          onKeyDown={e=>{ if (e.key === 'Enter') handleSubmit(); }}
          placeholder="Confirm passphrase"
          className="w-full px-3 py-2 mb-2 border border-gray-300 rounded text-sm focus:outline-none focus:border-indigo-500"
          disabled={busy}/>
      )}
      {tooShort && <div className="text-xs text-gray-500 mb-2">At least {minLen} characters.</div>}
      {mismatch  && <div className="text-xs text-red-600 mb-2">Passphrases don’t match.</div>}
      {error     && <div className="text-xs text-red-600 mb-2">{error}</div>}
      <div className="flex justify-end gap-2">
        <button onClick={onCancel} disabled={busy}
          className="px-3 py-1.5 text-xs rounded text-gray-500 hover:bg-gray-100 font-medium disabled:opacity-50">Cancel</button>
        <button onClick={handleSubmit} disabled={!canSubmit || busy}
          className="px-3 py-1.5 text-xs rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium disabled:opacity-50">
          {busy ? '…' : (mode === 'setup' ? 'Set up' : 'Unlock')}
        </button>
      </div>
    </div>
  );
}

function CreatingAccountBar({onComplete, inviteToken, mailAccountId}) {
  const [progress, setProgress] = useState(0);
  const [phase, setPhase] = useState('Setting up your account…');
  useEffect(() => {
    let cancelled = false;
    setProgress(15);
    setPhase('Syncing your mail…');
    // Slowly approach 90% while the sync request is in flight, so the bar
    // moves even if the network round-trip is fast or slow.
    const ramp = setInterval(() => {
      if (cancelled) return;
      setProgress(p => p < 90 ? p + 0.6 : p);
    }, 80);
    (async () => {
      try {
        if (inviteToken && mailAccountId) {
          await apiFetch(`/invites/${encodeURIComponent(inviteToken)}/first-sync`, {
            method: 'POST',
            body: JSON.stringify({ mailAccountId }),
          });
        }
      } catch (_) {
        // Sync failure shouldn't block onboarding — the user can retry from
        // Settings. We still progress to the app.
      }
      if (cancelled) return;
      clearInterval(ramp);
      setProgress(100);
      setPhase('Signing in…');
      setTimeout(() => { if (!cancelled) onComplete?.(); }, 400);
    })();
    return () => { cancelled = true; clearInterval(ramp); };
  }, [inviteToken, mailAccountId]);
  return (
    <>
      <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
        <div className="bg-indigo-600 h-2 rounded-full" style={{width:`${progress}%`, transition:'width 0.2s linear'}}/>
      </div>
      <p className="text-xs text-gray-500 mt-3">{phase}</p>
    </>
  );
}

function LoginScreen() {
  // mode: 'login' | 'forgot' | 'reset-code' | 'reset-done' | 'register' | 'register-imap' | 'creating'
  const [mode, setMode]               = useState('login');
  const [username, setUsername]       = useState(''); // login key (free format)
  const [pass, setPass]               = useState('');
  const [showPass, setShowPass]       = useState(false);
  const [codeMethod, setCodeMethod]   = useState(null); // 'sms'|'email'
  const [code, setCode]               = useState('');
  const [newPass, setNewPass]         = useState('');
  const [newPass2, setNewPass2]       = useState('');
  const [err, setErr]                 = useState('');
  // Register state
  const [regUsername, setRegUsername]         = useState('');
  const [regRecovEmail, setRegRecovEmail]     = useState('');
  const [regPass, setRegPass]                 = useState('');
  const [showRegPass, setShowRegPass]         = useState(false);
  const [regMobile, setRegMobile]             = useState('');
  const [regDisplayName, setRegDisplayName]   = useState('');
  const [regImap, setRegImap]                 = useState({
    imapHost:'', imapPort:993, imapSsl:true, smtpHost:'', smtpPort:465, smtpSsl:true,
    user:'', pass:'', auth:'Password', eraseDeleted:'never', eraseSpam:'never'
  });
  const [regProvider, setRegProvider]         = useState('generic');
  function applyRegProvider(p) {
    setRegProvider(p);
    const preset = (typeof PROVIDER_PRESETS !== 'undefined' && PROVIDER_PRESETS[p]) || {};
    setRegImap(prev => ({
      ...prev,
      imapHost: preset.imap_host !== undefined ? preset.imap_host : prev.imapHost,
      imapPort: preset.imap_port !== undefined ? preset.imap_port : prev.imapPort,
      smtpHost: preset.smtp_host !== undefined ? preset.smtp_host : prev.smtpHost,
      smtpPort: preset.smtp_port !== undefined ? preset.smtp_port : prev.smtpPort,
    }));
  }
  const [inviteToken, setInviteToken]         = useState(null);   // resolved token (from URL or code field)
  const [regCode, setRegCode]                 = useState('');     // typed-in invite code on the register form
  const [newMailAccountId, setNewMailAccountId] = useState(null); // set after register-imap save

  const [busy, setBusy] = useState(false);

  // ── Invite link support ──
  // If the URL carries `?invite=TOKEN`, resolve it so the register form can
  // skip the code field. The bound email (legacy URL invites) becomes the
  // recovery-email default; the user still picks their own username.
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const t = params.get('invite');
    if (!t) return;
    (async () => {
      try {
        const r = await apiFetch(`/invites/${encodeURIComponent(t)}`);
        if (r?.ok) {
          setInviteToken(t);
          if (r.email) setRegRecovEmail(r.email);
          setMode('register');
          setErr('');
        }
      } catch (e) {
        setErr('This invite link is invalid, expired, or already used.');
      }
    })();
  }, []);
  // Translate username → email via backend lookup. Wraps both sign-in and
  // forgot-password — Supabase Auth keys off email, the UI keys off username.
  async function lookupUsernameEmail(uname) {
    const r = await apiFetch('/auth/username-to-email', {
      method: 'POST',
      body: JSON.stringify({ username: uname }),
    });
    return r?.ok ? r.email : null;
  }
  async function handleLogin(e) {
    e.preventDefault();
    if(!username||!pass){setErr('Fill in username and password.');return;}
    setErr(''); setBusy(true);
    let lookupEmail = null;
    try { lookupEmail = await lookupUsernameEmail(username.trim()); } catch (_) {}
    if (!lookupEmail) { setBusy(false); setErr('No account with that username.'); return; }
    const { error } = await sb.auth.signInWithPassword({ email: lookupEmail, password: pass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // Root listens to auth state changes and will swap views
  }
  async function handleSendResetEmail() {
    if(!username){setErr('Enter your username first.');return;}
    setErr(''); setBusy(true);
    let lookupEmail = null;
    try { lookupEmail = await lookupUsernameEmail(username.trim()); } catch (_) {}
    if (!lookupEmail) { setBusy(false); setErr('No account with that username.'); return; }
    // Preserve ?env=staging on the redirect URL so the reset-flow lands
    // back on the environment the user actually came from. Without this
    // the redirect lost the query param and Supabase staging would send
    // the user to prod after clicking the email link. v0.0.253.
    const envParam = new URLSearchParams(window.location.search).get('env');
    const redirectQs = envParam === 'staging' ? '?env=staging' : '';
    const { error } = await sb.auth.resetPasswordForEmail(lookupEmail, {
      redirectTo: window.location.origin + window.location.pathname + redirectQs,
    });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setMode('reset-sent');
  }
  async function handleNewPassSubmit(e) {
    e.preventDefault();
    if(newPass.length<6){setErr('Password must be at least 6 characters.');return;}
    if(newPass!==newPass2){setErr('Passwords do not match.');return;}
    setErr(''); setBusy(true);
    const { error } = await sb.auth.updateUser({ password: newPass });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // Session is already active; Root will swap to App via onAuthStateChange
  }
  async function handleRegisterSubmit(e) {
    e.preventDefault();
    const uname = (regUsername || '').trim();
    if (!uname || !/^[A-Za-z0-9._@+\-]{2,64}$/.test(uname)) {
      setErr('Username: 2-64 chars (letters, digits, . _ @ + -).'); return;
    }
    if (!regRecovEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(regRecovEmail)) {
      setErr('Enter a valid recovery email address.'); return;
    }
    if (!regPass || regPass.length < 8) { setErr('Choose a password of 8 characters or more.'); return; }
    // Validate the invite code now (skip if already resolved via ?invite=)
    let token = inviteToken;
    if (!token) {
      const code = (regCode || '').trim().toUpperCase();
      if (!code) { setErr('Enter your invite code.'); return; }
      setBusy(true);
      try {
        const r = await apiFetch(`/invites/${encodeURIComponent(code)}`);
        if (!r?.ok) { setErr('This invite code is invalid, expired, or already used.'); setBusy(false); return; }
        token = code;
        setInviteToken(code);
      } catch (_) {
        setErr('This invite code is invalid, expired, or already used.'); setBusy(false); return;
      }
      setBusy(false);
    }
    setErr('');
    // Seed IMAP username with the recovery email — most providers use the
    // full address. The user can change it on the next screen if needed.
    setRegImap(p => ({ ...p, user: regRecovEmail }));
    setMode('register-imap');
  }
  // Final step of the invite-driven onboarding: accept the invite with the
  // IMAP details so the backend creates the Supabase user + mail_account in
  // one transaction. Afterwards we show the progress bar, then sign in —
  // sign-in must happen LAST because onAuthStateChange would otherwise swap
  // Root to the App and unmount this screen mid-flow.
  async function handleFinishImap() {
    if (!inviteToken) { setErr('Invite link required.'); return; }
    if (!regImap.imapHost || !regImap.user) { setErr('Fill in at least the IMAP hostname and username.'); return; }
    if (!regImap.pass) { setErr('Password is required.'); return; }
    setErr(''); setBusy(true);
    try {
      const acceptRes = await apiFetch(`/invites/${encodeURIComponent(inviteToken)}/accept`, {
        method: 'POST',
        body: JSON.stringify({
          password: regPass,
          display_name: regDisplayName || undefined,
          username: regUsername.trim(),
          // The recovery email becomes the Supabase user.email under the hood
          // (Auth needs an email identifier for password reset etc.).
          email: regRecovEmail,
          recovery_email: regRecovEmail,
          mobile: regMobile || undefined,
          imap: {
            host: regImap.imapHost,
            port: Number(regImap.imapPort) || 993,
            user: regImap.user,
            password: regImap.pass,
            smtp_host: regImap.smtpHost || regImap.imapHost.replace(/^imap\./i, 'smtp.'),
            smtp_port: Number(regImap.smtpPort) || 465,
          },
        }),
      });
      // Stash the new mail-account id so CreatingAccountBar can run a real
      // first sync against it (via the public /invites/:token/first-sync
      // endpoint) while the bar animates.
      if (acceptRes?.mailAccountId) setNewMailAccountId(acceptRes.mailAccountId);
      setMode('creating');
    } catch (e) {
      setErr(e?.message || 'Could not finish setup. Check IMAP hostname / credentials.');
    }
    setBusy(false);
  }
  // Called when the CreatingAccountBar animation completes. Signs the new
  // user in — onAuthStateChange then fires and Root swaps to the app.
  async function finishOnboarding() {
    try {
      const { error } = await sb.auth.signInWithPassword({ email: regRecovEmail, password: regPass });
      if (error) {
        setErr(`Account ready, but sign-in failed: ${error.message}. Try signing in again.`);
        setMode('login');
      }
    } catch (e) {
      setErr(e?.message || 'Sign-in failed');
      setMode('login');
    }
  }

  const cardCls = "bg-white rounded-2xl shadow-xl px-6 py-8 sm:px-10 sm:py-10 w-full max-w-sm";
  const inputCls = "w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition";
  const inputSmCls = "w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400";

  // h-full + overflow-y-auto on the wrapper below: the parent (#root)
  // has overflow:hidden to lock the main app frame, so without an
  // explicit scroll container here the login form was stuck at its
  // rendered position. On mobile with the on-screen keyboard up the
  // visible area shrinks below the form's height and the Sign-in button
  // slid off the bottom edge with no way to reach it. h-full bounds the
  // wrapper to the visible area (= viewport minus iOS safe-areas) and
  // overflow-y-auto turns it into a scroll context; flex justify-center
  // still centers the form when it fits and content overflows downward
  // when it doesn't.
  return (
    <div className="h-full overflow-y-auto bg-gradient-to-br from-indigo-50 to-slate-100 flex flex-col items-center justify-center px-4 py-6">

      {/* Logo */}
      <div className="mb-8 flex items-center gap-2.5 select-none">
        <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 5h14M3 10h14M3 15h8" stroke="white" strokeWidth="2" strokeLinecap="round"/>
          </svg>
        </div>
        <span className="font-bold text-indigo-700 text-2xl tracking-tight">Convooz</span>
      </div>

      {/* ── Login ── */}
      {mode==='login'&&(
        <div className={cardCls}>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Sign in</h1>
          <p className="text-sm text-gray-400 mb-7">Welcome back</p>
          {/* Error rendering moved to right above the submit button so it
              stays in view when the wrapper is scrolled on mobile. */}
          <form onSubmit={handleLogin} className="space-y-4">
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Username</label>
              <input autoFocus type="text" value={username} onChange={e=>{setUsername(e.target.value);setErr('');}}
                placeholder="your username" autoCapitalize="off" autoComplete="username"
                spellCheck={false} className={inputCls}/>
            </div>
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Password</label>
              <div className="relative">
                <input type={showPass?"text":"password"} value={pass} onChange={e=>{setPass(e.target.value);setErr('');}}
                  placeholder="••••••••"
                  className="w-full border border-gray-200 rounded-xl px-4 py-2.5 pr-16 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 transition"/>
                <button type="button" onClick={()=>setShowPass(v=>!v)}
                  className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-gray-600">
                  {showPass?'Hide':'Show'}
                </button>
              </div>
            </div>
            <div className="flex justify-end">
              <button type="button" onClick={()=>{setMode('forgot');setErr('');}}
                className="text-xs text-indigo-500 hover:text-indigo-700 hover:underline">
                Forgot password?
              </button>
            </div>
            {/* Inline error directly above the submit button: on mobile the
                wrapper is scrollable and the top-of-card error block easily
                ends up out of view when the user is focused on the button. */}
            {err&&<div className="px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
            <button type="submit" disabled={busy}
              className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-wait text-white text-sm font-semibold transition flex items-center justify-center gap-2">
              {busy && <span className="inline-block w-3.5 h-3.5 rounded-full border-2 border-white/40 border-t-white animate-spin"/>}

      )}

      {/* ── Forgot password ── */}
      {mode==='forgot'&&(
        <div className={cardCls}>
          <button onClick={()=>{setMode('login');setErr('');}} className="text-xs text-gray-400 hover:text-gray-600 mb-5 flex items-center gap-1">← Back to sign in</button>
          <h1 className="text-xl font-bold text-gray-900 mb-1">Reset password</h1>
          <p className="text-sm text-gray-400 mb-7">We'll send a reset link to your recovery email.</p>
          {err&&<div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-600 text-xs">{err}</div>}
          <div className="space-y-4">
            <div>
              <label className="text-xs text-gray-500 font-medium block mb-1">Username</label>
              <input autoFocus type="text" value={username} onChange={e=>{setUsername(e.target.value);setErr('');}}
                placeholder="your username" autoCapitalize="off" autoComplete="username"
                spellCheck={false} className={inputCls}/>
            </div>
            <button onClick={handleSendResetEmail} disabled={busy}
              className="w-full py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-sm font-semibold transition">

      {mode==='reset-sent'&&(

          <button onClick={()=>{setMode('login');setErr('');}}
            className="w-full py-2.5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium transition">
            Back to sign in
          </button>
        </div>
      )}

      {/* ── Enter reset code ── */}
      {mode==='reset-code'&&(

  smtp_host: '', smtp_port: 587, smtp_user: '', smtp_password: '',
  retention_deleted_days: null, retention_spam_days: null, auto_sync: false,

const RETENTION_OPTIONS = [
  { value: null,  label: 'Never (keep on server)' },
  { value: 7,    label: 'After 7 days' },
  { value: 14,   label: 'After 14 days' },

// Bootstrap cache: stash the shaped /bootstrap result in localStorage so a
// returning user (especially on mobile, where the PWA is killed often) sees
// the contact list and messages instantly while the network refresh runs in
// the background. Keyed per user + a SCHEMA constant — independent of
// APP_VERSION so the cache survives ordinary deploys. Bump
// BOOTSTRAP_CACHE_SCHEMA only when the shape we serialize below actually
// changes (e.g. new fields on contacts or messages).
// Back at 1 in v0.0.138. The 0.0.136 bump to 2 was meant to flush
// ghost-account caches one-time but had a much bigger side effect:
// every user lost their cache on the upgrade and the next mount had
// to wait the full /bootstrap fetch with an empty screen. Going back
// to 1 makes existing caches readable again. The clearBootstrapCache
// hook in refreshData below catches future account deletes; that's
// the real fix, the schema bump never should have shipped.
const BOOTSTRAP_CACHE_SCHEMA = 3;
function bootstrapCacheKey(uid) { return `convooz:bootstrap:${uid}:s${BOOTSTRAP_CACHE_SCHEMA}`; }
function readBootstrapCache(uid) {
  if (!uid) { console.log('[cache] read skipped: no userId'); return null; }
  try {
    const raw = localStorage.getItem(bootstrapCacheKey(uid));
    if (!raw) { console.log('[cache] read miss: no entry for key', bootstrapCacheKey(uid)); return null; }
    const obj = JSON.parse(raw);
    if (!obj || obj.v !== BOOTSTRAP_CACHE_SCHEMA) {
      console.log('[cache] read miss: schema mismatch (got', obj?.v, 'want', BOOTSTRAP_CACHE_SCHEMA, ')');
      return null;
    }
    const ageSec = obj.writtenAt ? Math.round((Date.now() - obj.writtenAt) / 1000) : null;
    console.log('[cache] read hit:',
      (obj.contactList || []).length, 'contacts,',
      (obj.messageList || []).length, 'messages, age',
      ageSec === null ? 'unknown' : ageSec + 's');
    return {
      mailAccounts:     obj.mailAccounts     || [],
      contactList:      obj.contactList      || [],
      messageList:      obj.messageList      || [],
      tagList:          obj.tagList          || [],
      tagIdByName:      new Map(obj.tagIdByName || []),
      msgTags:          obj.msgTags          || {},
      archivedContacts: new Set(obj.archivedContacts || []),
      tagRoles:         obj.tagRoles         || {},
      deletedIds:       obj.deletedIds       || [],
      msgSnoozeCounts:  obj.msgSnoozeCounts  || {},
      signatures:       obj.signatures       || [],
      accountSigs:      obj.accountSigs      || {},
      writtenAt:        obj.writtenAt        || null,
    };
  } catch (e) { console.warn('[cache] read error:', e.message); return null; }
}
// Returns a short human-readable description of the bootstrap cache for
// the user-menu — "Cache: empty", "Cache: 87 KB · 4m ago" etc. so a tester
// can verify on their phone whether last-seen content is being persisted.
// Aggregate per-account sync progress for the user-menu line. Each account
// row carries messages_count (rows in our DB) and sync_known_uids (UIDs the
// IMAP server reported in scope at last sync). The catch-up loop reduces
// (known - synced) to zero one batch at a time, so this is the user-visible
// "X of Y mails synced" indicator. Returns null when nothing meaningful can
// be shown yet — e.g. a fresh account that has never finished its first
// sync, where sync_known_uids is still NULL.
function syncProgressLine(mailAccounts) {
  let synced = 0, known = 0, anyKnown = false;
  for (const a of (mailAccounts || [])) {
    synced += a.messages_count || 0;
    if (a.sync_known_uids != null) { known += a.sync_known_uids; anyKnown = true; }
  }
  if (!anyKnown) return null;
  if (synced >= known) return `Sync: all ${synced} mails synced`;
  return `Sync: ${synced} of ${known} mails`;
}

function readCacheStatus(uid) {
  if (!uid) return 'Cache: (no user)';
  try {
    const raw = localStorage.getItem(bootstrapCacheKey(uid));
    if (!raw) return 'Cache: empty';
    const obj = JSON.parse(raw);
    const kb = Math.round(raw.length / 1024);
    const ageS = obj.writtenAt ? Math.round((Date.now() - obj.writtenAt) / 1000) : null;
    const ageStr = ageS == null ? 'unknown age'
      : ageS < 60 ? `${ageS}s ago`
      : ageS < 3600 ? `${Math.round(ageS / 60)}m ago`
      : `${Math.round(ageS / 3600)}h ago`;
    return `Cache: ${kb} KB · ${ageStr}`;
  } catch { return 'Cache: read error'; }
}

// Drop the cached snapshot — used after a state change we don't want to
// linger in localStorage (account delete, etc.). The next mount then
// shows whatever /bootstrap returns, with no ghosts from the previous
// snapshot if the user kills the app before the fetch lands.
function clearBootstrapCache(uid) {
  if (!uid) return;
  try { localStorage.removeItem(bootstrapCacheKey(uid)); } catch {}
}

// Decide whether a cached message still belongs to an active account.
// A message can carry accountId (UUID) or accountEmail or both — we
// only keep it when whatever it does carry matches the current set.
// Messages with neither (highly unusual, but defensive) are kept.
function msgBelongsToActiveAccount(m, validIds, validEmails) {
  const hasId = !!m.accountId;
  const hasEmail = !!m.accountEmail;
  if (!hasId && !hasEmail) return true;
  if (hasId && !validIds.has(m.accountId)) return false;
  if (hasEmail && !validEmails.has((m.accountEmail || '').toLowerCase())) return false;
  return true;
}

function writeBootstrapCache(uid, snap) {
  if (!uid) { console.log('[cache] write skipped: no userId'); return; }
  // Three fallback levels so a big mailbox still ends up with a useful
  // cache instead of nothing:
  //   1. full      — every body, search hits everything.
  //   2. slim      — bodies kept only for messages the user can act on
  //                  right away (unread incoming, active revert-to-me,
  //                  drafts). The detail view opens these without a
  //                  network round-trip; the rest re-fetch on demand.
  //   3. ultra-slim — only drafts keep their body (user's in-progress
  //                   text). Last resort when even (2) overflows.
  function buildPayload(messages) {
    return JSON.stringify({
      v: BOOTSTRAP_CACHE_SCHEMA,
      writtenAt: Date.now(),
      mailAccounts:     snap.mailAccounts,
      contactList:      snap.contactList,
      messageList:      messages,
      tagList:          snap.tagList,
      tagIdByName:      [...snap.tagIdByName.entries()],
      msgTags:          snap.msgTags,
      archivedContacts: [...snap.archivedContacts],
      tagRoles:         snap.tagRoles,
      deletedIds:       snap.deletedIds,
      msgSnoozeCounts:  snap.msgSnoozeCounts,
      signatures:       snap.signatures,
      accountSigs:      snap.accountSigs,
    });
  }
  const key = bootstrapCacheKey(uid);
  const isQuota = e => e?.name === 'QuotaExceededError'
    || e?.code === 22 || e?.code === 1014  // legacy Safari / Firefox codes
    || /quota/i.test(e?.message || '')
    || /exceeded the quota/i.test(e?.message || '');
  const isActionable = m =>
    m.draft ||
    (m.dir === 'in'  && !m.read) ||
    (m.dir === 'out' && m.revert2me);
  const stripped = m => ({ ...m, body: undefined, bodyHtml: undefined });
  const total = snap.messageList.length;
  function attempt(level, messages) {
    const payload = buildPayload(messages);
    localStorage.setItem(key, payload);
    const bodyCount = messages.filter(m => m.body || m.bodyHtml).length;
    console.log(`[cache] write ok (${level}):`,
      snap.contactList.length, 'contacts,',
      total, 'messages,',
      bodyCount, 'with body,',
      Math.round(payload.length / 1024), 'KB');
  }
  try {
    attempt('full', snap.messageList);
    return;
  } catch (e) {
    if (!isQuota(e)) { console.warn('[cache] write error:', e.message); return; }
  }
  try {
    attempt('slim — actionable bodies kept', snap.messageList.map(m => isActionable(m) ? m : stripped(m)));
    return;
  } catch (e) {
    if (!isQuota(e)) { console.warn('[cache] write error (slim):', e.message); return; }
  }
  try {
    attempt('ultra-slim — drafts only', snap.messageList.map(m => m.draft ? m : stripped(m)));
  } catch (e) {
    console.warn('[cache] write error (ultra-slim also failed):', e.message);
  }
}

function App({userId, onSignOut}) {
  // Read the bootstrap cache exactly once per mount: useRef captures the
  // value across re-renders so the localStorage parse only happens on first
  // render. Used to lazy-init every state slice that /bootstrap fills.
  const bootstrapCacheRef = useRef();
  if (bootstrapCacheRef.current === undefined) {
    bootstrapCacheRef.current = readBootstrapCache(userId);
    console.log('[hydration] App mounted with userId=', userId,
      '| cache=', bootstrapCacheRef.current ? 'hit' : 'miss',
      '| contacts=', bootstrapCacheRef.current?.contactList?.length ?? 0,
      '| messages=', bootstrapCacheRef.current?.messageList?.length ?? 0);
  }
  const bootstrapCache = bootstrapCacheRef.current;
  // Mobile
  const [isMobile,    setIsMobile]    = useState(()=>window.innerWidth < 768);
  const [mobileCol,   setMobileCol]   = useState(0); // 0=contacts 1=thread 2=detail
  React.useEffect(()=>{
    const handler=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener('resize',handler);
    return ()=>window.removeEventListener('resize',handler);
  },[]);
  // Layout
  const [colWidths,    setColWidths]    = useState([20,40,40]);
  const [tagsHeight,   setTagsHeight]   = useState(180);
  const [archiveHeight,setArchiveHeight]= useState(120);
  // Data — lazy-init from localStorage bootstrap cache so the UI paints with
  // last-seen content instantly. The /bootstrap fetch runs in the background
  // and overwrites these once it completes.
  const [mailAccounts, setMailAccounts] = useState(()=>bootstrapCache?.mailAccounts ?? []);
  const [contactList,  setContactList]  = useState(()=>bootstrapCache?.contactList ?? []);
  // Per-contact aggregate stats from /bootstrap, computed server-side
  // over ALL messages (not just the top-500 messageList). Used as the
  // SORT key for the contact list so it doesn't reshuffle while
  // lazy-fetched messages stream in. Shape: { [contactId]: { latest_date, unread, r2m } }
  const [contactStats, setContactStats] = useState(()=>bootstrapCache?.contactStats ?? {});
  // Tracks which contactId currently has a lazy-fetch in flight; the
  // ThreadColumn shows a spinner instead of "Select a contact" while
  // the network round-trip is pending and messageList still has no

        const masterKeyForRead = masterKeyRef.current;

        }

          const r2mRow = r2mByMsg.get(m.id);

            to: toList[0] || allRecipients[0]?.email || '',

        });

            replyToId: d.reply_to_message_id || null,

        for (const c of contacts) {

                if (dec !== null) c.name = dec;

          const accEmails = [...(contactAccounts.get(c.id) || [])];

            id: c.id,
            name: c.name || emails[0] || '(unknown)',

        const idByName = new Map(tagList.map(t => [t.name, t.id]));

          const t = tagById.get(row.tag_id);

        const byEmail = {};
        {
          const emailByAccId = new Map(mail_accounts.map(a => [a.id, (a.email || '').toLowerCase()]));
          for (const row of (accSigs || [])) {
            const email = emailByAccId.get(row.mail_account_id);
            if (!email) continue;
            if (!byEmail[email]) byEmail[email] = { linked: [], autoId: null };
            byEmail[email].linked.push(row.signature_id);
            if (row.is_auto) byEmail[email].autoId = row.signature_id;
          }
        }

        setMailAccounts(mail_accounts);
        setContactList(shapedContacts);
        setMessageList(combinedMessages);
        setContactStats(contact_stats || {});
        setTagList(tagList);
        setTagIdByName(idByName);
        setMsgTags(mt);
        setArchivedContacts(archivedSet);
        setTagRoles(roles);
        setDeletedIds(deletedIdsArr);
        setMsgSnoozeCounts(snoozeCountsObj);

        // before the network call finishes. Done after the setters so a parse
        // throw in writeBootstrapCache can't block the UI from updating.
        writeBootstrapCache(userId, {
          mailAccounts: mail_accounts,
          contactList: shapedContacts,
          messageList: combinedMessages,
          contactStats: contact_stats || {},
          tagList,
          tagIdByName: idByName,
          msgTags: mt,
          archivedContacts: archivedSet,
          tagRoles: roles,

          accountSigs: byEmail,
        });

        if (!cancelled) setDataError(e.message);
      } finally {

          setBootstrapFetching(false);
        }
      }
    })();

  }, [dataRefreshTick]);

  // refreshData triggers a fresh /bootstrap fetch. We deliberately do

  // is exactly the cold-load UX we want to avoid. Stale entries are
  // pruned a different way: the sync-effect below diffs live mail-
  // Accounts against the cached snapshot and rewrites whatever slices
  // are now out of date.
  const refreshData = useCallback(() => setDataRefreshTick(t => t + 1), []);

  // reappearing on the next mount. This effect overrides only the
  // affected slices of the existing cache; everything else (contacts,
  // tags, signatures, …) stays whatever the bootstrap success last
  // wrote. No-op when there's no drift.
  useEffect(() => {

    if (!cached) return;

    const cachedIds = (cached.mailAccounts || []).map(a => a.id).sort().join(',');

    const prunedMessages = cachedMessages.filter(m => msgBelongsToActiveAccount(m, validIds, validEmails));

    const messagesDrift = prunedMessages.length !== cachedMessages.length;

    writeBootstrapCache(userId, { ...cached, mailAccounts, messageList: prunedMessages });
  }, [userId, mailAccounts]);
  const [deletedIds,   setDeletedIds]   = useState(()=>bootstrapCache?.deletedIds ?? INIT_DELETED);
  const [msgTags,      setMsgTags]      = useState(()=>bootstrapCache?.msgTags ?? {});            // {msgId: [tagName,...]}
  const [tagList,      setTagList]      = useState(()=>bootstrapCache?.tagList ?? []);             // [{id, name, archived_at}]
  const [tagIdByName,  setTagIdByName]  = useState(()=>bootstrapCache?.tagIdByName ?? new Map());  // name → id (for detach)

  const [settingsTab,      setSettingsTab]      = useState(null); // null | 'profile' | 'accounts' | 'signatures'

  const [selAccounts,      setSelAccounts]      = useState(() => {

  useEffect(() => {
    if (mailAccounts.length === 0) return;

  const [showUserMenu,     setShowUserMenu]     = useState(false);
  // Authenticated user info for the top-right user-menu pulldown. Pulled from

  // email from the auth record itself. Falls back to the email local-part so

  const [currentUser,      setCurrentUser]      = useState({ name: '', username: '', email: '', isTest: false });
  useEffect(() => {
    let cancelled = false;
    async function loadUser() {
      const { data } = await sb.auth.getUser();
      if (cancelled || !data?.user) return;
      setCurrentUser({
        name:     data.user.user_metadata?.display_name || '',
        username: data.user.user_metadata?.username     || '',
        email:    data.user.email || '',
        isTest:   !!data.user.user_metadata?.is_test_account,

    // Re-hydrate after the user saves their profile in Settings (USER_UPDATED)
    // so the pulldown reflects the new name without a reload.
    const { data: authSub } = sb.auth.onAuthStateChange((event) => {
      if (event === 'USER_UPDATED' || event === 'SIGNED_IN') loadUser();

    return () => { cancelled = true; authSub?.subscription?.unsubscribe?.(); };
  }, []);

  // ─── Pad A: end-to-end-encryption state ─────────────────────────────────
  // cryptoStatus walks the lifecycle the user-menu reads from:
  //   'idle'      – we haven't asked the backend yet
  //   'unset'     – /me/crypto returned status:'unset', user has never
  //                 chosen a passphrase. Click "Set up encryption" in
  //                 the user menu → passphrase-setup modal.
  //   'locked'    – wrapped key + salt are on the server, master key is
  //                 not yet derived in this session. Click "Unlock
  //                 encryption" → passphrase-unlock modal.
  //   'unlocked'  – master key sits in masterKeyRef.current as a
  //                 CryptoKey, in-memory only, never serialised.
  //   'error'     – network or crypto failure surfaced to the user.
  // masterKeyRef is a ref (not state) so React snapshots / DevTools
  // inspections never serialise the live key. CryptoKey objects are
  // already non-extractable for direct read, but keeping them out of
  // setState reduces the chance of accidental persistence.
  const [cryptoStatus,     setCryptoStatus]     = useState('idle');
  const [cryptoMaterial,   setCryptoMaterial]   = useState(null);     // {passphrase_salt, wrapped_master_key, …} from server
  const masterKeyRef = useRef(null);                                  // CryptoKey | null
  const [passphraseModal,  setPassphraseModal]  = useState(null);     // null | {mode:'setup'|'unlock', error?:string, busy?:bool}

  // After auth, query /me/crypto to find out which lifecycle bucket the
  // user is in. Re-runs whenever the auth user id changes (sign-in or
  // sign-out → SIGNED_IN event resets currentUser).
  useEffect(() => {
    if (!currentUser?.email) {
      // Auth lost (sign-out, expired refresh). Drop any in-memory key
      // so the next apiFetch doesn't ship X-User-Key to a fresh
      // session that may belong to a different user.
      masterKeyRef.current = null;
      setUserKeyHeader(null);
      setCryptoStatus('idle');
      setCryptoMaterial(null);
      return;
    }
    let cancelled = false;
    (async () => {
      try {
        await CONVOOZ_CRYPTO.ready();
        const r = await apiFetch('/me/crypto');
        if (cancelled) return;
        if (r?.status === 'unset') {
          setCryptoMaterial(null);
          setCryptoStatus('unset');
        } else if (r?.status === 'locked') {
          setCryptoMaterial(r);
          setCryptoStatus('locked');
        } else {
          setCryptoStatus('error');
        }
      } catch (e) {
        if (!cancelled) {
          console.warn('[crypto] /me/crypto fetch failed:', e?.message || e);
          setCryptoStatus('error');
        }
      }
    })();
    return () => { cancelled = true; };
  }, [currentUser?.email]);

  // Whenever the session is in the unlocked state, make sure the backfill
  // has caught up — covers the case where the user set up encryption
  // before v0.0.246 (auto-backfill didn't exist yet) or where the page
  // reloads while unlocked. The runner is idempotent and exits in one
  // round when nothing is left to do, so triggering it on every status
  // transition to "unlocked" costs ~1 API call when already encrypted.
  // v0.0.248.
  useEffect(() => {
    if (cryptoStatus !== 'unlocked') return;
    runEncryptionBackfill();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [cryptoStatus]);
