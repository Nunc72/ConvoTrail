       installed, the SW handles freshness and this is just a safety net
       for the very first migration. -->

    (async () => {
      try {
        const r = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const { version } = await r.json();
        if (!version) return;
        const url = new URL(location.href);
        if (url.searchParams.get('v') !== version) {
          url.searchParams.set('v', version);

// ─── End-to-end-encryption crypto (Pad A) ────────────────────────────────────
// Built on the browser-native Web Crypto API (window.crypto.subtle). No
// external library, no CDN, no WASM. The master key for a user is a
// random 32 bytes generated on first passphrase setup; everything
// sensitive (bodies, subjects, addresses, contact cards) gets encrypted
// with it before landing in Postgres, and the backend never holds the
// key after a request completes. The wrapped form stored in
// user_crypto.wrapped_master_key is useless without the passphrase.
//
// Conventions:
//   • encrypt() output and the wrappedKey blob both use the layout
//     [iv (12B) | ciphertext+gcm-tag]. AES-256-GCM with a random 12-byte
//     IV per call (NIST-permitted at this volume).
//   • blindIndex() is HMAC-SHA256 over the lowercased plaintext, keyed
//     by a sub-key derived from the master key with a context tag.
//     Deterministic per (user, value): equal plaintexts produce equal
//     blind-indices, so the backend can match "from_email" to a
//     contact_emails row by equality without seeing the address. The
//     master key never directly feeds the HMAC — limits damage if the
//     blind-index sub-key ever leaks (we could rotate it without
//     re-wrapping the master).
//   • All public-facing bytes (to/from the backend, into localStorage,
//     etc.) are base64-encoded strings. Raw Uint8Arrays stay inside.

    if (!subtle) throw new Error("Web Crypto API not available (HTTPS context required)");
    return subtle;

  // for symmetry with the previous libsodium-shaped API and to catch the
  // (rare) non-secure-context case before the first crypto call.

    toBytes: (s) => {

      { name: "AES-GCM", length: 256 },
      true,  // extractable: we need to be able to wrap it
      ["encrypt", "decrypt"],

  // user_crypto.passphrase_salt — not a secret, just anti-rainbow-table.

  // returned as an AES-GCM CryptoKey suitable for wrapping/unwrapping
  // the master key. 600k iterations is the OWASP 2023 recommendation for
  // PBKDF2-SHA256.
  async function deriveKeyFromPassphrase(passphrase, salt, opts = {}) {
    const iterations = opts.iterations ?? 600000;
    const baseKey = await requireSubtle().importKey(
      "raw", utf8.fromString(passphrase),
      { name: "PBKDF2" },
      false, ["deriveKey"],
    );

      { name: "PBKDF2", salt: salt instanceof Uint8Array ? salt : new Uint8Array(salt), iterations, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,                          // not extractable — never leaves crypto subsystem
      ["encrypt", "decrypt"],
    );

  // Input/output both Uint8Array; callers serialize to base64 when
  // storing or transporting.
  async function encryptBytes(plaintextBytes, key) {
    const iv = randomBytes(12);
    const ct = await requireSubtle().encrypt({ name: "AES-GCM", iv }, key, plaintextBytes);
    const ctU8 = new Uint8Array(ct);
    const out = new Uint8Array(iv.length + ctU8.length);
    out.set(iv, 0);
    out.set(ctU8, iv.length);
    return out;

  async function decryptBytes(blob, key) {
    if (!blob || blob.length < 12) return null;
    const iv = blob.subarray(0, 12);
    const ct = blob.subarray(12);

      const pt = await requireSubtle().decrypt({ name: "AES-GCM", iv }, key, ct);
      return new Uint8Array(pt);

    return bytes === null ? null : utf8.toString(bytes);
  }

  // matches the encryptBytes layout [iv | ciphertext+tag] — stored as
  // user_crypto.wrapped_master_key.
  async function wrapMasterKey(masterCryptoKey, derivedCryptoKey) {
    const raw = new Uint8Array(await requireSubtle().exportKey("raw", masterCryptoKey));
    try {
      return await encryptBytes(raw, derivedCryptoKey);
    } finally {
      // Zeroize the in-memory raw copy as soon as possible.
      raw.fill(0);
    }
  }

  async function unwrapMasterKey(wrappedBlob, derivedCryptoKey) {
    const raw = await decryptBytes(wrappedBlob, derivedCryptoKey);
    if (raw === null) return null;
    try {
      return await requireSubtle().importKey(
        "raw", raw,
        { name: "AES-GCM", length: 256 },
        true, ["encrypt", "decrypt"],
      );
    } finally {
      raw.fill(0);
    }
  }

  // HMAC sub-key derivation. We derive an HMAC-SHA256 key from the
  // master key + a context label so the master key never directly
  // signs anything. Result is a non-extractable CryptoKey suitable
  // for subtle.sign({name:'HMAC'}, …).
  async function deriveSubKey(masterCryptoKey, context) {
    // Build sub-key material = HMAC(rawMaster, context) — we need the
    // raw master to do this, so export → use → zero. Once Phase 1.2
    // ships we'll cache the resulting CryptoKey alongside masterKey to
    // avoid re-exporting per call.
    const raw = new Uint8Array(await requireSubtle().exportKey("raw", masterCryptoKey));
    try {
      const hmacKeyForDerivation = await subtle.importKey(
        "raw", raw,
        { name: "HMAC", hash: "SHA-256" },
        false, ["sign"],
      );
      const sub = new Uint8Array(await subtle.sign({ name: "HMAC" }, hmacKeyForDerivation, utf8.fromString(context)));
      return await subtle.importKey(
        "raw", sub,
        { name: "HMAC", hash: "SHA-256" },
        false, ["sign"],
      );
    } finally { raw.fill(0); }
  }

  // Deterministic, keyed hash of a value (after .trim().toLowerCase() —
  // emails normalize, names normalize) → 32 bytes. Use for matching:
  // hash both sides with the same sub-key, compare equality. Backend
  // stores these in *_blind columns.
  async function blindIndex(value, masterCryptoKey, subkeyContext = "convooz-blind-v1") {
    const subKey = await deriveSubKey(masterCryptoKey, subkeyContext);
    const normalized = (value ?? "").trim().toLowerCase();
    const sig = await requireSubtle().sign({ name: "HMAC" }, subKey, utf8.fromString(normalized));
    return new Uint8Array(sig);
  }

  // Export a CryptoKey as raw 32 bytes. Used by App to populate the
  // X-User-Key header pool just after Set-up / Unlock — the backend
  // needs the raw bytes (not a CryptoKey object) to import its own
  // copy and encrypt with the same algorithm.
  async function exportRawKey(cryptoKey) {
    return new Uint8Array(await requireSubtle().exportKey("raw", cryptoKey));
  }

  return {
    ready,
    b64, utf8, randomBytes,
    generateMasterKey, generateSalt,
    deriveKeyFromPassphrase,
    encryptBytes, decryptBytes,
    encryptString, decryptString,
    wrapMasterKey, unwrapMasterKey,
    exportRawKey,
    deriveSubKey, blindIndex,
  };
})();

  if (!nameOrEmail) return "?";
  const s = String(nameOrEmail).trim();
  if (s.includes("@")) {
    const local = s.split("@")[0];
    return local.slice(0, 2).toUpperCase();
  }
  const parts = s.split(/\s+/).filter(Boolean);
  if (parts.length === 0) return "?";

// refreshSession() call (one-shot use). If two parallel API calls both
// 401 at the same time, each firing its own refreshSession() races the
// other — the second one tries to use the now-spent refresh token and
// gets "Invalid Refresh Token: Refresh Token Not Found", corrupting
// the session state. Dedupe by sharing one in-flight promise.
let __refreshInFlight = null;
function refreshSessionDedup() {
  if (__refreshInFlight) return __refreshInFlight;
  __refreshInFlight = sb.auth.refreshSession()
    .finally(() => { __refreshInFlight = null; });
  return __refreshInFlight;
}
// Module-scope reference for the per-user master key in base64 form.
// Set by the App after a successful Set-up / Unlock; cleared on Lock or
// sign-out. apiFetch reads this so every server call that needs the key
// (sync, send, future encrypted-write paths) carries X-User-Key. We
// keep it as a base64 string instead of raw bytes so the header build
// doesn't have to do per-call conversion. Lives outside the React
// component tree to avoid re-render churn — React.set/getState on a
// key would burn renders on every change.
let _userKeyB64ForHeader = null;
function setUserKeyHeader(b64OrNull) { _userKeyB64ForHeader = b64OrNull || null; }

// Module-level CryptoKey reference for read-path decryption inside child
// components (MessageDetail) without prop-drilling masterKeyRef from App.
// Set whenever the user unlocks; cleared on lock/sign-out. v0.0.247.
let _masterKeyForDecrypt = null;
function setMasterKeyForDecrypt(cryptoKey) { _masterKeyForDecrypt = cryptoKey || null; }

async function apiFetch(path, opts = {}) {
  // Build the Authorization header lazily so the 401-refresh path below
  // can pick up the fresh access_token after refreshSession() runs.
  async function buildHeaders() {
    const { data: { session } } = await sb.auth.getSession();
    const headers = { ...(opts.headers || {}) };
    if (opts.body != null) headers["Content-Type"] = "application/json";
    if (session?.access_token) headers.Authorization = `Bearer ${session.access_token}`;
    if (_userKeyB64ForHeader) headers["X-User-Key"] = _userKeyB64ForHeader;
    return headers;
  }
  let res = await fetch(BACKEND_URL + path, { ...opts, headers: await buildHeaders() });
  // 401 means the backend rejected the JWT as expired/invalid. Supabase
  // auto-refreshes in the background on a timer, but the timer can lag
  // when the tab was inactive or the device just woke up — getSession
  // then returns a stale token. One forced refresh + retry hides that
  // glitch from the user. The dedup helper makes parallel 401s share
  // a single refresh attempt so the rotated refresh-token isn't burned
  // twice.
  if (res.status === 401) {
    await refreshSessionDedup().catch(() => {});
    res = await fetch(BACKEND_URL + path, { ...opts, headers: await buildHeaders() });
    // Still 401 after a forced refresh — the refresh token is itself
    // expired, revoked, or for a deleted user. There is nothing the
    // user can do from inside the app to recover; sign them out so
    // onAuthStateChange flips Root to LoginScreen and they get a
    // clean prompt instead of an opaque error toast on every action.
    if (res.status === 401) {
      console.warn('[apiFetch] persistent 401 after refresh — signing out');
      await sb.auth.signOut().catch(() => {});
    }
  }
  // The backend translates Supabase/Postgres pooler hiccups (EDBHANDLEREXITED,
  // "fetch failed" from the SDK, statement timeouts) to a clean 503. Most of
  // those are over within a second or two, so one automatic retry hides the
  // wobble from the UI.
  if (res.status === 503) {
    await new Promise(r => setTimeout(r, 1200));
    res = await fetch(BACKEND_URL + path, { ...opts, headers: await buildHeaders() });
  }
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${await res.text()}`);
  return res.status === 204 ? null : res.json();
}

  { id: 201, contactId: 2, dir: "in",  subject: "Factuur april 2026",                  from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-09T08:00:00", read: false, revert2me: false, body: "Goedemorgen,\n\nIn de bijlage de factuur voor april. Graag voor de 20e betalen.\n\nFactuur #2026-041\nBedrag: €1.850,00 excl. BTW\n\nHieronder een specificatie van de werkzaamheden in de afgelopen maand, zodat je precies kunt zien waar de kosten aan zijn besteed en je het gemakkelijk intern kunt doorbelasten.\n\n— Projectbeheer en coördinatie: 12 uur\n— Ontwerpwerk module A (iteraties v3 → v5): 18 uur\n— Ontwerpwerk module B (v1): 9 uur\n— Technische review met het ontwikkelteam: 4 uur\n— Klantoverleg en afstemming: 6 uur\n— Documentatie en hand-over: 5 uur\n— Reistijd (2 bezoeken ter plaatse): 3 uur\n\nTotaal: 57 uur × €32,46 = €1.850,00 excl. BTW.\n\nEnkele opmerkingen bij deze factuur:\n\n1. De uren voor module B zijn lager uitgevallen dan vooraf ingeschat omdat we een aantal onderdelen uit module A hebben kunnen hergebruiken. Dit scheelt ongeveer 4 uur. Dat verschil heb ik verwerkt in deze factuur.\n\n2. De klantsessie van 3 april heeft langer geduurd dan gepland. De extra tijd (ongeveer 1,5 uur) heb ik niet apart gefactureerd omdat deze binnen de bandbreedte van het voorstel valt.\n\n3. Voor mei heb ik alvast een globale planning gemaakt. Als alles volgens schema verloopt, verwacht ik ongeveer 45–50 uur nodig te hebben. Ik stuur de definitieve planning zodra we de kick-off van fase 2 hebben ingepland.\n\n4. Zoals afgesproken ontvang je samen met deze factuur ook een bijlage met de voortgangsrapportage van dit kwartaal. Neem deze gerust door en laat me weten of er vragen zijn.\n\n5. Mocht je een splitsing per kostenplaats willen zien (bijvoorbeeld onderscheid tussen intern en klantgericht werk), dan kan ik die alsnog aanmaken. Geef even een seintje.\n\nVoor de betaling: hanteer zoals altijd een betalingstermijn van 14 dagen. Bij vragen over bedragen of specificaties: bel of mail gerust — ik help snel verder.\n\nDank voor de prettige samenwerking deze maand. Ik kijk uit naar het vervolg.\n\nMet vriendelijke groet,\nThomas de Groot\nOpdrachtnemer freelance" },
  { id: 202, contactId: 2, dir: "out", subject: "Re: Factuur april 2026",              from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-08T13:45:00", read: true,  revert2me: true,  body: "Thomas,\n\nOntvangen — dank je. Ik heb de factuur en de urenspecificatie doorgenomen en het ziet er allemaal duidelijk uit. Hieronder mijn reactie per punt, dan kun jij kijken of we er zo uit komen.\n\n1. URENVERANTWOORDING\nDe verdeling van 57 uur klopt met wat ik intern had ingeschat. Met name de reductie op module B door hergebruik van module A waardeer ik — dat had je ook door kunnen laten lopen op 13 uur, dus dank voor de transparantie. Voor mei neem ik alvast 45–50 uur als richtlijn mee in de budgetprognose, dan stemmen we de definitieve planning af zodra fase 2 ingepland staat.\n\n2. EXTRA TIJD KLANTSESSIE\nPrima dat je de 1,5 uur extra van de sessie van 3 april binnen de bandbreedte van het voorstel houdt. Hou in de volgende maand wel in de gaten of we daar structureel overheen gaan; als het vaker voorkomt, dan brengen we dat gewoon apart in rekening.\n\n3. SPLITSING PER KOSTENPLAATS\nJa, graag. Voor mijn interne verantwoording is het handig om te zien:\n— intern/strategisch werk (coördinatie, documentatie)\n— klantgericht werk (overleg, reviews, externe sessies)\n— ontwerpwerk per module\n\nAls je deze driedeling in de factuurspecificatie kunt meenemen (of in een bijlage), scheelt dat mij handmatig rekenwerk. Een simpele Excel is ook prima — liever geen vormgeving-tijd aan besteden.\n\n4. VOORTGANGSRAPPORTAGE Q1\nIk heb de rapportage vanmorgen snel doorgenomen. Een paar opmerkingen:\n— Resultaten per milestone zijn helder.\n— De grafiek op pagina 4 (doorlooptijd per sprint) mist een legenda — kun je die toevoegen?\n— Het risico-overzicht is mooi compact; de mitigaties zou ik iets concreter formuleren (wie doet wat, wanneer).\n\n5. PLANNING MEI EN JUNI\nVoor mei staat fase 2 inderdaad gepland. Graag in de kick-off ook alvast fase 3 bespreken (zelfs als nog niet alles concreet is), zodat we de capaciteit bij de leveranciers op tijd kunnen reserveren.\n\n6. BETALING\nFactuur staat ingepland voor betaling binnen 10 werkdagen. Als er vragen zijn, mail of bel gerust.\n\nTot zover mijn reactie. Als jij de aangepaste specificatie + rapportage kunt sturen — liefst deze week — dan kunnen we maandag een korte call doen om alles af te stemmen. Laat me even weten wat jou schikt.\n\nDank weer voor de prettige samenwerking.\n\nGroet,\nQuinten" },
  { id: 203, contactId: 2, dir: "in",  subject: "Re: Re: Factuur april 2026",         from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-08T15:10:00", read: true,  revert2me: false, body: "Dank je. Laat me weten als er vragen zijn." },
  { id: 204, contactId: 2, dir: "out", subject: "Update project planning",             from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-07T09:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nHierbij de bijgewerkte planning. De deadline is verschoven naar 25 april.\n\nKun je bevestigen dat dit voor jou werkt?\n\nGr" },
  { id: 205, contactId: 2, dir: "in",  subject: "Re: Update project planning",        from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-07T11:20:00", read: true,  revert2me: false, body: "Bevestigd. 25 april is haalbaar." },

  { id: 208, contactId: 2, dir: "out", subject: "Re: Vraag over specificaties",       from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-05T14:00:00", read: true,  revert2me: false, body: "Thomas,\n\nSpecificaties volgen morgen.\n\nGr" },

  { id: 210, contactId: 2, dir: "out", subject: "Specificaties module B",             from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-04T10:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nIn de bijlage de gevraagde specificaties voor module B.\n\n- Gewicht: max 2,4 kg\n- Afmeting: 240×180×40 mm\n- Aansluiting: USB-C + 2× HDMI\n- Vermogen: 45W\n\nLaat me weten als je nog iets mist.\n\nGr" },

  { id: 215, contactId: 2, dir: "in",  subject: "Aanvullend: testrapport",           from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-03-31T16:00:00", read: true,  revert2me: false, body: "Lorem ipsum dolor sit amet. Hierbij het testrapport van sprint 7. Twee bevindingen die we bespreken dinsdag:\n\n1. Latency spike bij >200 gelijktijdige gebruikers\n2. Memory leak in de sessie-handler\n\nGroet" },
  { id: 216, contactId: 2, dir: "out", subject: "Re: Aanvullend: testrapport",       from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-03-31T17:15:00", read: true,  revert2me: false, body: "Gelezen. Punt 2 klinkt urgent — ik kijk er vanavond naar.\n\nGr" },
  { id: 217, contactId: 2, dir: "in",  subject: "Re: Re: Aanvullend: testrapport",  from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-01T09:00:00", read: true,  revert2me: false, body: "Goed om te horen. We wachten je bevindingen af." },
  { id: 218, contactId: 2, dir: "out", subject: "Bevindingen memory leak",           from: "me@megamail.nl",            to: "thomas.degroot@gmail.com",  date: "2026-04-01T22:00:00", read: true,  revert2me: true,  body: "Thomas,\n\nHet lek zit in de TokenRefreshHandler — sessies worden niet gesloten na timeout. Fix is klaar en staat in PR #214.\n\nKun je reviewen?\n\nGr" },
  { id: 219, contactId: 2, dir: "in",  subject: "Re: Bevindingen memory leak",      from: "thomas.degroot@gmail.com",  to: "me@megamail.nl",            date: "2026-04-02T08:45:00", read: true,  revert2me: false, body: "PR gereviewed en goedgekeurd. Goed werk!" },
  { id: 220, contactId: 2, dir: "out", draft: true, subject: "Re: Factuur — specificatie", from: "me@megamail.nl",  to: "thomas.degroot@gmail.com",  date: "2026-04-09T07:00:00", modifiedAt: "2026-04-09T11:30:00", read: true, revert2me: false, body: "Thomas,\n\nIk heb de factuur ontvangen. Kun je ook een specificatie sturen?\n\nGr" },

// NOW was a hard-coded literal left over from the mock-data era. Use
// Date.now() at call-time so the "older than 7 days → full date" rule
// stays correct as the calendar advances.
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const pad = n => String(n).padStart(2,"0");

// Whether a message would show up in the ThreadColumn list under a
// given filter tab (Now / All / In / Out / Draft / Deleted). Used by
// the parent App so handleSelectContact picks a mail that's actually
// visible, and selectedMsg falls back to null when the chosen mail is
// no longer in scope under the active filter.
function msgMatchesThreadFilter(msg, filter, deletedIds) {
  const del = deletedIds.includes(msg.id);
  if (filter === 'now')     return !del && !msg.draft && ((msg.dir==='in' && !msg.read) || (msg.dir==='out' && msg.revert2me));
  if (filter === 'in')      return msg.dir==='in' && !msg.draft && !del;
  if (filter === 'out')     return msg.dir==='out' && !msg.draft && !del;
  if (filter === 'draft')   return !!msg.draft && !del;
  if (filter === 'deleted') return del;
  return !del; // 'all'
}

function formatTime(s) {
  if (!s) return "";
  const d = new Date(s), diff = Math.floor((Date.now()-d)/86400000);
  if (diff===0) return d.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
  if (diff===1) return "gisteren";
  if (diff<7)   return d.toLocaleDateString("nl-NL",{weekday:"short"});
  // 7-364 days old: day + month, no year — the year is implied (current
  // year for anything within the last 365 days). 365+ days: include the
  // year so "10 mei 2025" can be told apart from "10 mei 2026".
  if (diff<365) return d.toLocaleDateString("nl-NL",{day:"numeric",month:"long"});
  return d.toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"});
}
function formatFull(s) {
  return new Date(s).toLocaleString("nl-NL",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
// Used in the revert-to-me alert banners to tell the user at a glance
// how long the outgoing mail has been sitting without a reply. Always
// in whole days, even when that gets large — Rik prefers the absolute
// count over a weeks/months rollup (a glance at "no reply for 47 days"
// reads more directly than mental-converting "no reply for 6 weeks").
function formatR2mDuration(dateStr) {
  if (!dateStr) return 'no reply yet';
  const days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  if (days < 1)   return 'no reply yet';
  if (days === 1) return 'no reply for 1 day';
  return `no reply for ${days} days`;
}
function quoteHeader(msg) {
  const d=new Date(msg.date);
  const date=`${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`;
  const time=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const myName = msg.sender?.name || (msg.from || '').split('@')[0];
  const sender = msg.dir==="out" ? `${msg.from} (${myName})` : msg.from;
  return `—————————————————————————————————\n${DAYS[d.getDay()]} ${date} ${time}  ${sender}\n\n${msg.body||''}`;
}
function softBg(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.10)`;
}

// ─── Tag Picker (dropdown) ────────────────────────────────────────────────────

function TagPicker({current=[], suggestions=[], onAdd, onRemove}) {
  const [input, setInput] = useState("");
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(()=>{
    if(!open) return;
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[open]);

  const filtered = suggestions.filter(t => !current.includes(t) && t.toLowerCase().includes(input.toLowerCase()));

  function submit(tag) {
    const t = tag.trim(); if(!t) return;
    onAdd(t); setInput(""); setOpen(false);
  }

  return (
    <div className="relative" ref={ref}>
      <div className="flex flex-wrap gap-1 items-center border border-gray-200 rounded px-2 py-1 min-h-[28px] cursor-text bg-white"
        onClick={()=>setOpen(true)}>
        {current.map(t=><TagChip key={t} tag={t} onRemove={()=>onRemove(t)}/>)}
        <input value={input} onChange={e=>setInput(e.target.value)} onFocus={()=>setOpen(true)}
          onKeyDown={e=>{if(e.key==="Enter")submit(input);if(e.key==="Escape")setOpen(false);}}
          placeholder={current.length?"":"Add tag…"} className="outline-none text-xs flex-1 min-w-[60px]"/>
      </div>
      {open && (
        <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg min-w-[180px] overflow-hidden">
          {filtered.length>0 && filtered.map(t=>(
            <button key={t} onClick={()=>submit(t)} className="w-full text-left px-3 py-1.5 hover:bg-indigo-50 flex items-center gap-1.5">
              <TagChip tag={t}/>
            </button>
          ))}
          {input.trim() && !suggestions.includes(input.trim()) && (
            <button onClick={()=>submit(input.trim())} className="w-full text-left px-3 py-1.5 hover:bg-indigo-50 text-xs text-indigo-600 border-t border-gray-100">
              + Create "<strong>{input.trim()}</strong>"
            </button>
          )}
          {filtered.length===0 && !input.trim() && (
            <div className="px-3 py-2 text-xs text-gray-400">Type to search or create…</div>
          )}
        </div>
      )}
    </div>
  );
}

  function macSelectAccount(acc) {
    setMacForm({
      provider: acc.provider || 'generic',
      email: acc.email || '',
      display_name: acc.display_name || '',
      imap_host: acc.imap_host || '',
      imap_port: acc.imap_port || 993,
      imap_user: acc.imap_user || '',
      imap_password: '',
      smtp_host: acc.smtp_host || '',
      smtp_port: acc.smtp_port || 587,
      smtp_user: acc.smtp_user || '',
      smtp_password: '',
      retention_deleted_days: acc.retention_deleted_days ?? null,
      retention_spam_days:    acc.retention_spam_days    ?? null,
      auto_sync:              !!acc.auto_sync,
    });
    setMacSelectedId(acc.id);
    setMacFormErr(''); setMacFormInfo(''); setMacSyncResult(null);
    if (isMobile) setMobileSetCol(2);
  }
  function macApplyProvider(p) {
    const preset = PROVIDER_PRESETS[p] || PROVIDER_PRESETS.generic;
    setMacForm(f => ({ ...f, provider: p, ...preset }));

  function macSetField(field, val) { setMacForm(f => ({ ...f, [field]: val })); }

  async function macTest() {
    setMacFormErr(''); setMacFormInfo(''); setMacBusy('test');
    try {
      const r = await apiFetch('/mail-accounts/test', { method:'POST', body: JSON.stringify(macForm) });
      setMacFormInfo(`Connection OK — ${r.mailboxCount} mailboxes.`);
    } catch (e) { setMacFormErr(e.message); }
    setMacBusy(null);
  }
  async function macSave() {
    setMacFormErr(''); setMacFormInfo(''); setMacBusy('save');
    try {
      if (macSelectedId === 'new') {
        // mail_accounts.email is the "from"-address; we drop the separate
        // Email field from the form and just reuse the IMAP login (the
        // actual mailbox address). Keeps the UI from leaking the user's
        // recovery email and aligns with what we now do in the invite flow.
        const payload = { ...macForm, email: macForm.imap_user || macForm.email };
        const r = await apiFetch('/mail-accounts', { method:'POST', body: JSON.stringify(payload) });
        await macRefresh(); onMailAccountsChanged?.();
        if (r.account?.id) setMacSelectedId(r.account.id);
        setMacFormInfo('Account saved.');
        setMacForm(f => ({ ...f, imap_password: '', smtp_password: '' }));
      } else {
        const body = {
          display_name: macForm.display_name,
          imap_host: macForm.imap_host, imap_port: macForm.imap_port, imap_user: macForm.imap_user,
          smtp_host: macForm.smtp_host, smtp_port: macForm.smtp_port, smtp_user: macForm.smtp_user,
          retention_deleted_days: macForm.retention_deleted_days,
          retention_spam_days:    macForm.retention_spam_days,
          auto_sync:              !!macForm.auto_sync,
        };
        if (macForm.imap_password) body.imap_password = macForm.imap_password;
        if (macForm.smtp_password) body.smtp_password = macForm.smtp_password;
        await apiFetch(`/mail-accounts/${macSelectedId}`, { method:'PATCH', body: JSON.stringify(body) });
        await macRefresh(); onMailAccountsChanged?.();
        setMacFormInfo('Saved.');
        setMacForm(f => ({ ...f, imap_password: '', smtp_password: '' }));
      }
    } catch (e) { setMacFormErr(e.message); }
    setMacBusy(null);
  }
  async function macDelete() {
    if (!macSelectedId || macSelectedId === 'new') return;
    if (!confirm('Delete this mail account? (Mail stays on the server.)')) return;
    setMacBusy('delete');
    try {
      await apiFetch(`/mail-accounts/${macSelectedId}`, { method:'DELETE' });
      await macRefresh(); onMailAccountsChanged?.();
      setMacSelectedId(null);
      if (isMobile) setMobileSetCol(1);
    } catch (e) { setMacFormErr(e.message); }
    setMacBusy(null);
  }
  async function macSync() {
    if (!macSelectedId || macSelectedId === 'new') return;
    setMacBusy('sync'); setMacSyncResult(null);
    try {
      const r = await apiFetch(`/mail-accounts/${macSelectedId}/sync`, { method:'POST' });
      setMacSyncResult(r);
      await macRefresh(); onMailAccountsChanged?.();

              <div className="truncate">{label}</div>
              {label !== a.email && <div className="text-[10px] text-gray-400 truncate">{a.email}</div>}
            </button>

          className={`mt-1 w-full text-left px-2 py-1.5 rounded-lg text-xs transition-colors flex items-center gap-1.5 ${macSelectedId==='new'?'bg-indigo-50 text-indigo-700 font-semibold border border-indigo-200':'text-indigo-500 hover:bg-indigo-50 border border-dashed border-indigo-200'}`}>
          <PlusIcon size={10}/> Add account
        </button>
      </div>
    );

                        <input type="checkbox" checked={linked} onChange={e=>{
                          const cur = accountSigs[acct] || {linked:[], autoId:null};
                          const next = e.target.checked
                            ? {...cur, linked: [...cur.linked, selSigId]}
                            : {linked: cur.linked.filter(id=>id!==selSigId), autoId: cur.autoId===selSigId?null:cur.autoId};
                          const nextAll = {...accountSigs, [acct]: next};
                          setAccountSigs(nextAll);
                          persistSigLinks(selSigId, nextAll);
                        }} className="accent-indigo-600 flex-shrink-0"/>
                        <span className="text-xs text-gray-700 flex-1 truncate">{acct}</span>
                        {linked&&(
                          <label className="flex items-center gap-1 text-xs text-gray-500 cursor-pointer flex-shrink-0">
                            <input type="radio" checked={isAuto} onChange={()=>{}} onClick={()=>{
                              const nextAll = {};
                              for (const [k, v] of Object.entries(accountSigs)) {
                                if (k === acct) nextAll[k] = {...v, autoId: isAuto ? null : selSigId};
                                else            nextAll[k] = {...v, autoId: v.autoId === selSigId ? null : v.autoId};
                              }
                              setAccountSigs(nextAll);
                              persistSigLinks(selSigId, nextAll);
                            }} className="accent-indigo-600"/>
                            Auto
                          </label>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    );

    return (
      <div className="fixed inset-0 z-50 bg-white" onClick={e=>e.stopPropagation()}>
        <div className="relative w-full h-full overflow-hidden">

            {MiddlePanel}

          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl flex overflow-hidden" style={{width:680,height:'78vh',maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>

                  </div>
                </div>
                {[['name','Display name','text',null],['username','Username','text','Shown as @handle in the user menu'],['mobile','Mobile number','tel',null],['recovery','Recovery email address','email','Used for account recovery only. Can be the same address as one of your IMAP accounts.']].map(([f,label,type,hint])=>(

                <div>
                  <div className="text-xs text-gray-400 mb-1">Password</div>
                  <div className="flex gap-2">
                    <input type={showPass?"text":"password"} value={profile.pass} onChange={e=>setProfile(p=>({...p,pass:e.target.value}))}
                      placeholder="New password…"
                      className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-400"/>
                    <button onClick={()=>setShowPass(v=>!v)} className="px-3 py-2 text-xs rounded-lg border border-gray-200 text-gray-500 hover:border-gray-300">{showPass?'Hide':'Show'}</button>
                  </div>
                </div>
                {profileErr  && <div className="px-3 py-2 rounded bg-red-50 text-red-600 text-xs">{profileErr}</div>}
                {profileInfo && <div className="px-3 py-2 rounded bg-green-50 text-green-700 text-xs">{profileInfo}</div>}
                <div className="pt-2">
                  <button onClick={handleSaveProfile} disabled={profileBusy}
                    className="px-5 py-2 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium">

            {activeTab==='accounts'&&(
              <div className="flex gap-4 h-full">

            {activeTab==='signatures'&&(
              <div className="flex gap-4">

                <div className="w-36 flex-shrink-0 space-y-1">

                    <div key={sig.id} className="flex items-center gap-0.5 group">
                      <button onClick={()=>setSelSigId(sig.id)}
                        className={`flex-1 min-w-0 text-left px-2.5 py-2 rounded-lg text-xs transition-colors truncate ${selSigId===sig.id?'bg-indigo-50 text-indigo-700 font-semibold border border-indigo-200':'text-gray-600 hover:bg-gray-100 border border-transparent'}`}>

                    className="mt-1 w-full text-left px-2 py-1.5 rounded-lg text-xs text-indigo-500 hover:bg-indigo-50 border border-dashed border-indigo-200 flex items-center gap-1.5">

                        className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400"/>
                    </div>
                    <div>
                      <div className="text-xs text-gray-400 mb-1">Signature text</div>
                      <textarea value={selSig.body}
                        onChange={e=>setSignatures(prev=>prev.map(s=>s.id===selSigId?{...s,body:e.target.value}:s))}
                        onBlur={()=>persistSigFields(selSigId)}
                        rows={5} className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-indigo-400 resize-none font-mono"/>
                    </div>
                    <div>
                      <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider pb-1 border-b border-gray-100 mb-3">Linked accounts</div>
                      {accountEmails.length===0 && <div className="text-xs text-gray-400">No mail accounts connected yet.</div>}
                      <div className="space-y-2">
                        {accountEmails.map(acct=>{
                          const as=accountSigs[acct]||{linked:[],autoId:null};
                          const linked=as.linked.includes(selSigId);
                          const isAuto=as.autoId===selSigId;
                          return (
                            <div key={acct} className="flex items-center gap-3 py-1.5 border-b border-gray-50 last:border-0">
                              <input type="checkbox" checked={linked} onChange={e=>{
                                const cur = accountSigs[acct] || {linked:[], autoId:null};
                                const next = e.target.checked
                                  ? {...cur, linked: [...cur.linked, selSigId]}
                                  : {linked: cur.linked.filter(id=>id!==selSigId), autoId: cur.autoId===selSigId?null:cur.autoId};
                                const nextAll = {...accountSigs, [acct]: next};
                                setAccountSigs(nextAll);
                                persistSigLinks(selSigId, nextAll);
                              }} className="accent-indigo-600 flex-shrink-0 cursor-pointer"/>
                              <span className="text-xs text-gray-700 flex-1 truncate">{acct}</span>
                              {linked&&(
                                <label className="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer select-none flex-shrink-0">
                                  <input type="radio" checked={isAuto} onChange={()=>{}} onClick={()=>{
                                    // Toggle off if already active; otherwise set this account,
                                    // clearing the same sig's auto-insert from all other accounts.
                                    const nextAll = {};
                                    for (const [k, v] of Object.entries(accountSigs)) {
                                      if (k === acct) nextAll[k] = {...v, autoId: isAuto ? null : selSigId};
                                      else            nextAll[k] = {...v, autoId: v.autoId === selSigId ? null : v.autoId};
                                    }
                                    setAccountSigs(nextAll);
                                    persistSigLinks(selSigId, nextAll);
                                  }} className="accent-indigo-600"/>
                                  Auto-insert
                                </label>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Compose Pane ─────────────────────────────────────────────────────────────

const SIG_SEP = '\n\n';

function ComposePane({replyTo, replyKind='reply', toContact, draft, initTo:initToOverride="", initCC="", initBCC="", initTag=null, initMsgTags=[], allKnownTags=[], allKnownEmails=[], selAccounts=[], myEmails=[], mailAccounts=[], signatures=[], accountSigs={}, onSend, onBeforeR2mSend, onSaveDraft, onDeleteDraft, onClose, mobileBack, mobileBackLabel}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const isReply     = !!replyTo && replyKind !== 'forward';
  const isReplyAll  = !!replyTo && replyKind === 'reply-all';
  const isForward   = !!replyTo && replyKind === 'forward';

  // To: forward starts empty; reply / reply-all target the original sender
  // (for incoming) or the original recipient (for outgoing).
  const primaryReplyTarget = replyTo
    ? (replyTo.dir === "out" ? replyTo.to : replyTo.from)
    : "";
  const initTo = draft?.to ?? (
    isForward ? "" :
    replyTo ? primaryReplyTarget :
    (initToOverride || toContact?.emails[0] || "")
  );

  // CC: reply-all fills every other addressee minus our own accounts and the
  // primary reply target, so we don't CC ourselves or duplicate the "To".
  const myEmailSet = new Set((myEmails || selAccounts || []).map(e => (e||'').toLowerCase()));
  const computedReplyAllCC = (isReplyAll && replyTo)
    ? [...new Set([
        ...(replyTo.toList || []),
        ...(replyTo.ccList || []),
      ])].filter(e =>
        e && e.toLowerCase() !== (primaryReplyTarget || '').toLowerCase()
        && !myEmailSet.has(e.toLowerCase())
      ).join(', ')
    : "";
  const initCCResolved = draft?.cc ?? (computedReplyAllCC || initCC);

  const initSubj = draft?.subject ?? (
    isForward ? "Fwd: " + (replyTo?.subject || '') :
    replyTo ? "Re: " + (replyTo.subject || '') :
    ""
  );
  const initBody = draft?.body ?? (replyTo ? "\n\n" + quoteHeader(replyTo) : "");

  // Compute initial auto-signature (only for new messages, not replies/drafts).
  // For a reply, the from-address must match the account the original mail
  // landed in / was sent from — replying from a different account confuses
  // the recipient and breaks threading.
  const initFromAcct = (replyTo?.accountEmail) || (draft?.from) || (selAccounts[0] || '');
  const initAcctSig  = accountSigs[initFromAcct]||{linked:[],autoId:null};
  const initAutoSig  = (!draft&&!replyTo&&initAcctSig.autoId)
    ? signatures.find(s=>s.id===initAcctSig.autoId)||null : null;
  const initBodyWithSig = initAutoSig ? initBody+SIG_SEP+initAutoSig.body : initBody;

  const [to,setTo]=useState(initTo);
  const [from,setFrom]=useState(initFromAcct);
  const [cc,setCc]=useState(initCCResolved);
  const [bcc,setBcc]=useState(initBCC);
  const [subj,setSubj]=useState(initSubj);
  const [body,setBody]=useState(initBodyWithSig);
  const [activeSigId,setActiveSigId]=useState(initAutoSig?.id||null);
  const [r2mDays,setR2mDays]=useState(toContact?.r2mDays??3);
  const [r2mHover,setR2mHover]=useState(false);
  const [showCC,setShowCC]=useState(!!initCCResolved);
  const [showBCC,setShowBCC]=useState(!!initBCC);
  const [msgTags,setMsgTags]=useState(initTag?[...new Set([...initMsgTags,initTag])]:initMsgTags);
  const [showDrop,    setShowDrop]    = useState(false);
  const [showFromDrop,setShowFromDrop]= useState(false);
  const [sending,     setSending]     = useState(false);
  const [sendErr,     setSendErr]     = useState('');
  const [savingDraft, setSavingDraft] = useState(false);
  // Local draft id — set once we POST a new draft, reused for subsequent PATCHes
  // so the user can keep saving the same draft without remounting the pane.
  const [draftId,     setDraftId]     = useState(draft?.id || null);
  // Attachments on this draft — list of {id, filename, content_type, size}.
  // Initial list comes from the server-shaped draft (if editing existing);
  // new uploads append a temporary placeholder (id starts with 'tmp-') until
  // the server returns a real id.
  const [attachments, setAttachments] = useState(()=>Array.isArray(draft?.attachments) ? [...draft.attachments] : []);
  const [attError,    setAttError]    = useState('');
  const [isDragging,  setIsDragging]  = useState(false);
  const MAX_TOTAL = 25 * 1024 * 1024;
  const dropRef     = useRef(null);
  const fromDropRef = useRef(null);
  const multiFrom = selAccounts.length > 1;

  // ─── Auto-complete on To / CC / BCC ────────────────────────────────
  // Triggered as soon as the user types ≥1 character into the "current
  // token" of a recipient field (the substring after the last comma).
  // Matches against both the email and the display name. Keyboard nav
  // (Arrow keys / Enter / Tab / Esc) on the input bubbles up via the
  // shared handler. Suggestion list is capped at 8 entries.
  const [acField, setAcField] = useState(null); // 'to' | 'cc' | 'bcc' | null
  const [acIndex, setAcIndex] = useState(0);
  // Current token = whatever the user is typing right now (after the last
  // comma). On selection we replace just that token; the addresses they
  // already finished are left alone.
  function activeFieldValue() {
    if (acField === 'to')  return to;
    if (acField === 'cc')  return cc;
    if (acField === 'bcc') return bcc;
    return '';
  }
  function currentToken(text) {
    const idx = text.lastIndexOf(',');
    return text.slice(idx + 1).trim();
  }
  const acMatches = useMemo(() => {
    if (!acField) return [];
    const q = currentToken(activeFieldValue()).toLowerCase();
    if (!q) return [];
    const out = [];
    for (const item of allKnownEmails) {
      if (out.length >= 8) break;
      const em = item.email.toLowerCase();
      const nm = (item.name || '').toLowerCase();
      // Already in the field? Skip — no point suggesting the same address
      // the user just typed.
      if (em === q) continue;
      if (em.includes(q) || (nm && nm.includes(q))) out.push(item);
    }
    return out;
  }, [acField, to, cc, bcc, allKnownEmails]);
  // Reset highlight whenever the suggestion list changes shape.
  useEffect(() => { setAcIndex(0); }, [acField, acMatches.length]);
  function applyAutocomplete(email) {
    const field = acField;
    if (!field || !email) return;
    const current = field === 'to' ? to : field === 'cc' ? cc : bcc;
    const setter  = field === 'to' ? setTo : field === 'cc' ? setCc : setBcc;
    const idx = current.lastIndexOf(',');
    const before = idx === -1 ? '' : current.slice(0, idx + 1) + ' ';
    setter(before + email + ', ');
    setAcField(null);
  }
  function handleAcKey(ev) {
    if (acMatches.length === 0) return;
    if (ev.key === 'ArrowDown') {
      ev.preventDefault();
      setAcIndex(i => Math.min(i + 1, acMatches.length - 1));
    } else if (ev.key === 'ArrowUp') {
      ev.preventDefault();
      setAcIndex(i => Math.max(i - 1, 0));
    } else if (ev.key === 'Enter' || ev.key === 'Tab') {
      ev.preventDefault();
      applyAutocomplete(acMatches[acIndex]?.email);
    } else if (ev.key === 'Escape') {
      ev.preventDefault();
      setAcField(null);
    }
  }
  // Reusable rendering of the dropdown — same markup for all three
  // recipient fields. Items use onMouseDown with preventDefault so the
  // click doesn't blur the input before applyAutocomplete runs.
  function renderAcDropdown(field) {
    if (acField !== field || acMatches.length === 0) return null;
    return (
      <div className="absolute left-0 right-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
        {acMatches.map((item, i) => (
          <button key={item.email} type="button"
            onMouseDown={ev => { ev.preventDefault(); applyAutocomplete(item.email); }}
            className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 ${i===acIndex ? 'bg-indigo-50 text-indigo-700' : 'text-gray-700 hover:bg-indigo-50'}`}>
            {item.name
              ? <>
                  <span className="truncate font-medium">{item.name}</span>
                  <span className="text-gray-400 text-xs truncate flex-shrink-0">{item.email}</span>
                </>
              : <span className="truncate">{item.email}</span>}
          </button>
        ))}
      </div>
    );
  }

  // Both Send and Revert2me are send actions; Revert2me additionally arms
  // revert-to-me on the new outgoing row using the current r2mDays value.
  async function handleSendClick(withR2m = false) {
    if (!to.trim() || sending) return;
    if (attachments.some(a => a.uploading)) { setSendErr('Wait for uploads to finish…'); return; }
    // First-time gate: if this is a Revert2me-send, run the onboarding
    // dialog before flipping the sending state, so the OK button is the
    // explicit confirmation. Cancel = do nothing.
    if (withR2m && onBeforeR2mSend) {
      const proceed = await onBeforeR2mSend(Number(r2mDays) || 0);
      if (!proceed) return;
    }
    setSending(true); setSendErr('');
    try {
      await onSend?.({
        from, to, cc: showCC ? cc : '', bcc: showBCC ? bcc : '',
        subject: subj, body,
        reply_to_id: replyTo?.id,
        // When we have attachments, they live on the draft — the backend needs
        // the draft id to pull them into the MIME and clean up afterwards.
        draft_id: attachments.length > 0 ? draftId : null,
        draft_id_to_delete: attachments.length === 0 ? draftId : null,
        tags: msgTags,
        revert2me_days: withR2m ? Number(r2mDays) || 0 : undefined,
      });
    } catch (e) {
      setSendErr(e?.message || 'Send failed');
      setSending(false);
    }
  }

  // ── Attachments: upload / remove / drag-drop ─────────────────────────────
  // Ensures we have a persisted draft id before uploading the first file.
  // Without a draft the backend has nowhere to attach the upload.
  async function ensureDraftForAttachment() {
    if (draftId) return draftId;
    const body_ = {
      mail_account_id: (mailAccounts||[]).find(a => (a.email||'').toLowerCase() === (from||'').toLowerCase())?.id || null,
      to: to || '', cc: (showCC?cc:'') || '', bcc: (showBCC?bcc:'') || '',
      subject: subj || '', body: body || '',
      reply_to_id: replyTo?.id || null,
    };
    const r = await apiFetch('/drafts', { method: 'POST', body: JSON.stringify(body_) });
    const newId = r.draft?.id;
    if (newId) setDraftId(newId);
    return newId;
  }
  async function handleAttachFiles(fileList) {
    const files = Array.from(fileList || []);
    if (files.length === 0) return;
    setAttError('');
    let id = draftId;
    try { id = await ensureDraftForAttachment(); }
    catch (e) { setAttError('Save draft first failed: ' + (e?.message||'error')); return; }
    if (!id) { setAttError('Could not create draft'); return; }

    const currentSize = attachments.reduce((s,a)=>s+(a.size||0), 0);
    let running = currentSize;
    for (const f of files) {
      if (running + f.size > MAX_TOTAL) {
        setAttError(`Skipped "${f.name}" — total would exceed 25 MB`);
        continue;
      }
      running += f.size;
      const tmpId = 'tmp-' + Math.random().toString(36).slice(2, 10);
      setAttachments(prev => [...prev, {
        id: tmpId, filename: f.name, content_type: f.type || null, size: f.size, uploading: true,
      }]);
      try {
        const form = new FormData();
        form.append('file', f, f.name);
        const { data: { session } } = await sb.auth.getSession();
        const res = await fetch(`${BACKEND_URL}/drafts/${id}/attachments`, {
          method: 'POST',
          headers: session?.access_token ? { Authorization: `Bearer ${session.access_token}` } : {},
          body: form,
        });
        if (!res.ok) {
          const msg = await res.text().catch(()=>res.statusText);
          throw new Error(`${res.status} ${msg}`);
        }
        const r = await res.json();
        setAttachments(prev => prev.map(a => a.id === tmpId ? {
          id: r.attachment.id, filename: r.attachment.filename,
          content_type: r.attachment.content_type, size: r.attachment.size,
        } : a));
      } catch (e) {
        setAttError(`Upload "${f.name}" failed: ${e?.message || 'error'}`);
        setAttachments(prev => prev.filter(a => a.id !== tmpId));
      }
    }
  }
  async function handleRemoveAttachment(attId) {
    if (!draftId) return;
    const before = attachments;
    setAttachments(prev => prev.filter(a => a.id !== attId));
    try {
      await apiFetch(`/drafts/${draftId}/attachments/${attId}`, { method: 'DELETE' });
    } catch (e) {
      setAttachments(before);
      setAttError('Remove failed: ' + (e?.message||'error'));
    }
  }
  function onDragOver(e) { e.preventDefault(); e.stopPropagation(); setIsDragging(true); }
  function onDragLeave(e) { e.preventDefault(); e.stopPropagation(); setIsDragging(false); }
  function onDrop(e) {
    e.preventDefault(); e.stopPropagation(); setIsDragging(false);
    if (e.dataTransfer?.files?.length) handleAttachFiles(e.dataTransfer.files);
  }
  async function handleSaveDraftClick() {
    if (savingDraft) return;
    setSavingDraft(true); setSendErr('');
    try {
      const newId = await onSaveDraft?.({
        from, to, cc: showCC ? cc : '', bcc: showBCC ? bcc : '',
        subject: subj, body,
        reply_to_id: replyTo?.id,
        tags: msgTags,
      }, draftId);
      if (newId && !draftId) setDraftId(newId);
    } catch (e) {
      setSendErr(e?.message || 'Save draft failed');
    }
    setSavingDraft(false);
  }
  async function handleDeleteDraftClick() {
    if (savingDraft) return;
    if (!confirm('Delete this draft?')) return;
    setSavingDraft(true);
    try {
      await onDeleteDraft?.(draftId);
    } catch (e) {
      setSendErr(e?.message || 'Delete failed');
      setSavingDraft(false);
    }
  }

  // Signatures for current from-account
  const acctSigCfg = accountSigs[from]||{linked:[],autoId:null};
  const linkedSigs = signatures.filter(s=>acctSigCfg.linked.includes(s.id));

  function switchSig(newId) {
    const oldSig = signatures.find(s=>s.id===activeSigId);
    const newSig = signatures.find(s=>s.id===newId);
    setBody(prev=>{
      let b = prev;
      if(oldSig){ const idx=b.lastIndexOf(SIG_SEP+oldSig.body); if(idx>=0) b=b.substring(0,idx); }
      if(newSig) b=b+SIG_SEP+newSig.body;
      return b;
    });
    setActiveSigId(newId||null);
  }

  useEffect(()=>{
    if(!showDrop)return;
    const h=e=>{if(dropRef.current&&!dropRef.current.contains(e.target))setShowDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[showDrop]);

  useEffect(()=>{
    if(!showFromDrop)return;
    const h=e=>{if(fromDropRef.current&&!fromDropRef.current.contains(e.target))setShowFromDrop(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[showFromDrop]);

  const hasMulti = toContact && toContact.emails.length>1 && !replyTo && !draft;
  const title = draft ? "Edit draft"
    : isForward ? "Forward"
    : isReplyAll ? "Reply all"
    : replyTo ? "Reply"
    : "New message";

  const fileInputRef = useRef(null);
  return (
    <div className="flex flex-col h-full bg-white relative"
      onDragEnter={onDragOver} onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}>
      {isDragging && (
        <div className="absolute inset-0 z-40 bg-indigo-500/10 border-4 border-dashed border-indigo-400 flex items-center justify-center pointer-events-none">
          <div className="px-4 py-2 rounded-lg bg-white shadow-lg text-sm text-indigo-700 font-medium">Drop files to attach</div>
        </div>
      )}
      <input ref={fileInputRef} type="file" multiple hidden
        onChange={e=>{ handleAttachFiles(e.target.files); e.target.value=''; }}/>
      {isMobile&&mobileBack?(
        <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
          <div className="flex items-center gap-2 px-3 py-2">
            <button onClick={mobileBack}
              className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5 truncate min-w-0 flex-1">
              <svg className="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              <span className="truncate">{mobileBackLabel||"Mail"}</span>
            </button>
            {/* X cancel only for new, never-saved drafts. Once saved (draftId set) the
                only way out is Delete (footer) or Save — prevents accidental discard. */}
            {!draftId&&<button onClick={onClose||mobileBack} title="Cancel"
              className="flex-shrink-0 w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>}
          </div>
        </div>
      ):(
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <span className="font-semibold text-gray-700 text-sm">{title}</span>
        {/* Hide desktop X once the draft has been saved — prevents accidental discard.
            Saved drafts close via Delete / Save / Send instead. */}
        {onClose&&!draftId&&<button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">×</button>}
      </div>
      )}
      <div className={isMobile?'flex-1 min-h-0 overflow-y-auto scroll flex flex-col':'contents'}
        style={isMobile?{WebkitOverflowScrolling:'touch'}:{display:'contents'}}>
      <div style={isMobile?{minHeight:'calc(100% + 1px)',display:'flex',flexDirection:'column'}:{display:'contents'}}>
      {/* From — only shown when multiple accounts active */}
      {multiFrom&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">From:</span>
          <div className="flex-1 relative" ref={fromDropRef}>
            <div className="flex items-center gap-1">
              <span className="flex-1 text-gray-800 truncate min-w-0">{from}</span>
              <button onClick={()=>setShowFromDrop(d=>!d)}
                className={`flex-shrink-0 w-5 h-5 flex items-center justify-center rounded transition-colors ${showFromDrop?"bg-indigo-100 text-indigo-600":"text-gray-300 hover:text-gray-500"}`}>
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
            {showFromDrop&&(
              <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:240}}>
                <div className="px-3 py-1.5 text-xs text-gray-400 border-b border-gray-100 font-medium">Send from</div>
                {selAccounts.map((acc,i)=>(
                  <button key={acc} onClick={()=>{setFrom(acc);setShowFromDrop(false);}}
                    className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-indigo-50 ${acc===from?"bg-indigo-50 text-indigo-700":"text-gray-700"}`}>
                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${acc===from?"bg-indigo-500":"bg-gray-300"}`}/>
                    <span className="truncate">{acc}</span>
                    {i===0&&<span className="ml-auto text-xs text-gray-400">primary</span>}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>}
      {/* To */}
      <div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">To:</span>
          <div className="flex-1 relative" ref={dropRef}>
            <div className="flex items-center gap-1">
              <input className="flex-1 outline-none text-gray-800 min-w-0" value={to}
                onChange={e=>{setTo(e.target.value); setAcField('to');}}
                onFocus={()=>setAcField('to')}
                onBlur={()=>setTimeout(()=>setAcField(f=>f==='to'?null:f),150)}
                onKeyDown={handleAcKey}/>
              {hasMulti&&<button onClick={()=>setShowDrop(d=>!d)}
                className={`flex-shrink-0 w-5 h-5 flex items-center justify-center rounded transition-colors ${showDrop?"bg-indigo-100 text-indigo-600":"text-gray-300 hover:text-gray-500"}`}>
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>}
              {!showCC&&<button onClick={()=>setShowCC(true)} className="text-xs text-gray-300 hover:text-gray-500 flex-shrink-0 ml-1">CC</button>}
              {!showBCC&&<button onClick={()=>setShowBCC(true)} className="text-xs text-gray-300 hover:text-gray-500 flex-shrink-0 ml-0.5">BCC</button>}
            </div>
            {showDrop&&hasMulti&&!(acField==='to'&&acMatches.length>0)&&(
              <div className="absolute left-0 top-full mt-1 z-50 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:240}}>
                <div className="px-3 py-1.5 text-xs text-gray-400 border-b border-gray-100 font-medium">{toContact.name}</div>
                {toContact.emails.map((e,i)=>(
                  <button key={e} onClick={()=>{setTo(e);setShowDrop(false);}}
                    className={`w-full text-left px-3 py-2 text-sm flex items-center gap-2 hover:bg-indigo-50 ${e===to?"bg-indigo-50 text-indigo-700":"text-gray-700"}`}>
                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${e===to?"bg-indigo-500":"bg-gray-300"}`}/>
                    <span className="truncate">{e}</span>
                    {i===0&&<span className="ml-auto text-xs text-gray-400">primary</span>}
                  </button>
                ))}
              </div>
            )}
            {renderAcDropdown('to')}
          </div>
        </div>
      </div>
      {/* CC */}
      {showCC&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">CC:</span>
          <div className="flex-1 relative">
            <input className="w-full outline-none text-gray-800" value={cc}
              onChange={e=>{setCc(e.target.value); setAcField('cc');}}
              onFocus={()=>setAcField('cc')}
              onBlur={()=>setTimeout(()=>setAcField(f=>f==='cc'?null:f),150)}
              onKeyDown={handleAcKey}/>
            {renderAcDropdown('cc')}
          </div>
        </div>
      </div>}
      {/* BCC */}
      {showBCC&&<div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">BCC:</span>
          <div className="flex-1 relative">
            <input className="w-full outline-none text-gray-800" value={bcc}
              onChange={e=>{setBcc(e.target.value); setAcField('bcc');}}
              onFocus={()=>setAcField('bcc')}
              onBlur={()=>setTimeout(()=>setAcField(f=>f==='bcc'?null:f),150)}
              onKeyDown={handleAcKey}/>
            {renderAcDropdown('bcc')}
          </div>
        </div>
      </div>}
      {/* Subject */}
      <div className="px-4 py-2 border-b border-gray-100 flex-shrink-0">
        <div className="flex items-center gap-2 text-sm">
          <span className="text-gray-400 w-10 flex-shrink-0">Subj:</span>
          <input className="flex-1 outline-none text-gray-800" value={subj} onChange={e=>setSubj(e.target.value)}/>
        </div>
      </div>
      {/* Mobile: textarea grows via JS so the wrapper scrolls — overflow-
          hidden keeps the textarea's own scrollbar away. Desktop: pane
          height is fixed; the textarea is the one that needs to scroll
          when the draft body grows past the visible area. */}
      <textarea ref={el=>{
          if(isMobile&&el){
            el.style.height='auto';
            el.style.height = Math.max(260, el.scrollHeight) + 'px';
          }
        }}
        className={`${isMobile?'flex-shrink-0 overflow-hidden':'flex-1 overflow-y-auto scroll'} px-4 py-3 text-sm text-gray-800 outline-none resize-none`}
        style={isMobile?{minHeight:260}:{}}
        value={body} onChange={e=>{
          setBody(e.target.value);
          if(isMobile){
            e.target.style.height='auto';
            e.target.style.height = Math.max(260, e.target.scrollHeight) + 'px';
          }
        }} placeholder="Write your message…"/>
      {/* Signature selector — shown when from-account has linked signatures */}
      {linkedSigs.length>0&&(
        <div className="px-4 py-2 flex-shrink-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xs text-gray-400 flex-shrink-0">Signature:</span>
            <button onClick={()=>switchSig(null)}
              className={`px-2 py-0.5 text-xs rounded-full border transition-colors ${!activeSigId?'bg-gray-100 text-gray-600 border-gray-300 font-medium':'text-gray-400 border-gray-200 hover:text-gray-600'}`}>
              None
            </button>
            {linkedSigs.map(sig=>(
              <button key={sig.id} onClick={()=>switchSig(sig.id)}
                className={`px-2 py-0.5 text-xs rounded-full border transition-colors ${activeSigId===sig.id?'bg-indigo-50 text-indigo-700 border-indigo-200 font-medium':'text-gray-400 border-gray-200 hover:text-gray-600'}`}>
                {sig.title}
              </button>
            ))}
          </div>
        </div>
      )}
      {/* Attachments row — chips + errors */}
      {(attachments.length > 0 || attError) && (
        <div className="px-4 py-2 border-t border-gray-100 flex-shrink-0 space-y-1.5">
          {attachments.length > 0 && (
            <div className="flex flex-wrap gap-1.5">
              {attachments.map(a => (
                <span key={a.id}
                  className={`inline-flex items-center gap-1.5 px-2 py-1 text-xs rounded-lg border ${a.uploading ? 'border-indigo-200 bg-indigo-50 text-indigo-700' : 'border-gray-200 bg-gray-50 text-gray-700'} max-w-xs`}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="flex-shrink-0 text-gray-400">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                  </svg>
                  <span className="truncate">{a.filename}</span>
                  <span className="text-gray-400 flex-shrink-0">· {Math.round((a.size||0)/1024)} KB</span>
                  {a.uploading
                    ? <span className="text-indigo-500 flex-shrink-0">…</span>
                    : <button onClick={()=>handleRemoveAttachment(a.id)}
                        className="flex-shrink-0 w-4 h-4 flex items-center justify-center rounded text-gray-400 hover:text-red-500 leading-none">×</button>}
                </span>
              ))}
            </div>
          )}
          {attError && <div className="text-xs text-red-500">{attError}</div>}
        </div>
      )}
      {/* Tags row — label-less on both layouts, matching IN / OUT mails */}
      <div className="px-4 py-2 border-t border-gray-100 flex-shrink-0">
        <TagPicker current={msgTags} suggestions={allKnownTags}
          onAdd={t=>setMsgTags(prev=>[...prev.filter(x=>x!==t),t])}
          onRemove={t=>setMsgTags(prev=>prev.filter(x=>x!==t))}/>
      </div>
      </div>{/* end bounce wrapper */}
      </div>{/* end scroll/contents wrapper */}
      {/* Footer — tighter horizontal padding + gap on mobile so iPhone SE
          (375px wide) fits Paperclip · [Delete] · Save · Revert2me · Send
          without clipping. */}
      <div className={`${isMobile?'px-2 gap-1':'px-4 gap-2'} py-3 border-t border-gray-200 flex items-center flex-shrink-0 bg-white`}>
        {!isMobile&&<div className="flex items-center gap-1.5 cursor-default select-none"
          onMouseEnter={()=>setR2mHover(true)} onMouseLeave={()=>setR2mHover(false)}>
          <span className="text-xs text-gray-400">R2M:</span>
          {r2mHover
            ? <input autoFocus type="number" min="0" max="30" value={r2mDays} onChange={e=>setR2mDays(e.target.value)}
                className="w-10 text-xs text-center outline-none border border-gray-300 rounded px-1 py-0.5 bg-white text-gray-700"/>
            : <span className="text-xs font-medium text-gray-600 min-w-[1.5rem] text-center">{r2mDays}</span>}
          <span className="text-xs text-gray-400">days{Number(r2mDays)===0?' (instant)':''}</span>
        </div>}
        <button onClick={()=>fileInputRef.current?.click()}
          disabled={sending}
          title="Attach files (or drag & drop)"
          className={`${isMobile?'p-1':'p-1.5'} rounded hover:bg-gray-100 text-gray-500 disabled:opacity-50`}>
          <svg width={isMobile?14:16} height={isMobile?14:16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div className="flex-1"/>
        {sendErr && <span className="text-xs text-red-600 truncate flex-shrink min-w-0" title={sendErr}>{sendErr}</span>}
        {/* Delete draft — same button shape as MessageDetail's Delete so the
            UI is consistent across the app: small rounded gray pill, icon +
            label on desktop, icon-only (still in a pill wrapper) on mobile. */}
        {draftId && (
          <button onClick={handleDeleteDraftClick} disabled={savingDraft||sending}
            title="Delete draft"
            className={`${isMobile?'px-2 py-1.5':'px-3 py-1.5'} text-xs rounded bg-gray-100 hover:bg-red-100 text-red-500 flex items-center gap-1.5 disabled:opacity-50`}>
            <DeleteIcon size={isMobile?16:13}/>{!isMobile&&<span>Delete</span>}
          </button>
        )}
        <button onClick={handleSaveDraftClick} disabled={savingDraft||sending||(!to.trim()&&!subj.trim()&&!body.trim())}
          className={`${isMobile?'px-2 py-1.5':'px-3 py-1.5'} text-xs rounded bg-gray-100 hover:bg-gray-200 disabled:opacity-50 text-gray-600`}>
          {savingDraft?'Saving…':(draftId?'Save':'Save draft')}
        </button>
        <button onClick={()=>handleSendClick(true)} disabled={sending || !to.trim()}
          title={`Send and arm Revert2Me — if no reply within ${r2mDays} day${r2mDays==1?'':'s'}, this mail resurfaces. 0 = instant.`}
          className={`${isMobile?'px-2 py-1.5':'px-3 py-1.5'} text-xs rounded bg-amber-400 hover:bg-amber-500 disabled:opacity-50 text-white font-medium`}>
          {sending ? 'Sending…' : `Revert2me${Number(r2mDays)===0?' · 0d':''}`}
        </button>
        <button onClick={()=>handleSendClick(false)} disabled={sending || !to.trim()}
          className={`${isMobile?'px-3 py-1.5':'px-4 py-1.5'} text-xs rounded bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-medium`}>
          {sending ? 'Sending…' : 'Send'}
        </button>
      </div>
    </div>
  );
}

// ─── Contact Edit Form ────────────────────────────────────────────────────────

function ContactEditForm({contact, contactTags, allKnownTags, isArchived, onSave, onCancel, onDelete, emailFlags, onToggleEmailFlag, onUnmergeEmail}) {
  const [name,   setName]   = useState(contact.name);
  const [org,    setOrg]    = useState(contact.org||"");
  const [primary,setPrimary]= useState(contact.emails[0]);
  const [r2m,    setR2m]    = useState(contact.r2mDays ?? 3);
  const [tags,   setTags]   = useState([...(contactTags||[])]);
  const [archived, setArchived] = useState(!!isArchived);
  const [isNews,    setIsNews]    = useState(!!contact.isNews);
  const [isNoReply, setIsNoReply] = useState(!!contact.isNoReply);
  const [isMuted,   setIsMuted]   = useState(!!contact.isMuted);
  // After clicking Unmerge, the row for that email disappears and the
  // remaining rows shift up. The mouse pointer (or finger) stays in
  // place, so the next button slides in under it and immediately picks
  // up the red `:hover` state — visually confusing because the user
  // thinks the "wrong" email is now marked for unmerge. Suppress the
  // hover classes briefly so the colour shift can't cascade.
  const [unmergeHoverFrozen, setUnmergeHoverFrozen] = useState(false);
  useEffect(() => {
    if (!unmergeHoverFrozen) return;
    const t = setTimeout(() => setUnmergeHoverFrozen(false), 600);
    return () => clearTimeout(t);
  }, [unmergeHoverFrozen]);

  function addTag(t) { if(!tags.includes(t)) setTags([...tags,t]); }
  function removeTag(t) { setTags(tags.filter(x=>x!==t)); }

  const orderedEmails = [primary, ...contact.emails.filter(e=>e!==primary)];

  return (
    <div className="flex flex-col h-full bg-white">
      <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <span className="font-semibold text-gray-800 text-sm">Edit contact</span>
        <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 text-xl">×</button>
      </div>
      <div className="flex-1 overflow-y-auto scroll px-4 py-4 space-y-4">
        {/* Avatar preview */}
        <div className="flex items-center gap-3">
          <Avatar contact={contact} size={56}/>
          <div>
            <div className="text-xs text-gray-400 mb-1">Display name</div>
            <input value={name} onChange={e=>setName(e.target.value)}
              className="border border-gray-200 rounded px-2 py-1 text-sm outline-none focus:border-indigo-400 w-48"/>
          </div>
        </div>
        {/* Org */}
        <div>
          <div className="text-xs text-gray-400 mb-1">Organisation</div>
          <input value={org} onChange={e=>setOrg(e.target.value)} placeholder="—"
            className="border border-gray-200 rounded px-2 py-1 text-sm outline-none focus:border-indigo-400 w-full"/>
        </div>
        {/* Primary email + per-email flags */}
        <div>
          <div className="text-xs text-gray-400 mb-1">Primary email address</div>
          <div className="space-y-1.5">
            {contact.emails.map(e=>(
              <div key={e} className="flex items-center gap-2">
                {contact.emails.length > 1
                  ? <input type="radio" name="primary" value={e} checked={primary===e} onChange={()=>setPrimary(e)} className="accent-indigo-600 flex-shrink-0"/>
                  : <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 flex-shrink-0"/>}
                <span className="text-sm text-gray-700 truncate flex-1 min-w-0">{e}</span>
                {primary===e&&<span className="tag-chip flex-shrink-0">primary</span>}
                {contact.emails.length > 1 &&
                  <button type="button"
                    onClick={(ev)=>{ ev.currentTarget.blur(); setUnmergeHoverFrozen(true); onUnmergeEmail?.(e); }}
                    className={`convooz-unmerge-btn text-xs px-2 py-0.5 rounded border border-gray-200 text-gray-400 ${unmergeHoverFrozen?'':'hover:border-red-300 hover:text-red-500'} flex-shrink-0`}>
                    Unmerge
                  </button>
                }
              </div>
            ))}
          </div>
        </div>
        {/* Revert2Me default */}
        <div>
          <div className="text-xs text-gray-400 mb-1">Default Revert2Me period</div>
          <div className="flex items-center gap-2">
            <input type="number" min="0" max="30" value={r2m} onChange={e=>setR2m(Number(e.target.value))}
              className="border border-gray-200 rounded px-2 py-1 text-sm outline-none focus:border-indigo-400 w-16 text-center"/>
            <span className="text-sm text-gray-500">days <span className="text-gray-400">(0 = instant · global default: 3)</span></span>
          </div>
        </div>
        {/* Tags are managed per-message (via tag chips in the thread and the
            left-column Tags bar), not on the contact card — so they are no
            longer exposed in this edit form. `tags` state is still passed
            through unchanged on Save so existing associations are preserved. */}
        {/* News + Mute already have toggles on the contact card header; keep
            only Archive here to avoid a second source of truth. */}
        <label className="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" checked={archived} onChange={e=>setArchived(e.target.checked)} className="accent-indigo-600"/>
          <span className="text-sm text-gray-700">Archive this contact</span>
        </label>
      </div>
      <div className="px-4 py-3 border-t border-gray-200 flex items-center gap-2 flex-shrink-0">
        <button onClick={onDelete} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-red-100 text-red-500">Delete</button>
        <div className="flex-1"/>
        <button onClick={onCancel} className="px-4 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-600">Cancel</button>
        <button onClick={()=>onSave({name,org,primary,r2mDays:r2m,tags,archived,isNews,isNoReply,isMuted})}
          className="px-4 py-1.5 text-xs rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium">Save</button>
      </div>
    </div>
  );
}
