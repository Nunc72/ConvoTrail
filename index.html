// ─── Message Detail ───────────────────────────────────────────────────────────

// ─── Spinner ──────────────────────────────────────────────────────────────
// Tiny indigo spinner for inline loading states (attachment fetches,
// bootstrap kick-off, long-running network calls). Keeps the UI feeling
// alive instead of silently hung.
function Spinner({size=16, className=""}) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      className={"animate-spin text-indigo-500 " + className} aria-label="loading">
      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.2"/>
      <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
    </svg>
  );
}

// ─── Attachment preview helpers ───────────────────────────────────────────
// Route a MIME content-type to a preview kind. Unknown/office formats fall
// back to "other" which just shows a Download button.
function attachmentKind(ct) {
  const s = (ct || '').toLowerCase();
  if (s.startsWith('image/')) return 'image';
  if (s === 'application/pdf') return 'pdf';
  if (s.startsWith('text/') || s === 'application/json' || s === 'application/xml' || s === 'application/x-yaml') return 'text';
  if (s.startsWith('video/')) return 'video';
  if (s.startsWith('audio/')) return 'audio';
  return 'other';
}

// Fetch an attachment as a blob. apiFetch wraps JSON endpoints; attachments
// need the raw blob, so we duplicate apiFetch's 401-refresh-retry + 503-retry
// logic here. Without it a Realtime-triggered token refresh racing with an
// attachment thumb fetch would silently 401 (the modal/thumb just shows the
// generic "Can't load" state) and the user thinks "attachments are broken".
async function fetchAttachmentBlob(messageId, index) {
  async function doFetch() {
    const { data: { session } } = await sb.auth.getSession();
    return fetch(`${BACKEND_URL}/messages/${messageId}/attachments/${index}`, {
      headers: session?.access_token ? { Authorization: `Bearer ${session.access_token}` } : {},
    });
  }
  let res = await doFetch();
  if (res.status === 401) {
    await refreshSessionDedup().catch(() => {});
    res = await doFetch();
  }
  if (res.status === 503) {
    await new Promise(r => setTimeout(r, 1200));
    res = await doFetch();
  }
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.blob();
}

// Image thumbnail tile: fetches its own blob lazily + revokes on unmount.
// Clicking opens the full preview modal (via the onClick prop).
function AttachmentThumb({messageId, att, onClick}) {
  const [blobUrl, setBlobUrl] = useState(null);
  const [err, setErr] = useState(false);
  useEffect(() => {
    let cancelled = false; let createdUrl = null;
    (async () => {
      try {
        const blob = await fetchAttachmentBlob(messageId, att.index);
        createdUrl = URL.createObjectURL(blob);
        if (!cancelled) setBlobUrl(createdUrl);
      } catch { if (!cancelled) setErr(true); }
    })();
    return () => { cancelled = true; if (createdUrl) URL.revokeObjectURL(createdUrl); };
  }, [messageId, att.index]);
  return (
    <button onClick={onClick} title={att.filename}
      className="w-28 h-28 rounded-lg border border-gray-200 bg-gray-50 overflow-hidden hover:border-indigo-300 hover:shadow-sm transition-all flex items-center justify-center flex-shrink-0">
      {err ? <span className="text-xs text-gray-400 px-2 text-center">Can't load</span>
       : blobUrl ? <img src={blobUrl} alt={att.filename} className="w-full h-full object-cover" loading="lazy"/>
       : <span className="text-xs text-gray-400">…</span>}
    </button>
  );
}

// Full-screen preview modal. Handles image / pdf / text / video / audio.
// Keyboard: Esc closes, ← / → step through the (non-inline) attachment list.
function AttachmentPreviewModal({messageId, attachment, attachments, onClose, onPrev, onNext, onDownload}) {
  const [blobUrl, setBlobUrl] = useState(null);
  const [text, setText] = useState(null);
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  // Derived from the attachment MIME — read by multiple hooks below, so
  // declare before any useEffect that references it (TDZ-safe).
  const kind = attachment ? attachmentKind(attachment.contentType) : null;
  // Zoom state for images only. null = fit-to-screen (default), number = CSS
  // zoom factor (1.0–5.0). On desktop a mouse click / trackpad tap cycles
  // fit → 2× → 3× → fit; on mobile we only respond to pinch gestures so
  // stray finger-taps (e.g. while swiping through multiple images) don't
  // accidentally zoom the view. Resets whenever we switch attachments.
  const [imgZoom, setImgZoom] = useState(null);
  useEffect(() => { setImgZoom(null); }, [attachment?.index]);
  // Pinch-to-zoom. Listeners live on the MODAL root (via modalRef), not on
  // the image itself. Reason: gesture events bubble up from their target
  // but never sideways, so a pinch that starts on the black padding next
  // to the image (common — users spread fingers from outside the image
  // inward) had its target on a sibling container. The imgHost listener
  // would never see it, no preventDefault ran, and iOS happily did its
  // own page-zoom — which is what the user sees as "the image jumps up".
  // Binding on the modal root catches pinches anywhere in the preview.
  // We also set touch-action:none on the modal root to kill iOS' native
  // gesture claim outright. The zoomed-image pan surface (imgHost) keeps
  // its own `touch-action: pan-x pan-y` — a more-specific child wins.
  const modalRef = useRef(null);
  const imgZoomRef = useRef(null);
  const kindRef = useRef(kind);
  useEffect(() => { imgZoomRef.current = imgZoom; }, [imgZoom]);
  useEffect(() => { kindRef.current = kind; }, [kind]);
  useEffect(() => {
    const el = modalRef.current;
    if (!el) return;
    const hasGesture = 'ongesturestart' in window;
    let startZoom = 1;
    function onGestureStart(e) {
      e.preventDefault();
      startZoom = imgZoomRef.current || 1;
    }
    function onGestureChange(e) {
      e.preventDefault();
      if (kindRef.current !== 'image') return;
      const next = startZoom * e.scale;
      const clamped = Math.max(1, Math.min(5, next));
      setImgZoom(clamped <= 1.05 ? null : Math.round(clamped * 10) / 10);
    }
    function onGestureEnd(e) { e.preventDefault(); }
    let tStartDist = 0, tStartZoom = 1;
    function onTouchStart(e) {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        tStartDist = Math.hypot(dx, dy);
        tStartZoom = imgZoomRef.current || 1;
      }
    }
    function onTouchMove(e) {
      if (e.touches.length !== 2 || !tStartDist) return;
      e.preventDefault();
      if (kindRef.current !== 'image') return;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      const next = tStartZoom * (d / tStartDist);
      const clamped = Math.max(1, Math.min(5, next));
      setImgZoom(clamped <= 1.05 ? null : Math.round(clamped * 10) / 10);
    }
    function onTouchEnd(e) { if (e.touches.length < 2) tStartDist = 0; }

    if (hasGesture) {
      el.addEventListener('gesturestart',  onGestureStart,  { passive: false });
      el.addEventListener('gesturechange', onGestureChange, { passive: false });
      el.addEventListener('gestureend',    onGestureEnd,    { passive: false });
    } else {
      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove',  onTouchMove,  { passive: false });
      el.addEventListener('touchend',   onTouchEnd,   { passive: true });
      el.addEventListener('touchcancel',onTouchEnd,   { passive: true });
    }
    return () => {
      if (hasGesture) {
        el.removeEventListener('gesturestart',  onGestureStart);
        el.removeEventListener('gesturechange', onGestureChange);
        el.removeEventListener('gestureend',    onGestureEnd);
      } else {
        el.removeEventListener('touchstart', onTouchStart);
        el.removeEventListener('touchmove',  onTouchMove);
        el.removeEventListener('touchend',   onTouchEnd);
        el.removeEventListener('touchcancel',onTouchEnd);
      }
    };
  }, []);

  useEffect(() => {
    if (!attachment || !messageId) return;
    let cancelled = false; let createdUrl = null;
    setLoading(true); setErr(''); setBlobUrl(null); setText(null);
    (async () => {
      try {
        if (kind === 'text') {
          // Go through fetchAttachmentBlob for the 401/503-retry plumbing,
          // then read the blob as text.
          const blob = await fetchAttachmentBlob(messageId, attachment.index);
          const t = await blob.text();
          if (!cancelled) setText(t);
        } else if (kind !== 'other') {
          const blob = await fetchAttachmentBlob(messageId, attachment.index);
          createdUrl = URL.createObjectURL(blob);
          if (!cancelled) setBlobUrl(createdUrl);
        }
      } catch (e) {
        if (!cancelled) setErr(e?.message || 'Failed to load');
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; if (createdUrl) URL.revokeObjectURL(createdUrl); };
  }, [messageId, attachment?.index]);

  // Capture arrow keys at the document level (capture phase) so a focused
  // PDF iframe / <video> can't swallow them before we see them.
  useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape')          { onClose?.(); }
      else if (e.key === 'ArrowLeft')  { if (onPrev) { e.preventDefault(); onPrev(); } }
      else if (e.key === 'ArrowRight') { if (onNext) { e.preventDefault(); onNext(); } }
    }
    document.addEventListener('keydown', onKey, true);
    return () => document.removeEventListener('keydown', onKey, true);
  }, [onClose, onPrev, onNext]);

  if (!attachment) return null;
  const count = attachments?.length || 0;
  const idx = count ? attachments.findIndex(a => a.index === attachment.index) + 1 : 1;
  // Render through a portal so the fixed overlay lives on document.body,
  // immune to any transforms / slide animations on the mobile column layout.
  // Click on the backdrop (or the toolbar / footer bar background) closes;
  // only the explicit content + action buttons stopPropagation.
  const modal = (
    <div ref={modalRef} className="fixed inset-0 z-[60] bg-black/85 flex flex-col" onClick={onClose}
      style={{touchAction: 'none'}}>
      <div className="flex items-center gap-3 px-4 py-3 border-b border-white/10 text-white">
        <span className="truncate flex-1 text-sm" title={attachment.filename}>{attachment.filename}</span>
        <span className="text-xs text-white/60 flex-shrink-0">{Math.round((attachment.size||0)/1024)} KB</span>
        <button onClick={(e)=>{e.stopPropagation(); onDownload?.();}} className="px-3 py-2 text-xs rounded bg-white/10 hover:bg-white/20 flex-shrink-0">Download</button>
        <button onClick={(e)=>{e.stopPropagation(); onClose();}} title="Close"
          aria-label="Close"
          className="min-w-[44px] min-h-[44px] rounded hover:bg-white/10 text-white text-3xl leading-none flex items-center justify-center flex-shrink-0">×</button>
      </div>
      <div className="flex-1 min-h-0 relative flex items-center justify-center p-4 overflow-hidden">
        {loading && (
          <div className="flex items-center gap-2 text-white/70 text-sm">
            <Spinner size={18} className="!text-white/80"/>
            <span>Loading preview…</span>
          </div>
        )}
        {!loading && err && <div className="text-red-300 text-sm">Preview failed: {err}</div>}
        {!loading && !err && kind === 'image' && blobUrl && (
          // Zoom UX:
          //  • Mobile pinch: spread 2 fingers to zoom in, pinch to zoom out.
          //    Continuous between 1× and 5×, snaps back to fit-to-screen
          //    when released near 1×.
          //  • Tap (single click): cycles fit → 2× → 3× → fit as a quick
          //    shortcut.
          //  • When zoomed, the wrapping div becomes a pan-scroll surface
          //    so the user can drag around the enlarged image.
          //  • CSS `zoom` (not `transform: scale`) so the enlarged image
          //    actually takes more layout space and the overflow scrolls.
          // stopPropagation keeps taps on the image from bubbling to the
          // backdrop (which would close the modal).
          <div
            className={imgZoom ? "w-full h-full overflow-auto scroll flex items-start justify-start" : "w-full h-full flex items-center justify-center"}
            onClick={isMobile ? e => e.stopPropagation() : e => { e.stopPropagation(); setImgZoom(z => z === null ? 2 : z < 2.5 ? 3 : null); }}
            style={{cursor: isMobile ? 'default' : 'zoom-in', WebkitOverflowScrolling:'touch',
                    // Modal root has touch-action:none to kill iOS page-zoom,
                    // but a more-specific pan-x/pan-y here keeps 1-finger pan
                    // working on a zoomed-in image.
                    touchAction: 'pan-x pan-y'}}
            title={isMobile ? 'Pinch to zoom' : 'Click to zoom'}>
            <img src={blobUrl} alt={attachment.filename} draggable={false}
              className={imgZoom ? "select-none block" : "max-w-full max-h-full object-contain select-none"}
              // maxWidth/maxHeight: 'none' overrides the Tailwind preflight
              // `img { max-width: 100% }` that otherwise clamps the zoomed
              // image to its parent's width — which was why the indicator
              // said 3× but the image never actually grew.
              style={imgZoom ? {zoom: imgZoom, maxWidth: 'none', maxHeight: 'none'} : {}}/>
          </div>
        )}
        {!loading && !err && kind === 'image' && blobUrl && imgZoom && (
          <div className="absolute bottom-3 left-1/2 -translate-x-1/2 z-10 px-2.5 py-1 rounded-full bg-white/90 text-gray-700 text-xs shadow pointer-events-none">
            {imgZoom.toFixed(1)}×{isMobile ? ' · pinch to adjust' : ` · click to ${imgZoom >= 2.5 ? 'reset' : 'zoom more'}`}
          </div>
        )}
        {!loading && !err && kind === 'pdf' && blobUrl && (
          <iframe src={blobUrl} title={attachment.filename} className="w-full h-full border-0 bg-white rounded"/>
        )}
        {!loading && !err && kind === 'text' && text != null && (
          <pre className="w-full h-full max-w-4xl bg-white text-gray-800 p-4 overflow-auto text-xs font-mono whitespace-pre-wrap rounded">{text}</pre>
        )}
        {!loading && !err && kind === 'video' && blobUrl && (
          <video src={blobUrl} controls className="max-w-full max-h-full"/>
        )}
        {!loading && !err && kind === 'audio' && blobUrl && (
          <div className="w-full max-w-xl p-6 bg-white/10 rounded text-white">
            <div className="text-sm mb-3 text-center">{attachment.filename}</div>
            <audio src={blobUrl} controls className="w-full"/>
          </div>
        )}
        {!loading && !err && kind === 'other' && (
          <div className="text-white/80 text-sm text-center">
            <p className="mb-3">No preview available for this file type.</p>
            <button onClick={onDownload} className="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-700 text-white text-sm">Download {attachment.filename}</button>
          </div>
        )}
        {/* Big side-arrows — desktop only. On mobile they intercept pinch
            touches on the image edges, so navigation is keyboard/swipe-less
            there (multi-attachment phones are rare enough that it's fine). */}
        {!isMobile && onPrev && (
          <button onClick={(e)=>{e.stopPropagation(); onPrev();}} aria-label="Previous (←)"
            className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/25 text-white text-2xl leading-none flex items-center justify-center transition-colors">
            ‹
          </button>
        )}
        {!isMobile && onNext && (
          <button onClick={(e)=>{e.stopPropagation(); onNext();}} aria-label="Next (→)"
            className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/25 text-white text-2xl leading-none flex items-center justify-center transition-colors">
            ›
          </button>
        )}
      </div>
      {count > 1 && (
        <div className="px-4 py-2 border-t border-white/10 flex items-center justify-center gap-4 text-xs text-white/50">
          <span>{idx} of {count}</span>
          <span className="text-white/30">·</span>
          <span className="hidden sm:inline">← / → to navigate · Esc to close</span>
          <span className="sm:hidden">Tap anywhere to close</span>
        </div>
      )}
    </div>
  );
  // Mount to document.body so the modal survives mobile column-slide transforms.
  return ReactDOM.createPortal(modal, document.body);
}

// ─── HTML message body (sandboxed iframe) ─────────────────────────────────
// HTML emails are rendered in a sandboxed iframe so any scripts / event
// handlers / form submissions in the source can't touch our app. We keep
// allow-same-origin so the onLoad handler can read contentDocument and
// resize the iframe to fit its content, and allow-popups so link clicks
// can open in a new tab without being trapped in the sandbox.
function HtmlMessageBody({html}) {
  const ref = useRef(null);
  // After load: measure content width. If wider than the iframe viewport
  // (classic 600px-table newsletter on a 375px phone), scale the body down
  // uniformly so the user can read without a horizontal-scroll tax.
  function fit() {
    const iframe = ref.current;
    if (!iframe) return;
    const doc = iframe.contentDocument;
    if (!doc || !doc.body) return;
    const body = doc.body;
    body.style.transformOrigin = 'top left';
    body.style.transform = '';        // reset for accurate measurement
    body.style.width = '';
    const contentWidth = Math.max(body.scrollWidth, doc.documentElement.scrollWidth);
    const iframeWidth  = iframe.clientWidth || iframe.offsetWidth;
    if (iframeWidth > 0 && contentWidth > iframeWidth + 2) {
      const scale = iframeWidth / contentWidth;
      body.style.width = contentWidth + 'px';
      body.style.transform = `scale(${scale})`;
      iframe.style.height = (body.scrollHeight * scale + 24) + 'px';
    } else {
      iframe.style.height = (body.scrollHeight + 24) + 'px';
    }
  }
  function onLoad() { try { fit(); } catch { /* ignore cross-origin */ } }
  // Re-fit when the parent changes size (phone rotation, desktop column drag).
  useEffect(() => {
    const iframe = ref.current;
    if (!iframe) return;
    const obs = new ResizeObserver(() => { try { fit(); } catch { /* ignore */ } });
    obs.observe(iframe);
    return () => obs.disconnect();
  }, []);
  // <base target="_blank"> makes every link open in a new tab instead of
  // hijacking the iframe. A tiny default stylesheet keeps things readable
  // when the source has no CSS of its own.
  const srcDoc = `<!doctype html>
<html><head><base target="_blank"><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, maximum-scale=5">
<style>
  html, body { margin:0; padding:0; overflow: hidden; }
  /* overflow-wrap:anywhere beats break-word for purely unbroken runs like
     signature divider lines (———————…) or long URLs — break-word only breaks
     at a last-resort point and can still overflow in some engines. */
  body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color:#374151; word-break: break-word; overflow-wrap: anywhere; }
  img, video, iframe { max-width: 100%; height: auto; }
  table { max-width: 100%; }
  a { color: #4f46e5; overflow-wrap: anywhere; }
  blockquote { margin: 0.5em 0; padding-left: 0.75em; border-left: 3px solid #e5e7eb; color: #6b7280; }
  pre, code { white-space: pre-wrap; word-break: break-all; overflow-wrap: anywhere; }
</style>
</head><body>${html}</body></html>`;
  return (
    <iframe ref={ref}
      title="Message body"
      className="w-full border-0 bg-white"
      sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"
      srcDoc={srcDoc}
      onLoad={onLoad}
      scrolling="no"
      style={{minHeight:200, display:'block'}}/>
  );
}

// Small modal used to introduce a feature the first time a user touches
// it. Closes via OK (= proceed with the gated action) or Cancel (= back
// out, action does NOT fire). A checkbox lets the user suppress the
// dialog from now on; the flag is stored either way the user closes,
// so "Cancel + don't show again" still means "I know what this is, stop
// asking".
function OnboardingDialog({title, body, onClose}) {
  const [dontShow, setDontShow] = useState(false);
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-4"
      style={{background:'rgba(0,0,0,0.4)'}}>
      <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-5">
        {title && <div className="text-sm font-semibold text-gray-900 mb-2">{title}</div>}
        <div className="text-sm text-gray-700 leading-relaxed">{body}</div>
        <label className="flex items-center gap-2 mt-4 text-xs text-gray-500 cursor-pointer">
          <input type="checkbox" checked={dontShow} onChange={e=>setDontShow(e.target.checked)}
            className="accent-indigo-600"/>
          <span>Don't show this message again</span>
        </label>
        <div className="mt-5 flex justify-end gap-2">
          <button onClick={()=>onClose('cancel', dontShow)}
            className="px-4 py-1.5 text-sm rounded bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium">
            Cancel
          </button>
          <button onClick={()=>onClose('ok', dontShow)}
            className="px-4 py-1.5 text-sm rounded bg-indigo-600 hover:bg-indigo-700 text-white font-medium">
            OK
          </button>
        </div>
      </div>
    </div>
  );
}

function fibSnoozeDays(count) {
  // Fibonacci snooze sequence: 3, 5, 8, 13, 21, 34 …
  if(count<=0) return 3;
  if(count===1) return 5;
  let a=3,b=5;
  for(let i=2;i<=count;i++){const c=a+b;a=b;b=c;}
  return b;
}

function MessageDetail({message,contact,isDeleted,msgTags,allTags,onReply,onReplyAll,onForward,onDelete,onRecover,onDismissR2m,onR2mSeen,onR2mSnooze,onMarkRead,onSnooze,onSpam,onUnsubscribe,snoozeCount=0,onAddTag,onRemoveTag,onSelectContact,selAccounts=[],fadeOut=false,fadeOutFast=false,slideIn=false,slideOut=false,fadingAlert=null,onHeaderHeight,mobileBack,mobileBackLabel}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const headerRef = useRef(null);
  const [headerH, setHeaderH] = useState(0);
  const alertSentinelRef = useRef(null);
  const scrollRootRef = useRef(null);
  const [alertOutOfView, setAlertOutOfView] = useState(false);
  // Lazily-loaded full body + attachments (IMAP round-trip, so only when we
  // actually need them: message has attachments or HTML contains cid: refs).
  const [enriched, setEnriched] = useState(null); // null | {html, text, attachments[]}
  const [enrichedLoading, setEnrichedLoading] = useState(false);
  const [enrichedErr, setEnrichedErr] = useState('');
  const [previewIdx, setPreviewIdx] = useState(null); // position in non-inline attachments list
  useEffect(()=>{
    setEnriched(null); setEnrichedErr(''); setPreviewIdx(null);
    if (!message || message.draft) return;
    // Three reasons to hit /body in parallel with the page-level bootstrap:
    //  - the message has attachments (need the public attachment list)
    //  - inline cid: refs in bodyHtml that need server-side rewriting to data URIs
    //  - the message came out of the bootstrap cache with body+bodyHtml stripped,
    //    so we have nothing to show until either /body or /bootstrap returns.
    //    Fetching /body directly is much faster than waiting for the full
    //    bootstrap to land, so the user sees the message body sooner.
    // We only need to call /body when one of the following holds:
    //   - the message has attachments AND we don't have the metadata
    //     cached (older mails synced before the backend started saving
    //     attachments_meta still fall back to IMAP on first click);
    //   - the cached bodyHtml still has unresolved cid: refs and the
    //     attachments aren't yet inlined into it;
    //   - we have no body at all yet.
    // Once attachmentsMeta is present AND the html is either absent or
    // already inlined, /body adds nothing the FE can't render itself.
    const hasAttachmentsMeta = Array.isArray(message.attachmentsMeta);
    const needsAttachmentEnrichment =
      (message.hasAttachments && !hasAttachmentsMeta) ||
      (typeof message.bodyHtml === 'string' && /cid:/i.test(message.bodyHtml));
    const needsBodyFetch = message.body === undefined && message.bodyHtml === undefined;
    if (!needsAttachmentEnrichment && !needsBodyFetch) return;
    let cancelled = false;
    setEnrichedLoading(true);
    apiFetch(`/messages/${message.id}/body`)
      .then(async r => {
        if (cancelled || !r) return;
        // Phase 1.4b — body decrypt path. Three cases (matching the
        // bootstrap rule in App):
        //   • Unlocked + body_text_enc present → decrypt, show plaintext
        //   • Locked   + body_text_enc present → show the raw base64
        //     ciphertext so the user can SEE that decryption is off.
        //     For body_html in this case we drop it (rendering base64
        //     as HTML is incomprehensible) and instead show the text
        //     base64 — the user gets one visible blob, not two.
        //   • No _enc at all → keep the plaintext fields untouched.
        const masterKey = _masterKeyForDecrypt;
        if (r.body_text_enc) {
          if (masterKey) {
            try {
              const dec = await CONVOOZ_CRYPTO.decryptString(CONVOOZ_CRYPTO.b64.toBytes(r.body_text_enc), masterKey);
              if (dec !== null) r = { ...r, text: dec };
            } catch { /* keep plaintext */ }
          } else {
            r = { ...r, text: r.body_text_enc, html: null };
          }
        }
        if (r.body_html_enc) {
          if (masterKey) {
            try {
              const dec = await CONVOOZ_CRYPTO.decryptString(CONVOOZ_CRYPTO.b64.toBytes(r.body_html_enc), masterKey);
              if (dec !== null) r = { ...r, html: dec };
            } catch { /* keep plaintext */ }
          } else {
            // Already null'd above if body_text_enc was present. Locked +
            // html-only? Surface the html base64 as text instead.
            if (!r.body_text_enc) r = { ...r, text: r.body_html_enc, html: null };
          }
        }
        if (!cancelled) setEnriched(r);
      })
      .catch(e => { if (!cancelled) setEnrichedErr(e?.message || 'Failed to load full message'); })
      .finally(() => { if (!cancelled) setEnrichedLoading(false); });
    return () => { cancelled = true; };
  },[message?.id]);
  async function downloadAttachment(att) {
    try {
      // Reuse the blob fetcher so the same 401/503 retry plumbing applies
      // — a stale token race during Realtime refresh would otherwise
      // silently 401 and the user just sees "Download failed".
      const blob = await fetchAttachmentBlob(message.id, att.index);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = att.filename; a.rel = 'noopener';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 500);
    } catch (e) {
      alert('Download failed: ' + (e?.message || 'unknown error'));
    }
  }
  useEffect(()=>{
    if(headerRef.current){
      const h=headerRef.current.offsetHeight;
      setHeaderH(h);
      onHeaderHeight?.(h);
    }
  },[message?.id]);
  // Always open message scrolled to top (reset on mail change)
  useEffect(()=>{
    if(scrollRootRef.current) scrollRootRef.current.scrollTop = 0;
    setAlertOutOfView(false);
  },[message?.id]);
  useEffect(()=>{
    const root = scrollRootRef.current;
    if(!root) return;
    // Mobile reserves ~40px at the top of the scroll root for the
    // back-link subheader, so the sentinel has to clear that height
    // before we count it as "out of view". Desktop has no subheader —
    // sentinel just needs to leave the visible top edge.
    const threshold = isMobile ? 40 : 0;
    function check(){
      const sentinel = alertSentinelRef.current;
      if(!sentinel){ setAlertOutOfView(false); return; }
      const rootRect = root.getBoundingClientRect();
      const sentRect = sentinel.getBoundingClientRect();
      setAlertOutOfView((sentRect.top - rootRect.top) < threshold);
    }
    check();
    root.addEventListener('scroll', check, {passive:true});
    window.addEventListener('resize', check);
    return ()=>{root.removeEventListener('scroll', check); window.removeEventListener('resize', check);};
  },[isMobile,message?.id]);

  if (!message||!contact) return (
    <div className="flex items-center justify-center h-full text-gray-300 select-none bg-white">
      <div className="flex flex-col items-center gap-2">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2"/>
          <path d="m3 7 9 6 9-6"/>
        </svg>
        <div className="text-sm text-gray-400">Select a message</div>
      </div>
    </div>
  );
  const isDraft=!!message.draft;
  const senderPerson = message.dir==="out" ? (message.sender || {name:'Me',avatar:'Me',color:'#6366f1',portrait:null}) : contact;
  // When fadingAlert is set (during action), freeze banner so alert stays until toast is gone
  const showAmberBanner = fadingAlert ? fadingAlert.amber : (message.revert2me&&message.dir==="out"&&!isDeleted);
  const showBlueBanner  = fadingAlert ? fadingAlert.blue  : (!message.read&&message.dir==="in"&&!isDraft&&!isDeleted);

  // Mobile: wrap header+body+spacer inside a scrollable middle div; keep subheader fixed top, action bar fixed bottom
  const MobileFixedSubheader = isMobile&&mobileBack ? (
    <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
      <div className="flex items-center gap-2 px-3 py-2">
        <button onClick={mobileBack}
          className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5 truncate min-w-0 flex-1">
          <svg className="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
          <span className="truncate">{mobileBackLabel||"Mail"}</span>
        </button>
        {alertOutOfView&&showAmberBanner&&(
          <div className="flex gap-1.5 flex-shrink-0">
            <button onClick={()=>onR2mSnooze?.(message.id)}
              className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Snooze</button>
            <button onClick={()=>onR2mSeen?.(message.id)}
              className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Seen</button>
          </div>
        )}
        {alertOutOfView&&showBlueBanner&&(
          <div className="flex gap-1.5 flex-shrink-0">
            <button onClick={()=>onSnooze?.(message.id)}
              className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Snooze</button>
            <button onClick={()=>onMarkRead?.(message.id)}
              className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Seen</button>
          </div>
        )}
      </div>
    </div>
  ) : null;

  // Desktop sticky alert: when the in-scroll banner scrolls out of view,
  // pop a thin bar with the same Snooze/Seen actions at the very top of
  // the column so the user can still act without scrolling back up.
  const DesktopStickyAlert = !isMobile && alertOutOfView && (showAmberBanner || showBlueBanner) ? (
    <div className="border-b border-gray-200 flex-shrink-0 px-5 py-2 flex items-center gap-2"
      style={{
        background: showAmberBanner ? '#fffbeb' : '#eef2ff',
        color: showAmberBanner ? '#b45309' : '#4338ca',
        zIndex: 20,
      }}>
      <span className="text-xs font-medium flex-1 truncate">
        {showAmberBanner ? `Revert-to-me: ${formatR2mDuration(message.date)}.` : 'New message: not read.'}
      </span>
      <div className="flex gap-1.5 flex-shrink-0">
        {showAmberBanner ? (<>
          <button onClick={()=>onR2mSnooze?.(message.id)}
            className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Snooze</button>
          <button onClick={()=>onR2mSeen?.(message.id)}
            className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 text-amber-700 text-xs font-medium">Seen</button>
        </>) : (<>
          <button onClick={()=>onSnooze?.(message.id)}
            className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Snooze</button>
          <button onClick={()=>onMarkRead?.(message.id)}
            className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-medium">Seen</button>
        </>)}
      </div>
    </div>
  ) : null;

  return (
    <div className={`flex flex-col h-full bg-white${!isMobile?((fadeOut?' msg-fade-out':'')+(fadeOutFast?' msg-fade-out-fast':'')+(slideOut?' msg-slide-out':'')+(slideIn?' msg-slide-in':'')):''}`}>
      {MobileFixedSubheader}
      {DesktopStickyAlert}
      <div ref={scrollRootRef}
        className={`flex-1 min-h-0 overflow-y-auto scroll${isMobile?((fadeOut?' msg-fade-out':'')+(fadeOutFast?' msg-fade-out-fast':'')+(slideOut?' msg-slide-out':'')+(slideIn?' msg-slide-in':'')):''}`}
        style={isMobile?{WebkitOverflowScrolling:'touch'}:{}}>
      <div style={isMobile?{minHeight:'calc(100% + 1px)',display:'flex',flexDirection:'column'}:{display:'contents'}}>
      <div ref={headerRef} className="px-5 py-4 border-b border-gray-200 flex-shrink-0">
        <div className="flex items-start justify-between gap-3 mb-2">
          <div className="font-semibold text-gray-900 leading-snug">{message.subject}</div>
          <MsgLabel dir={message.dir} isDraft={isDraft} isDeleted={isDeleted} isSpam={!!message.spam}/>
        </div>
        {/* The contact row at the top is a navigation target: clicking
            it swaps col 2 over to this contact's full thread (the
            ContactCard + filter tabs + mail list) without disturbing
            the open mail in col 3. Most useful when you reached the
            mail via global search or a tag view and want to jump into
            the conversation context. The whole row (avatar + name +
            date + From/To/Cc) is the click target so it's easy to
            hit; a subtle hover background telegraphs that it's
            interactive. Disabled when contact is null (orphan mail
            with no contactId match). */}
        {(() => {
          const navigable = !!(contact?.id && onSelectContact);
          const inner = (
            <>
              <Avatar contact={senderPerson} size={36}/>
              <div className="flex-1 min-w-0">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-sm font-medium text-gray-800 truncate">{senderPerson.name}</span>
                  <span className="text-xs text-gray-400 flex-shrink-0 whitespace-nowrap">
                    {isMobile ? (() => {
                      const d = new Date(message.date);
                      return d.toLocaleDateString("nl-NL",{day:"numeric",month:"short"}) + ' ' + d.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});
                    })() : formatFull(message.date)}
                  </span>
                </div>
                <div className="text-xs text-gray-400 mt-0.5">
                  {message.dir==="in"
                    ? <><span className="text-gray-500">From:</span> {message.from}
                        <br/><span className="text-gray-500">To:</span> {message.toList?.length ? message.toList.join(', ') : message.to}
                        {message.ccList?.length > 0 && <><br/><span className="text-gray-500">Cc:</span> {message.ccList.join(', ')}</>}
                      </>
                    : <><span className="text-gray-500">To:</span> {message.toList?.length ? message.toList.join(', ') : message.to}
                        {message.ccList?.length > 0 && <><br/><span className="text-gray-500">Cc:</span> {message.ccList.join(', ')}</>}
                        {message.bccList?.length > 0 && <><br/><span className="text-gray-500">Bcc:</span> {message.bccList.join(', ')}</>}
                        {selAccounts.length > 1 && <><br/><span className="text-gray-500">From:</span> {message.from}</>}
                      </>}
                </div>
              </div>
            </>
          );
          if (!navigable) {
            return <div className="flex items-start gap-3">{inner}</div>;
          }
          return (
            <div className="flex items-start gap-3 -mx-2 px-2 py-1 -my-1 rounded cursor-pointer hover:bg-gray-50"
              role="button" tabIndex={0}
              onClick={() => onSelectContact(contact.id)}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelectContact(contact.id); } }}
              title={`Open gesprek met ${contact.name}`}>
              {inner}
            </div>
          );
        })()}
        {/* Tags on message */}
        <div className="mt-2">
          <TagPicker current={msgTags} suggestions={allTags}
            onAdd={t=>onAddTag(message.id,t)} onRemove={t=>onRemoveTag(message.id,t)}/>
        </div>
      </div>

      {/* Alert banners + toast — this zone never fades so toast stays fully readable */}
      <div className="relative flex-shrink-0">
        {showAmberBanner&&(
          <div className="mx-4 mt-3 px-3 py-2 rounded bg-amber-50 border border-amber-200 flex items-center gap-2 text-xs text-amber-700">
            <span className="flex-1 min-w-0 truncate"><strong>Revert2Me:</strong> {formatR2mDuration(message.date)}</span>
            <div className="flex gap-2 flex-shrink-0">
              <button onClick={()=>onR2mSnooze?.(message.id)}
                className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 font-medium">Snooze</button>
              <button onClick={()=>onR2mSeen?.(message.id)}
                className="px-2 py-0.5 rounded bg-amber-100 hover:bg-amber-200 font-medium">Seen</button>
            </div>
          </div>
        )}
        {showBlueBanner&&(
          <div className="mx-4 mt-3 px-3 py-2 rounded bg-indigo-50 border border-indigo-200 flex items-center gap-2 text-xs text-indigo-700">
            <span><strong>New message:</strong> not read.</span>
            <div className="ml-auto flex gap-2">
              <button onClick={()=>onSnooze?.(message.id)}
                className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 font-medium">Snooze</button>
              <button onClick={()=>onMarkRead?.(message.id)}
                className="px-2 py-0.5 rounded bg-indigo-100 hover:bg-indigo-200 font-medium">Seen</button>
            </div>
          </div>
        )}
        {/* Newsletter banner: any incoming mail with a List-Unsubscribe
            header gets an Unsubscribe button right under the message
            header, Apple-Mail style. Click triggers onUnsubscribe(message);
            the parent decides whether to POST one-click or open the URL. */}
        {message.unsubscribeUrl && message.dir==='in' && !isDeleted && (
          <div className="mx-4 mt-3 px-3 py-2 rounded bg-gray-50 border border-gray-200 flex items-center gap-2 text-xs text-gray-600">
            <span>Newsletter</span>
            <div className="ml-auto flex gap-2">
              <button onClick={()=>onUnsubscribe?.(message)}
                className="px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium">Unsubscribe</button>
            </div>
          </div>
        )}
        {/* Sentinel used to detect when the alert banner scrolls out of view */}
        {(showAmberBanner||showBlueBanner)&&<div ref={alertSentinelRef} style={{height:1}}/>}
      </div>

      <div className="px-5 py-4 text-sm text-gray-700 leading-relaxed" style={{wordBreak:'break-word', overflowWrap:'anywhere'}}>
        {(() => {
          // Cache-hydrated messages have body and bodyHtml stripped (cache
          // would otherwise blow the localStorage quota). The /body fetch
          // above runs in parallel and fills `enriched`; once it lands we
          // can render from there. Spinner only when we genuinely have
          // nothing to show yet — neither the message prop nor enriched.
          const noBodyAtAll =
            message.body === undefined && message.bodyHtml === undefined &&
            !enriched && !enrichedErr;
          if (noBodyAtAll) return (
            <div className="flex items-center gap-2 text-sm text-gray-400 italic">
              <Spinner size={14}/>
              <span>Loading full message…</span>
            </div>
          );
          const htmlToRender = enriched?.html || message.bodyHtml;
          if (htmlToRender) return <HtmlMessageBody html={htmlToRender}/>;
          // Plain-text body: each newline becomes its own <p>. Fall back to
          // enriched.text when the cache-stripped message has no body of
          // its own (the parallel /body fetch fills enriched.text when the
          // mail is plain-text only).
          // `overflow-wrap: anywhere` on the parent wraps long unbroken runs
          // like signature dividers (————————…) and URL-ish tokens so the
          // column never has to scroll horizontally on narrow screens.
          const textBody = (message.body && message.body.trim()) ? message.body : (enriched?.text || '');
          if (textBody.trim()) return textBody.split("\n").map((line,i)=>(
            <p key={i} className={line.startsWith("—")||line.startsWith("——")?"text-gray-300 mt-3":"min-h-[1em]"}>{line}</p>
          ));
          // Spinner only when we expect inline HTML images to be rewritten
          // server-side (the /body endpoint replaces cid: refs with data URIs).
          // For attachment-only mails or genuinely empty bodies, skip the
          // spinner — it just lingered without ever resolving to content.
          const expectingInlineRewrite = enrichedLoading
            && typeof message.bodyHtml === 'string'
            && /cid:/i.test(message.bodyHtml);
          if (expectingInlineRewrite) return (
            <div className="flex items-center gap-2 text-sm text-gray-400 italic">
              <Spinner size={14}/>
              <span>Loading full message…</span>
            </div>
          );
          return <p className="italic text-gray-300">(no body text)</p>;
        })()}
        {enrichedErr && <p className="mt-3 text-xs text-red-500">Attachments load failed: {enrichedErr}</p>}
        {(() => {
          const atts = (enriched?.attachments || message.attachmentsMeta || []).filter(a => !a.isInline);
          if (atts.length === 0) return null;
          const images = atts.filter(a => attachmentKind(a.contentType) === 'image');
          return (
            <div className="mt-4 pt-3 border-t border-gray-100">
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                {atts.length} attachment{atts.length===1?'':'s'}
              </div>
              {images.length > 0 && (
                <div className="flex flex-wrap gap-2 mb-3">
                  {images.map(a => (
                    <AttachmentThumb key={a.index} messageId={message.id} att={a}
                      onClick={()=>setPreviewIdx(atts.findIndex(x=>x.index===a.index))}/>
                  ))}
                </div>
              )}
              <div className="flex flex-wrap gap-2">
                {atts.map(a => {
                  const kind = attachmentKind(a.contentType);
                  const canPreview = kind !== 'other';
                  return (
                    <button key={a.index}
                      onClick={()=> canPreview ? setPreviewIdx(atts.findIndex(x=>x.index===a.index)) : downloadAttachment(a)}
                      title={`${a.filename} · ${Math.round((a.size||0)/1024)} KB${canPreview?' (click to preview)':''}`}
                      className="flex items-center gap-1.5 px-2.5 py-1.5 text-xs rounded-lg border border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 text-gray-700 transition-colors max-w-xs">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="flex-shrink-0 text-gray-400">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                      </svg>
                      <span className="truncate">{a.filename}</span>
                      <span className="text-gray-400 flex-shrink-0">· {Math.round((a.size||0)/1024)} KB</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>
      {(() => {
        // Same fallback chain as the chip view above — without
        // message.attachmentsMeta here the modal silently refused to
        // render whenever /body was skipped because the metadata was
        // already cached (i.e. every visit after the first one for that
        // message). atts came back empty, previewIdx >= 0 hit the
        // out-of-bounds guard, and clicking a thumbnail looked like a
        // dead button.
        const atts = (enriched?.attachments || message.attachmentsMeta || []).filter(a => !a.isInline);
        if (previewIdx == null || previewIdx < 0 || previewIdx >= atts.length) return null;
        const active = atts[previewIdx];
        const hasPrev = previewIdx > 0;
        const hasNext = previewIdx < atts.length - 1;
        return <AttachmentPreviewModal
          messageId={message.id}
          attachment={active}
          attachments={atts}
          onClose={()=>setPreviewIdx(null)}
          onPrev={hasPrev ? ()=>setPreviewIdx(i=>i-1) : null}
          onNext={hasNext ? ()=>setPreviewIdx(i=>i+1) : null}
          onDownload={()=>downloadAttachment(active)}/>;
      })()}
      </div>{/* end mobile bounce wrapper */}
      </div>{/* end scrollable middle */}

      <div className="px-5 py-3 border-t border-gray-200 flex items-center gap-2 flex-shrink-0 bg-white">
        {(()=>{const mob=window.innerWidth<768; return <>
        <button onClick={onReply} className="px-3 py-1.5 text-xs rounded bg-indigo-600 text-white hover:bg-indigo-700 font-medium flex items-center gap-1.5" title="Reply">
          <ReplyIcon size={mob?16:13}/>{!mob&&<span>Reply</span>}
        </button>
        <button onClick={onReplyAll} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-700 flex items-center gap-1.5" title="Reply all">
          <ReplyAllIcon size={mob?16:13}/>{!mob&&<span>Reply all</span>}
        </button>
        <button onClick={onForward} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-700 flex items-center gap-1.5" title="Forward">
          <ForwardIcon size={mob?16:13}/>{!mob&&<span>Forward</span>}
        </button>
        <div className="flex-1"/>
        {isDeleted
          ?<button onClick={onRecover} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-green-100 text-green-600 flex items-center gap-1.5" title="Recover">
            <RecoverIcon size={mob?16:13}/>{!mob&&<span>Recover</span>}
          </button>
          :<button onClick={onDelete} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-red-100 text-red-500 flex items-center gap-1.5" title="Delete">
            <DeleteIcon size={mob?16:13}/>{!mob&&<span>Delete</span>}
          </button>}
        {message.dir==="in"&&!isDeleted&&<button onClick={()=>onSpam?.(message.id)} className="px-3 py-1.5 text-xs rounded bg-gray-100 hover:bg-gray-200 text-gray-500 flex items-center gap-1.5" title="Spam">
          <SpamIcon size={mob?16:13}/>{!mob&&<span>Spam</span>}
        </button>}
        </>})()}
      </div>
    </div>
  );
}

// ─── Thread Column ────────────────────────────────────────────────────────────

// { label, key } — label is what the user sees, key is the internal
// filter id (kept as 'now' so msgMatchesThreadFilter and any other
// downstream check don't need a rename). New default for both
// thread view and search is "All" — first position, no surprise pile
// of just unread mail when you open a contact. "Now" sits in the
// second slot for users who want to scope to actionable.
const FILTER_TABS = [
  { label: "All",     key: "all" },
  { label: "Now",     key: "now" },
  { label: "In",      key: "in" },
  { label: "Out",     key: "out" },
  { label: "Draft",   key: "draft" },
  { label: "Deleted", key: "deleted" },
];

function ThreadColumn({contact,allMsgs,deletedIds,selectedMsgId,msgTags,onSelect,onSelectDraft,onNewMsg,onEditContact,
                       contactTags,allTags,onAddContactTag,onRemoveContactTag,
                       emailFlags,archivedContacts,onToggleFlag,
                       savedFilter,onFilterChange,onMarkManyRead,lazyFetching,arrowFocus,mobileBack}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const [nameHover,setNameHover]=useState(false);
  const [flagsOpen,setFlagsOpen]=useState(false);
  const flagsMenuRef=useRef(null);
  useEffect(()=>{
    if(!flagsOpen)return;
    const h=e=>{if(flagsMenuRef.current&&!flagsMenuRef.current.contains(e.target))setFlagsOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[flagsOpen]);
  const listRef=useRef(null);
  const filter = savedFilter||"all";
  const setFilterAndSave = f=>onFilterChange?.(f);
  useEffect(()=>{
    if(!selectedMsgId||!listRef.current) return;
    const el=listRef.current.querySelector(`[data-msgid="${selectedMsgId}"]`);
    if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  },[selectedMsgId]);

  const msgs=useMemo(()=>{
    const del=x=>deletedIds.includes(x.id);
    let m=allMsgs;
    if(filter==="now")     m=m.filter(x=>!del(x)&&!x.draft&&((x.dir==="in"&&!x.read)||(x.dir==="out"&&x.revert2me)));
    else if(filter==="in") m=m.filter(x=>x.dir==="in"&&!x.draft&&!del(x));
    else if(filter==="out")m=m.filter(x=>x.dir==="out"&&!x.draft&&!del(x));
    else if(filter==="draft")m=m.filter(x=>x.draft&&!del(x));
    else if(filter==="deleted")m=m.filter(x=>del(x));
    else m=m.filter(x=>!del(x));
    const sortKey=x=>x.draft?(x.modifiedAt||x.date):x.date;
    return [...m].sort((a,b)=>sortKey(b).localeCompare(sortKey(a)));
  },[allMsgs,filter,deletedIds]);

  // Arrow up / arrow down: walk through the visible (already-filtered
  // + sorted) thread. Only fires when arrowFocus === 'mails' so the
  // contact-list arrow-nav in LeftColumn doesn't double-handle. No
  // wrap-around — feels jarring when the list is long. Skipped while
  // a text field has focus so the user can still navigate inside the
  // compose box, the search bar, etc. Modifier keys are passed
  // through too (Cmd+Arrow / Shift+Arrow stay as the browser's
  // word/selection shortcuts). When the user lands on a draft row we
  // route through onSelectDraft to open the compose pane instead of
  // the read-only detail.
  useEffect(()=>{
    function onKey(e){
      if(arrowFocus!=='mails') return;
      if(e.key!=='ArrowDown'&&e.key!=='ArrowUp') return;
      if(e.metaKey||e.ctrlKey||e.altKey||e.shiftKey) return;
      const el=document.activeElement;
      if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable)) return;
      if(msgs.length===0) return;
      e.preventDefault();
      const currIdx=selectedMsgId?msgs.findIndex(m=>m.id===selectedMsgId):-1;
      let nextIdx;
      if(e.key==='ArrowDown') nextIdx=currIdx<0?0:Math.min(currIdx+1,msgs.length-1);
      else                    nextIdx=currIdx<=0?0:currIdx-1;
      const next=msgs[nextIdx];
      if(!next) return;
      if(next.draft) onSelectDraft?.(next);
      else           onSelect?.(next.id);
    }
    document.addEventListener('keydown',onKey);
    return ()=>document.removeEventListener('keydown',onKey);
  },[msgs,selectedMsgId,onSelect,onSelectDraft,arrowFocus]);

  // Actionable = unread incoming + outgoing with armed revert2me. Same
  // definition as the "Now" filter and the left-column actionable badge.
  // The alert below the contact card surfaces when the pile gets large
  // enough that scrolling through them feels daunting; clicking "All
  // Seen" marks them all read in one go.
  const actionableInThread = useMemo(() => allMsgs.filter(
    x => !deletedIds.includes(x.id) && !x.draft &&
      ((x.dir === 'in' && !x.read) || (x.dir === 'out' && x.revert2me))
  ), [allMsgs, deletedIds]);
  // Styled to match the Newsletter / Unsubscribe banner on a message
  // (mx-4, soft card-tinted background, gray-200 border, neutral chip on
  // the right) so the two "act on this pile" affordances feel consistent.
  // The background is forced via inline style because polish.css rewrites
  // .bg-gray-50 inside column 2 to pure white (so contact thread cards
  // stay white-on-canvas) — the alert wants the column-3 banner tint.
  // Only surface on Now / All — those are the filters where reading
  // through the pile makes sense. On In / Out / Draft / Deleted the
  // user is already in a specific scope and a global "mark everything
  // seen" would feel like a side-effect outside of view.
  const actionableAlertEligibleFilter = filter === 'now' || filter === 'all';
  const actionableAlert = (actionableAlertEligibleFilter && actionableInThread.length > 5) ? (
    <div className="mx-4 mt-3 px-3 py-2 rounded border border-gray-200 flex items-center gap-2 text-xs text-gray-600 flex-shrink-0"
      style={{backgroundColor: 'var(--bg-card-soft)'}}>
      <span><span className="font-semibold text-gray-800">{actionableInThread.length}</span> actionable mails</span>
      <div className="ml-auto flex gap-2">
        <button onClick={()=>onMarkManyRead?.(actionableInThread.map(m=>m.id))}
          className="px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium">All Seen</button>
      </div>
    </div>
  ) : null;

  if(!contact) return (
    <div className="flex items-center justify-center h-full bg-white text-gray-300 text-sm select-none">
      <div className="flex flex-col items-center gap-2">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21c0-4 3.5-7 8-7s8 3 8 7"/>
        </svg>
        <div className="text-gray-400">Select a contact</div>
      </div>
    </div>
  );

  if (isMobile) {
    return (
      <div className="flex flex-col h-full bg-white overflow-hidden">
        {/* Fixed back link (outside scroll area) */}
        <div className="bg-white border-b border-gray-200 flex-shrink-0" style={{zIndex:20}}>
          <div className="flex items-center gap-2 px-3 py-2">
            <button onClick={mobileBack}
              className="flex items-center gap-1 text-sm text-indigo-600 font-medium py-0.5">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/></svg>
              Contacts
            </button>
          </div>
        </div>
        {/* Scrollable content */}
        <div className="flex-1 min-h-0 overflow-y-auto scroll" style={{WebkitOverflowScrolling:'touch',overflowX:'hidden'}}>
        <div style={{minHeight:'calc(100% + 1px)'}}>

        {/* Contact card — scrolls away */}
        <div className="px-5 pt-3 pb-2 border-b border-gray-200 flex-shrink-0 bg-gray-50">
          {/* Name row: avatar + name (clickable → edit) + flags chevron + new msg button */}
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-2 cursor-pointer min-w-0 flex-1"
              onMouseEnter={()=>setNameHover(true)} onMouseLeave={()=>setNameHover(false)}
              onClick={onEditContact}>
              <Avatar contact={contact} size={28}/>
              <span className="font-semibold text-gray-900 text-base leading-snug hover:text-indigo-700 transition-colors truncate">{contact.name}</span>
              <span className="flex items-center justify-center text-gray-400 flex-shrink-0" style={{padding:2}}>
                <PencilIcon size={11}/>
              </span>
            </div>
            {/* Flags chevron pulldown */}
            <div className="relative flex-shrink-0" ref={flagsMenuRef}>
              <button onClick={()=>setFlagsOpen(v=>!v)}
                className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-200 text-gray-400"
                title="Contact flags">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </button>
              {flagsOpen&&(
                <div className="absolute right-0 top-full mt-1 z-20 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden" style={{minWidth:140}}>
                  {[['News','isNews'],['Noreply','isNoReply'],['Mute','isMuted']].map(([label,key])=>{
                    const checked=!!contact[key];
                    return <button key={label} onClick={()=>onToggleFlag?.(contact.id,key)}
                      className="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50">
                      <span className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${checked?'bg-indigo-500 border-indigo-500':'border-gray-300'}`}>
                        {checked&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </span>
                      <span>{label}</span>
                    </button>;
                  })}
                </div>
              )}
            </div>
            <button onClick={onNewMsg} title="New message"
              className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex-shrink-0">
              <PlusIcon size={12}/>
            </button>
          </div>
          {contact.org&&<div className="text-xs text-gray-400 mt-0.5 pl-[36px]">{contact.org}</div>}
          <div className="mt-1 space-y-0.5 pl-[36px]">
            {contact.emails.map((e,i)=>(
              <div key={e} className="flex items-center gap-1.5">
                <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${i===0?"bg-indigo-400":"bg-gray-300"}`}/>
                <span className="text-xs text-gray-400 truncate">{e}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Sticky filter tabs — colored active states, bg matches card above */}
        <div className="bg-gray-50 border-b border-gray-200 flex-shrink-0 px-5 py-2" style={{position:'sticky',top:0,zIndex:10,overscrollBehavior:'none'}}>
          <div className="flex gap-0.5 flex-wrap">
            {FILTER_TABS.map(({label, key:k})=>{
              const active=filter===k;
              const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
                in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
                draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
                :"text-gray-400 hover:text-gray-600";
              return <button key={k} onClick={()=>setFilterAndSave(k)}
                className={`convooz-thread-filter-tab px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{label}</button>;
            })}
          </div>
        </div>

        {actionableAlert}
        {/* Messages */}
        <div ref={listRef} className="flex-shrink-0 bg-white">
          {msgs.length===0&&(lazyFetching
              ? <div className="flex flex-col items-center justify-center gap-2 text-gray-400 text-sm mt-10">
                  <Spinner size={16}/>
                  <span>Loading messages…</span>
                </div>
              : <div className="text-center text-gray-300 text-sm mt-10">No messages</div>)}
          {msgs.map(msg=>{
            const isSel=msg.id===selectedMsgId, isDel=deletedIds.includes(msg.id), isDraft=!!msg.draft&&!isDel;
            const isOut=msg.dir==="out"||isDraft;
            const dt=isDraft?formatTime(msg.modifiedAt||msg.date):formatTime(msg.date);
            // Outgoing CC/BCC recipients see the same mail in their thread
            // with a role-prefix on the date so they can tell at a glance
            // whether they were the primary addressee. "30 april" → "CC
            // 30 april" / "BCC 30 april". Skip for plain To (or null role
            // on incoming) so primary threads stay visually clean.
            const dtPrefix = msg.dir === 'out' && (msg.role === 'cc' || msg.role === 'bcc')
              ? (msg.role === 'cc' ? 'CC ' : 'BCC ')
              : '';
            return (
              <div key={msg.id+"::"+msg.contactId} data-msgid={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelect(msg.id)}
                className={`py-2.5 border-b border-gray-100 cursor-pointer transition-colors
                  ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":"hover:bg-gray-50"}
                  ${isDel?"opacity-60":""}
                  ${isOut?"pl-10 pr-4":"pl-4 pr-4"}`}>
                <div className="flex items-center justify-between gap-1 mb-0.5">
                  <div className="flex items-center gap-1.5 min-w-0">
                    {!msg.read&&!isDel&&!isDraft&&msg.dir==="in"&&<span className="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"/>}
                    {msg.revert2me&&msg.dir==="out"&&!isDel&&!isDraft&&<span className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"/>}
                    <span className={`text-xs truncate ${(!msg.read&&!isDel&&!isDraft)?"font-semibold text-gray-900":"text-gray-600"}`}>{msg.subject}</span>
                    {msg.hasAttachments&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-400 flex-shrink-0" aria-label="has attachment"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>}
                  </div>
                  <span className="text-xs text-gray-400 flex-shrink-0">{dtPrefix}{dt}</span>
                </div>
                <div className="flex items-center gap-1.5 pr-14">
                  {isDraft?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                    :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==="in"?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==="in"?"In":"Out"}</span>}
                  {isDel&&(msg.spam
                    ? <span className="text-xs px-1.5 rounded font-medium bg-fuchsia-100 text-fuchsia-700 flex-shrink-0">Spam</span>
                    : <span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>)}
                  <span className="text-xs text-gray-400 truncate flex-1 min-w-0">{(msg.snippet||msg.body||'').replace(/\n/g," ")}</span>
                </div>
              </div>
            );
          })}
        </div>
        </div>{/* end min-height wrapper */}
        </div>{/* end scrollable content */}
      </div>
    );
  }

  return (
    <div className="flex flex-col h-full bg-white">
      {/* Contact card */}
      <div className="px-5 pt-5 pb-3 border-b border-gray-200 flex-shrink-0 bg-gray-50">
        <div className="flex items-start gap-4 mb-2">
          <Avatar contact={contact} size={80}/>
          <div className="min-w-0 flex-1 pt-1">
            <div className="flex items-center gap-1.5">
              <div className="flex items-center gap-1.5 cursor-pointer flex-1 min-w-0"
                onMouseEnter={()=>setNameHover(true)} onMouseLeave={()=>setNameHover(false)}
                onClick={onEditContact}>
                <span className="font-semibold text-gray-900 text-base leading-snug hover:text-indigo-700 transition-colors truncate">{contact.name}</span>
                <span className={`flex items-center justify-center text-gray-400 transition-opacity flex-shrink-0 ${nameHover?"opacity-100":"opacity-0"}`}
                  style={{padding:2}}>
                  <PencilIcon size={11}/>
                </span>
              </div>
              {[['News','isNews'],['Noreply','isNoReply'],['Mute','isMuted']].map(([label,key])=>{
                const on=!!contact[key];
                const cls=on?'bg-indigo-50 border-indigo-300 text-indigo-600'
                  :'border-gray-200 text-gray-300 hover:border-gray-300 hover:text-gray-500';
                return <button key={label} onClick={()=>onToggleFlag?.(contact.id,key)}
                  className={`text-xs px-1.5 py-0.5 rounded border flex-shrink-0 transition-colors ${cls}`}>
                  {label}
                </button>;
              })}
            </div>
            {contact.org&&<div className="text-xs text-gray-400 mt-0.5">{contact.org}</div>}
            <div className="mt-1.5 space-y-0.5">
              {contact.emails.map((e,i)=>(
                <div key={e} className="flex items-center gap-1.5">
                  <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${i===0?"bg-indigo-400":"bg-gray-300"}`}/>
                  <span className="text-xs text-gray-400 truncate">{e}</span>
                </div>
              ))}
            </div>
          </div>
          {/* New message button only */}
          <button onClick={onNewMsg} title="New message"
            className="w-7 h-7 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white flex-shrink-0">
            <PlusIcon size={12}/>
          </button>
        </div>
        {/* Filter tabs */}
        <div className="flex gap-0.5 flex-wrap mt-1">
          {FILTER_TABS.map(({label, key:k})=>{
            const active=filter===k;
            const style=active?{now:"bg-indigo-100 text-indigo-700 font-semibold",all:"bg-gray-200 text-gray-700 font-semibold",
              in:"bg-sky-100 text-sky-700 font-semibold",out:"bg-emerald-100 text-emerald-700 font-semibold",
              draft:"bg-gray-100 text-gray-600 font-semibold",deleted:"bg-red-100 text-red-600 font-semibold"}[k]
              :"text-gray-400 hover:text-gray-600";
            return <button key={k} onClick={()=>setFilterAndSave(k)}
              className={`convooz-thread-filter-tab px-2.5 py-0.5 text-xs rounded-full transition-colors ${style}`}>{label}</button>;
          })}
        </div>
      </div>
      {actionableAlert}
      {/* Messages */}
      <div ref={listRef} className="flex-1 overflow-y-auto scroll">
        {msgs.length===0&&(lazyFetching
              ? <div className="flex flex-col items-center justify-center gap-2 text-gray-400 text-sm mt-10">
                  <Spinner size={16}/>
                  <span>Loading messages…</span>
                </div>
              : <div className="text-center text-gray-300 text-sm mt-10">No messages</div>)}
        {msgs.map(msg=>{
          const isSel=msg.id===selectedMsgId, isDel=deletedIds.includes(msg.id), isDraft=!!msg.draft&&!isDel;
          const isOut=msg.dir==="out"||isDraft;
          const dt=isDraft?formatTime(msg.modifiedAt||msg.date):formatTime(msg.date);
          const dtPrefix = msg.dir === 'out' && (msg.role === 'cc' || msg.role === 'bcc')
            ? (msg.role === 'cc' ? 'CC ' : 'BCC ')
            : '';
          return (
            <div key={msg.id+"::"+msg.contactId} data-msgid={msg.id} onClick={()=>isDraft?onSelectDraft(msg):onSelect(msg.id)}
              className={`py-2.5 border-b border-gray-100 cursor-pointer transition-colors
                ${isSel?"bg-indigo-50 border-l-2 border-l-indigo-400":"hover:bg-gray-50"}
                ${isDel?"opacity-60":""}
                ${isOut?"pl-10 pr-4":"pl-4 pr-4"}`}>
              <div className="flex items-center justify-between gap-1 mb-0.5">
                <div className="flex items-center gap-1.5 min-w-0">
                  {!msg.read&&!isDel&&!isDraft&&msg.dir==="in"&&<span className="w-1.5 h-1.5 rounded-full bg-indigo-500 flex-shrink-0"/>}
                  {msg.revert2me&&msg.dir==="out"&&!isDel&&!isDraft&&<span className="w-1.5 h-1.5 rounded-full bg-amber-400 flex-shrink-0"/>}
                  <span className={`text-xs truncate ${(!msg.read&&!isDel&&!isDraft)?"font-semibold text-gray-900":"text-gray-600"}`}>{msg.subject}</span>
                  {msg.hasAttachments&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-400 flex-shrink-0" aria-label="has attachment"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>}
                </div>
                <span className="text-xs text-gray-400 flex-shrink-0">{dtPrefix}{dt}</span>
              </div>
              <div className="flex items-center gap-1.5 pr-14">
                {isDraft?<span className="text-xs px-1.5 rounded font-medium bg-gray-100 text-gray-500 flex-shrink-0">Draft</span>
                  :<span className={`text-xs px-1.5 rounded font-medium flex-shrink-0 ${msg.dir==="in"?"bg-sky-100 text-sky-600":"bg-emerald-100 text-emerald-600"}`}>{msg.dir==="in"?"In":"Out"}</span>}
                {isDel&&(msg.spam
                    ? <span className="text-xs px-1.5 rounded font-medium bg-fuchsia-100 text-fuchsia-700 flex-shrink-0">Spam</span>
                    : <span className="text-xs px-1.5 rounded font-medium bg-red-100 text-red-500 flex-shrink-0">Deleted</span>)}
                <span className="text-xs text-gray-400 truncate flex-1 min-w-0">{(msg.snippet||msg.body||'').replace(/\n/g," ")}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const ROLE_OPTIONS = ["", "To", "CC", "BCC"];

// ─── Tag View ─────────────────────────────────────────────────────────────────

function TagView({tag, messages, contacts, deletedIds, msgTags, emailRoles, myEmails, msgMatchesSearch, selectedMsgId, onSelectMsg, onSelectDraft,
                  onEditTag, onUpdateRoles, onNewTagMsg, savedFilter, onFilterChange, onSelectContact, mobileBack}) {
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
  const tagFilter = savedFilter||'all';
  const setTagFilterAndSave = f=>onFilterChange?.(f);
  const tagSortKey=x=>x.draft?(x.modifiedAt||x.date):x.date;
  // Tag-view doesn't have a per-contact lens, so duplicate shape-entries
  // (same mail under multiple recipient contacts) would render multiple
  // identical rows. Dedup by id — keep the first one we see.
  const allTaggedMsgsRaw = messages.filter(m=>(msgTags[m.id]||[]).includes(tag));
  const _seenTagIds = new Set();
  const allTaggedMsgs = allTaggedMsgsRaw.filter(m => {
    if (_seenTagIds.has(m.id)) return false;
    _seenTagIds.add(m.id);
    return true;
  }).sort((a,b)=>tagSortKey(b).localeCompare(tagSortKey(a)));
  const searchFn = msgMatchesSearch || (()=>true);
  const taggedMsgs = allTaggedMsgs.filter(m=>{
    if(!searchFn(m)) return false;
    if(tagFilter==='in')    return m.dir==='in' && !m.draft && !deletedIds.includes(m.id);
    if(tagFilter==='out')   return m.dir==='out' && !m.draft && !deletedIds.includes(m.id);
    if(tagFilter==='draft') return !!m.draft && !deletedIds.includes(m.id);
    return true; // 'all'
  });
