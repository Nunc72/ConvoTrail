<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convooz — UI variants compare</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1d23; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; height: 100%; }
    body { display: flex; flex-direction: column; }
    .header {
      padding: 12px 20px; background: #0f1116; border-bottom: 1px solid #2a2e36;
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .header h1 { margin: 0; font-size: 14px; font-weight: 600; color: #fff; }
    .header p  { margin: 0 0 0 auto; font-size: 11px; color: #9ca3af; }
    .tabs { display: flex; gap: 6px; padding: 12px 20px 0; background: #1a1d23; flex-shrink: 0; }
    .tab {
      padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer;
      font-size: 12px; font-weight: 600; color: #9ca3af; background: #2a2e36;
      border: 1px solid transparent; border-bottom: none;
      transition: background-color .15s ease, color .15s ease;
    }
    .tab:hover { background: #353a44; color: #d1d5db; }
    .tab.active { background: #fff; color: #1a1d23; }
    .tab small { font-weight: 400; color: inherit; opacity: 0.7; margin-left: 6px; }
    .frame-wrap {
      flex: 1; min-height: 0; padding: 0 20px 20px;
      background: #1a1d23;
    }
    .frame-wrap iframe {
      width: 100%; height: 100%; border: 0;
      background: #fff; border-radius: 0 6px 6px 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Convooz — UI variants</h1>
    <p>Click a tab to switch. Each tab loads the same 3-column mailbrowser with a different visual style.</p>
  </div>
  <div class="tabs">
    <div class="tab active" data-style="dark">Dark <small>— Cron / Linear vibe</small></div>
    <div class="tab" data-style="warm">Warm <small>— Substack / Notion serif</small></div>
    <div class="tab" data-style="bold">Bold <small>— magazine, hot magenta</small></div>
    <div class="tab" data-style="apple">Apple <small>— clean &amp; airy</small></div>
    <div class="tab" data-style="fluent">Fluent <small>— floating cards</small></div>
    <div class="tab" data-style="minimal">Minimal <small>— hairline borders</small></div>
  </div>
  <div class="frame-wrap">
    <iframe id="frame" src="mockup-3col-demo.html?style=dark"></iframe>
  </div>
  <script>
    // Drive the inner mockup via postMessage instead of swapping iframe src
    // — query-param changes were unreliable on some hosts (and the iframe
    // didn't re-run its DOMContentLoaded path on every src change). With
    // postMessage the child applies the new style instantly, no reload.
    function setStyle(s) {
      document.querySelectorAll('.tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.style === s);
      });
      var f = document.getElementById('frame');
      if (f && f.contentWindow) f.contentWindow.postMessage({ type: 'setStyle', value: s }, '*');
    }
    document.querySelectorAll('.tab').forEach(function (t) {
      t.addEventListener('click', function () { setStyle(t.dataset.style); });
    });
    // First style after the inner page is ready.
    document.getElementById('frame').addEventListener('load', function () { setStyle('dark'); });
  </script>
</body>
</html>
