<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConvoMail — Mobile Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: white;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-top: -12px;
    }
    /* iPhone 15 frame (393×852, slightly rounder than Pro) */
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #1d1d1f;
      border-radius: 60px;
      padding: 14px;
      box-shadow:
        0 0 0 1px #4a4a4a,
        0 0 0 2px #2a2a2a,
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(0, 0, 0, 0.4);
    }
    .phone::before {
      /* Dynamic island */
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .phone::after {
      /* Side button outlines (visual hint) */
      content: '';
      position: absolute;
      right: -2px;
      top: 180px;
      width: 3px;
      height: 70px;
      background: #3a3a3a;
      border-radius: 0 2px 2px 0;
    }
    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 48px;
      overflow: hidden;
    }
    .phone-screen iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 48px;
    }
    /* Status bar overlay (fake) */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      padding: 18px 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      pointer-events: none;
      z-index: 5;
    }
    .status-bar .time { font-weight: 600; }
    .status-bar .right {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-bar svg { width: 16px; height: 16px; }
    /* Push iframe content down below status bar */
    .phone-screen iframe {
      padding-top: 54px;
    }
    .open-link {
      margin-top: 8px;
      color: white;
      font-size: 13px;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      transition: background 0.2s;
    }
    .open-link:hover {
      background: rgba(255,255,255,0.1);
    }
    /* Responsive — scale down on small screens */
    @media (max-height: 920px) {
      .phone {
        transform: scale(0.9);
        transform-origin: center;
      }
    }
    @media (max-height: 820px) {
      .phone {
        transform: scale(0.8);
      }
    }
    @media (max-height: 720px) {
      .phone {
        transform: scale(0.7);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ConvoMail</div>
    <div class="subtitle">Mobile preview · iPhone 15</div>
    <div class="phone">
      <div class="phone-screen">
        <div class="status-bar">
          <span class="time">9:41</span>
          <span class="right">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 17h2v5H2zM6 13h2v9H6zM10 9h2v13h-2zM14 5h2v17h-2zM18 1h2v21h-2z"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13a10 10 0 0 1 14 0M8.5 16.5a5 5 0 0 1 7 0M12 20h.01"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M22 11v2" stroke-linecap="round"/><rect x="4" y="9" width="14" height="6" rx="1" fill="currentColor"/></svg>
          </span>
        </div>
        <iframe src="mockup-v4.html" title="ConvoMail Mobile"></iframe>
      </div>
    </div>
    <a class="open-link" href="mockup-v4.html" target="_blank">Open full-screen ↗</a>
  </div>
</body>
</html>
